85,"address":[12290270,12290432],"length":1,"stats":{"Line":0}},{"line":288,"address":[12288290],"length":1,"stats":{"Line":0}},{"line":289,"address":[12288297],"length":1,"stats":{"Line":0}},{"line":290,"address":[12288309],"length":1,"stats":{"Line":0}},{"line":294,"address":[12284936],"length":1,"stats":{"Line":0}},{"line":295,"address":[12284946,12290699],"length":1,"stats":{"Line":0}},{"line":296,"address":[12290692],"length":1,"stats":{"Line":0}},{"line":299,"address":[12284978],"length":1,"stats":{"Line":0}},{"line":300,"address":[12285014],"length":1,"stats":{"Line":0}},{"line":301,"address":[12290766,12285080],"length":1,"stats":{"Line":0}},{"line":303,"address":[12291000,12290855,12290804],"length":1,"stats":{"Line":0}},{"line":304,"address":[12290865],"length":1,"stats":{"Line":0}},{"line":307,"address":[12290888],"length":1,"stats":{"Line":0}},{"line":308,"address":[12291002,12290923,12290976],"length":1,"stats":{"Line":0}},{"line":310,"address":[12290820],"length":1,"stats":{"Line":0}},{"line":314,"address":[12290721],"length":1,"stats":{"Line":0}},{"line":316,"address":[12290957],"length":1,"stats":{"Line":0}},{"line":324,"address":[12291552],"length":1,"stats":{"Line":0}},{"line":335,"address":[12291648],"length":1,"stats":{"Line":0}},{"line":344,"address":[12291680],"length":1,"stats":{"Line":0}},{"line":353,"address":[12291296],"length":1,"stats":{"Line":0}},{"line":362,"address":[12291360],"length":1,"stats":{"Line":0}},{"line":371,"address":[12291424],"length":1,"stats":{"Line":0}},{"line":381,"address":[12291491],"length":1,"stats":{"Line":0}},{"line":383,"address":[12291520],"length":1,"stats":{"Line":0}},{"line":406,"address":[12291280],"length":1,"stats":{"Line":0}},{"line":407,"address":[12291288],"length":1,"stats":{"Line":0}}],"covered":10,"coverable":145},{"path":["/","home","ggomes","Documents","discord-overlay","src","main.rs"],"content":"//! hypr-overlay-wl — phase 2: EGL/GLES2 hardware-accelerated layer-shell overlay.\n//!\n//! Transparent except for two rounded buttons (Mute/Deafen) and a drag handle.\n//! Click-through everywhere else via wl_surface.set_input_region.\n//! Discord IPC: set DISCORD_CLIENT_ID + DISCORD_CLIENT_SECRET to enable.\n\nmod config;\nmod discord;\nmod handlers;\nmod render;\nmod state;\n\nuse std::sync::mpsc;\n\nuse calloop::EventLoop;\nuse calloop_wayland_source::WaylandSource;\nuse sctk::compositor::CompositorState;\nuse sctk::output::OutputState;\nuse sctk::reexports::client::globals::registry_queue_init;\nuse sctk::reexports::client::Connection;\nuse sctk::registry::RegistryState;\nuse sctk::seat::keyboard::Modifiers;\nuse sctk::seat::SeatState;\nuse sctk::shell::wlr_layer::{Anchor, KeyboardInteractivity, Layer, LayerShell};\nuse sctk::shell::WaylandSurface;\nuse smithay_client_toolkit as sctk;\n\nuse config::Config;\nuse render::{load_system_font, EglBackend};\n#[cfg(not(test))]\nuse render::EglContext;\nuse state::App;\nuse tracing::{debug, error, info, warn};\n\nfn main() {\n    use tracing_subscriber::{fmt, EnvFilter};\n    fmt()\n        .with_env_filter(\n            EnvFilter::try_from_env(\"RUST_LOG\")\n                .unwrap_or_else(|_| EnvFilter::new(\"hypr_overlay_wl=info\")),\n        )\n        .with_target(false)\n        .with_thread_ids(false)\n        .compact()\n        .init();\n    info!(\"Starting hypr-overlay-wl (EGL/GLES2)\");\n\n    let cfg = Config::load();\n    Config::write_default_if_missing();\n\n    let conn = Connection::connect_to_env().expect(\"Wayland connection failed\");\n    let (globals, event_queue) = registry_queue_init(\u0026conn).expect(\"registry init failed\");\n    let qh = event_queue.handle();\n\n    let compositor = CompositorState::bind(\u0026globals, \u0026qh).expect(\"wl_compositor not available\");\n    let layer_shell = LayerShell::bind(\u0026globals, \u0026qh).expect(\"layer shell not available\");\n\n    let surface = compositor.create_surface(\u0026qh);\n    let layer =\n        layer_shell.create_layer_surface(\u0026qh, surface, Layer::Overlay, Some(\"hypr_overlay\"), None);\n\n    layer.set_anchor(Anchor::TOP | Anchor::LEFT);\n    layer.set_keyboard_interactivity(KeyboardInteractivity::None);\n    layer.set_size(360, 64);\n    layer.set_exclusive_zone(-1);\n    layer.set_margin(cfg.initial_y, 0, 0, cfg.initial_x);\n    layer.commit();\n\n    let egl_ctx: Box\u003cdyn EglBackend\u003e = {\n        #[cfg(not(test))] {\n            Box::new(EglContext::new(\u0026conn, layer.wl_surface(), 360, 64))\n        }\n        #[cfg(test)] {\n            Box::new(crate::render::MockEgl::new())\n        }\n    };\n\n    // Set up calloop event loop — integrates Wayland + Discord channel\n    let mut event_loop: EventLoop\u003c'static, App\u003e = EventLoop::try_new().unwrap();\n    let loop_handle = event_loop.handle();\n\n    WaylandSource::new(conn, event_queue)\n        .insert(loop_handle.clone())\n        .unwrap();\n\n    // Optional Discord IPC — enabled when both env vars are set\n    let (discord_ev_tx, discord_ev_channel) = calloop::channel::channel::\u003cdiscord::DiscordEvent\u003e();\n    loop_handle\n        .insert_source(discord_ev_channel, |event, _, app| {\n            if let calloop::channel::Event::Msg(ev) = event {\n                if app.handle_discord_event(ev) {\n                    app.draw();\n                }\n            }\n        })\n        .unwrap();\n\n    // Combined animation + speaking-expiry tick\n    loop_handle\n        .insert_source(\n            calloop::timer::Timer::from_duration(std::time::Duration::from_millis(16)),\n            |_, _, app| {\n                let now = std::time::Instant::now();\n                let mut needs_redraw = false;\n\n                // Animate participant rows (~180ms to fully appear/disappear)\n                let anim_speed = 0.016_f32 / 0.18;\n                let mut to_remove: Vec\u003cString\u003e = Vec::new();\n                for p in \u0026mut app.participants {\n                    if p.leaving {\n                        p.anim = (p.anim - anim_speed).max(0.0);\n                        needs_redraw = true;\n                        if p.anim \u003c= 0.0 {\n                            to_remove.push(p.user_id.clone());\n                        }\n                    } else if p.anim \u003c 1.0 {\n                        p.anim = (p.anim + anim_speed).min(1.0);\n                        needs_redraw = true;\n                    }\n                }\n                // Remove fully-animated-out participants and clean up textures\n                for uid in \u0026to_remove {\n                    if let Some(pos) = app.participants.iter().position(|p| \u0026p.user_id == uid) {\n                        let name = app.participants[pos].display_name.clone();\n                        debug!(\"{name} removed from list\");\n                        app.participants.remove(pos);\n                        if let Some((tex, _, _)) = app.name_textures.remove(uid) {\n                            app.egl.delete_texture(tex);\n                            \n                        }\n                        if let Some((tex, _, _)) = app.initials_textures.remove(uid) {\n                            app.egl.delete_texture(tex);\n                            \n                        }\n                        if let Some(tex) = app.avatar_textures.remove(uid) {\n                            app.egl.delete_texture(tex);\n                            \n                        }\n                    }\n                }\n                if !to_remove.is_empty() {\n                    // Clamp scroll offset when participants are removed\n                    let max_offset = app.participants.len().saturating_sub(app.max_visible_rows);\n                    app.scroll_offset = app.scroll_offset.min(max_offset);\n                    let extra = if app.participants.len() \u003e app.max_visible_rows {\n                        20\n                    } else {\n                        0\n                    };\n                    let new_h = 64 + app.visible_row_count() as u32 * 48 + extra;\n                    app.resize_overlay(new_h);\n                    if app.compact {\n                        app.apply_compact_resize();\n                    }\n                    needs_redraw = true;\n                }\n\n                // Expire speaking rings\n                let any_expired = app\n                    .participants\n                    .iter()\n                    .any(|p| p.speaking_until.map(|t| t \u003c= now).unwrap_or(false));\n                if any_expired {\n                    for p in \u0026mut app.participants {\n                        if p.speaking_until.map(|t| t \u003c= now).unwrap_or(false) {\n                            p.speaking_until = None;\n                        }\n                    }\n                    needs_redraw = true;\n                }\n\n                // Update ptt_active: true while the local user is speaking (PTT key held)\n                if app.ptt_mode {\n                    let self_speaking = app.participants.iter().any(|p| {\n                        p.user_id == app.self_user_id\n                            \u0026\u0026 p.speaking_until.map(|t| t \u003e now).unwrap_or(false)\n                    });\n                    if app.ptt_active != self_speaking {\n                        app.ptt_active = self_speaking;\n                        needs_redraw = true;\n                    }\n                }\n\n                // Animate idle alpha (~250ms transition)\n                // Target is 1.0 when in channel, 0.0 when not (fully hidden)\n                let target_alpha = if app.in_channel { 1.0_f32 } else { 0.0_f32 };\n                if (app.idle_alpha - target_alpha).abs() \u003e 0.005 {\n                    let speed = 0.016 / 0.25;\n                    if app.idle_alpha \u003c target_alpha {\n                        app.idle_alpha = (app.idle_alpha + speed).min(target_alpha);\n                    } else {\n                        app.idle_alpha = (app.idle_alpha - speed).max(target_alpha);\n                    }\n                    needs_redraw = true;\n                }\n\n                // When fully hidden, clear the input region so no mouse events are consumed\n                if !app.in_channel \u0026\u0026 app.idle_alpha \u003c= 0.005 \u0026\u0026 app.idle_alpha \u003e -0.001 {\n                    app.clear_input_region();\n                }\n\n                // Update session timer texture every second\n                if let Some(joined_at) = app.channel_joined_at {\n                    let elapsed = joined_at.elapsed().as_secs() as u32;\n                    if elapsed != app.last_timer_secs {\n                        app.last_timer_secs = elapsed;\n                        let h = elapsed / 3600;\n                        let m = (elapsed % 3600) / 60;\n                        let s = elapsed % 60;\n                        let label = if h \u003e 0 {\n                            format!(\"{h}:{m:02}:{s:02}\")\n                        } else {\n                            format!(\"{m}:{s:02}\")\n                        };\n                        if let Some((tex, _, _)) = app.timer_tex.take() {\n                            app.egl.delete_texture(tex);\n                            \n                        }\n                        let new_tex = app.render_text_tex(\u0026label, 12.0);\n                        app.timer_tex = new_tex;\n                        needs_redraw = true;\n                    }\n                }\n\n                if needs_redraw {\n                    app.draw();\n                }\n\n                // Run at 16ms when animating, 500ms when idle or just tracking timer\n                let target_alpha = if app.in_channel { 1.0_f32 } else { 0.0_f32 };\n                let animating = app.participants.iter().any(|p| p.anim \u003c 1.0 || p.leaving)\n                    || (app.idle_alpha - target_alpha).abs() \u003e 0.005;\n                let next = if animating {\n                    std::time::Duration::from_millis(16)\n                } else {\n                    // 500ms is fine for the session timer (≤500ms display lag per second)\n                    std::time::Duration::from_millis(500)\n                };\n                calloop::timer::TimeoutAction::ToDuration(next)\n            },\n        )\n        .unwrap();\n\n    let discord_cmd_tx = if !cfg.discord_client_id.is_empty()\n        \u0026\u0026 !cfg.discord_client_secret.is_empty()\n    {\n        let (tx, rx) = mpsc::sync_channel(32);\n        discord::spawn(\n            discord::Config {\n                client_id: cfg.discord_client_id.clone(),\n                client_secret: cfg.discord_client_secret.clone(),\n            },\n            discord_ev_tx,\n            rx,\n        );\n        info!(\"Discord IPC enabled — waiting for connection...\");\n        Some(tx)\n    } else {\n        error!(\n            \"Discord IPC disabled — set discord_client_id and discord_client_secret in\\n  ~/.config/hypr-overlay/config.toml\"\n        );\n        None\n    };\n\n    let mut app = App {\n        registry_state: RegistryState::new(\u0026globals),\n        seat_state: SeatState::new(\u0026globals, \u0026qh),\n        output_state: OutputState::new(\u0026globals, \u0026qh),\n        compositor,\n        layer,\n        egl: egl_ctx,\n        width: 360,\n        height: 64,\n        dragging: false,\n        last_pointer: (0, 0),\n        drag_base_pos: (cfg.initial_x, cfg.initial_y),\n        drag_output: None,\n        margins: (cfg.initial_y, 0, 0, cfg.initial_x),\n        anchor: Anchor::TOP | Anchor::LEFT,\n        modifiers: Modifiers::default(),\n        exit: false,\n        discord_cmd_tx,\n        discord_mute: false,\n        discord_deaf: false,\n        opacity: std::env::var(\"OVERLAY_OPACITY\")\n            .ok()\n            .and_then(|s| s.parse::\u003cf32\u003e().ok())\n            .unwrap_or(cfg.opacity)\n            .clamp(0.1, 1.0),\n        participants: vec![],\n        avatar_textures: std::collections::HashMap::new(),\n        name_textures: std::collections::HashMap::new(),\n        initials_textures: std::collections::HashMap::new(),\n        font: load_system_font(),\n        channel_name: None,\n        channel_name_tex: None,\n        guild_name: None,\n        guild_name_tex: None,\n        in_channel: false,\n        idle_alpha: 0.0,\n        channel_joined_at: None,\n        timer_tex: None,\n        last_timer_secs: u32::MAX,\n        scroll_offset: 0,\n        max_visible_rows: cfg.max_visible_rows,\n        scroll_indicator_tex: None,\n        last_scroll_state: (usize::MAX, usize::MAX),\n        last_pointer_y: 0.0,\n        compact: cfg.compact_by_default,\n        last_click_time: None,\n        ptt_mode: false,\n        ptt_active: false,\n        self_user_id: String::new(),\n        config: cfg,\n    };\n\n    // Config hot-reload via inotify: watch config dir and send () on changes\n    let (inotify_reload_tx, inotify_reload_rx) = calloop::channel::channel::\u003c()\u003e();\n    {\n        use inotify::{Inotify, WatchMask};\n        let config_path = config::config_path();\n        std::thread::spawn(move || {\n            let mut inotify = match Inotify::init() {\n                Ok(i) =\u003e i,\n                Err(e) =\u003e {\n                    warn!(\"inotify init failed: {e}\");\n                    return;\n                }\n            };\n            if let Some(dir) = config_path.parent() {\n                if let Err(e) = inotify\n                    .watches()\n                    .add(dir, WatchMask::CLOSE_WRITE | WatchMask::MOVED_TO)\n                {\n                    warn!(\"inotify watch add failed: {e}\");\n                    return;\n                }\n            }\n            let config_filename = config_path.file_name().map(|f| f.to_owned());\n            let mut buf = [0u8; 1024];\n            loop {\n                match inotify.read_events_blocking(\u0026mut buf) {\n                    Ok(events) =\u003e {\n                        let changed = events.into_iter().any(|e| {\n                            e.name\n                                .map(|n| Some(n) == config_filename.as_deref())\n                                .unwrap_or(false)\n                        });\n                        if changed {\n                            let _ = inotify_reload_tx.send(());\n                        }\n                    }\n                    Err(e) =\u003e {\n                        warn!(\"inotify read error: {e}\");\n                        break;\n                    }\n                }\n            }\n        });\n    }\n    loop_handle\n        .insert_source(inotify_reload_rx, |event, _, app| {\n            if let calloop::channel::Event::Msg(()) = event {\n                info!(\"config file changed, reloading...\");\n                let new_cfg = Config::load();\n                app.opacity = new_cfg.opacity;\n                app.max_visible_rows = new_cfg.max_visible_rows;\n                // Regenerate participant name textures with (possibly) new font size\n                let user_ids: Vec\u003cString\u003e =\n                    app.participants.iter().map(|p| p.user_id.clone()).collect();\n                let names: Vec\u003cString\u003e = app\n                    .participants\n                    .iter()\n                    .map(|p| p.display_name.clone())\n                    .collect();\n                app.config = new_cfg;\n                for (uid, name) in user_ids.iter().zip(names.iter()) {\n                    if let Some((tex, _, _)) = app.name_textures.remove(uid) {\n                        app.egl.delete_texture(tex);\n                        \n                    }\n                    app.make_name_texture(uid, name);\n                }\n                app.draw();\n            }\n        })\n        .expect(\"inotify reload source\");\n\n    let loop_signal = event_loop.get_signal();\n    event_loop\n        .run(None, \u0026mut app, move |app| {\n            if app.exit {\n                loop_signal.stop();\n            }\n        })\n        .expect(\"event loop error\");\n\n    info!(\"hypr-overlay exiting\");\n}\n","traces":[{"line":35,"address":[11698635,11693424,11705142],"length":1,"stats":{"Line":0}},{"line":37,"address":[11693491],"length":1,"stats":{"Line":0}},{"line":39,"address":[11693609],"length":1,"stats":{"Line":0}},{"line":40,"address":[11724448,11724432],"length":1,"stats":{"Line":0}},{"line":46,"address":[11694228,11693772],"length":1,"stats":{"Line":0}},{"line":48,"address":[11694197],"length":1,"stats":{"Line":0}},{"line":49,"address":[11694218],"length":1,"stats":{"Line":0}},{"line":51,"address":[11694736],"length":1,"stats":{"Line":0}},{"line":52,"address":[11694885,11694837],"length":1,"stats":{"Line":0}},{"line":53,"address":[11695103,11695039],"length":1,"stats":{"Line":0}},{"line":55,"address":[11695179,11695135],"length":1,"stats":{"Line":0}},{"line":56,"address":[11695253,11695301],"length":1,"stats":{"Line":0}},{"line":58,"address":[11695367],"length":1,"stats":{"Line":0}},{"line":59,"address":[11695418],"length":1,"stats":{"Line":0}},{"line":62,"address":[11695583,11695645],"length":1,"stats":{"Line":0}},{"line":63,"address":[11695664],"length":1,"stats":{"Line":0}},{"line":64,"address":[11695685],"length":1,"stats":{"Line":0}},{"line":65,"address":[11695714],"length":1,"stats":{"Line":0}},{"line":66,"address":[11695738],"length":1,"stats":{"Line":0}},{"line":67,"address":[11695776],"length":1,"stats":{"Line":0}},{"line":79,"address":[11695864,11695912],"length":1,"stats":{"Line":0}},{"line":80,"address":[11696010,11695950],"length":1,"stats":{"Line":0}},{"line":82,"address":[11696187,11696110,11696264,11696018],"length":1,"stats":{"Line":0}},{"line":83,"address":[11705011,11696126,11696211,11696141],"length":1,"stats":{"Line":0}},{"line":87,"address":[11696296],"length":1 est))]\nuse smithay_client_toolkit as sctk;\n#[cfg(not(test))]\nuse wayland_egl::WlEglSurface;\n\n// ─── GLSL shaders (GLES2 / #version 100) ─────────────────────────────────────\n\n#[cfg(not(test))]\nconst VERT_SRC: \u0026str = r\"\nattribute vec2 a_position;\nattribute vec2 a_local;\nvarying vec2 v_local;\nvoid main() {\n    gl_Position = vec4(a_position, 0.0, 1.0);\n    v_local = a_local;\n}\n\";\n\n/// Rounded-rectangle SDF shader used for button backgrounds and the drag handle.\n#[cfg(not(test))]\nconst FRAG_SRC: \u0026str = r\"\nprecision mediump float;\nvarying vec2 v_local;\nuniform vec4 u_color;\nuniform vec2 u_size;\nuniform float u_radius;\n\nfloat sdRoundedBox(vec2 p, vec2 b, float r) {\n    vec2 d = abs(p) - b + r;\n    return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0) - r;\n}\nvoid main() {\n    vec2 p = (v_local - 0.5) * u_size;\n    float d = sdRoundedBox(p, u_size * 0.5, u_radius);\n    if (d \u003e 1.0) discard;\n    gl_FragColor = u_color;\n}\n\";\n\n/// Simple icon overlay shader — samples a white-on-transparent texture and\n/// multiplies by an opacity uniform. Y is flipped because pixel buffers are\n/// top-down but GL textures are bottom-up.\n#[cfg(not(test))]\nconst ICON_FRAG_SRC: \u0026str = r\"\nprecision mediump float;\nvarying vec2 v_local;\nuniform sampler2D u_texture;\nuniform float u_opacity;\nvoid main() {\n    vec4 c = texture2D(u_texture, vec2(v_local.x, 1.0 - v_local.y));\n    gl_FragColor = vec4(c.rgb, c.a * u_opacity);\n}\n\";\n\n/// Avatar shader — clips the quad to a circle using SDF, with optional greyscale desaturation.\n#[cfg(not(test))]\nconst AVATAR_FRAG_SRC: \u0026str = r\"\nprecision mediump float;\nvarying vec2 v_local;\nuniform sampler2D u_texture;\nuniform float u_opacity;\nuniform float u_desaturate;\nvoid main() {\n    vec2 uv = v_local - 0.5;\n    float d = length(uv) - 0.5 + 0.015;\n    float aa = 0.015;\n    float a = 1.0 - smoothstep(-aa, aa, d);\n    vec4 color = texture2D(u_texture, vec2(v_local.x, 1.0 - v_local.y));\n    float luma = dot(color.rgb, vec3(0.299, 0.587, 0.114));\n    color.rgb = mix(color.rgb, vec3(luma), u_desaturate);\n    gl_FragColor = vec4(color.rgb, color.a * a * u_opacity);\n}\n\";\n\n// EGL_PLATFORM_WAYLAND_KHR (0x31D8) — part of EGL_KHR_platform_wayland\n#[cfg(not(test))]\nconst EGL_PLATFORM_WAYLAND_KHR: egl::Enum = 0x31D8;\n\n// ─── Procedural icon generation ──────────────────────────────────────────────\n\nfn smoothstep(edge0: f32, edge1: f32, x: f32) -\u003e f32 {\n    let t = ((x - edge0) / (edge1 - edge0)).clamp(0.0, 1.0);\n    t * t * (3.0 - 2.0 * t)\n}\n\nfn sdf_rrect(px: f32, py: f32, cx: f32, cy: f32, hw: f32, hh: f32, r: f32) -\u003e f32 {\n    let dx = (px - cx).abs() - hw + r;\n    let dy = (py - cy).abs() - hh + r;\n    dx.max(0.0).hypot(dy.max(0.0)) + dx.min(0.0).max(dy.min(0.0)) - r\n}\n\nfn sdf_arc(px: f32, py: f32, cx: f32, cy: f32, r: f32, w: f32, bottom: bool) -\u003e f32 {\n    let d = ((px - cx).powi(2) + (py - cy).powi(2)).sqrt();\n    let ring = (d - r).abs() - w;\n    if bottom {\n        if py \u003c= cy {\n            ring\n        } else {\n            99.0\n        }\n    } else if py \u003e= cy {\n        ring\n    } else {\n        99.0\n    }\n}\n\nfn rasterize(size: u32, sdf_fn: impl Fn(f32, f32) -\u003e f32) -\u003e Vec\u003cu8\u003e {\n    let s = size as f32;\n    let aa = 1.5 / s;\n    let mut buf = vec![0u8; (size * size * 4) as usize];\n    for y in 0..size {\n        for x in 0..size {\n            let px = x as f32 / s - 0.5;\n            let py = y as f32 / s - 0.5;\n            let d = sdf_fn(px, py);\n            let a = (1.0 - smoothstep(-aa, aa, d)) * 255.0;\n            let i = ((y * size + x) * 4) as usize;\n            buf[i..i + 3].fill(255);\n            buf[i + 3] = a as u8;\n        }\n    }\n    buf\n}\n\nfn icon_mic(size: u32) -\u003e Vec\u003cu8\u003e {\n    rasterize(size, |px, py| {\n        let body = sdf_rrect(px, py, 0.0, 0.08, 0.12, 0.22, 0.12);\n        let stand = sdf_arc(px, py, 0.0, -0.08, 0.28, 0.03, true);\n        let stem = sdf_rrect(px, py, 0.0, -0.36, 0.03, 0.055, 0.03);\n        let base = sdf_rrect(px, py, 0.0, -0.42, 0.16, 0.03, 0.03);\n        body.min(stand).min(stem).min(base)\n    })\n}\n\nfn icon_headphone(size: u32) -\u003e Vec\u003cu8\u003e {\n    rasterize(size, |px, py| {\n        let band = sdf_arc(px, py, 0.0, 0.0, 0.32, 0.04, false);\n        let left = sdf_rrect(px, py, -0.32, -0.16, 0.09, 0.15, 0.07);\n        let right = sdf_rrect(px, py, 0.32, -0.16, 0.09, 0.15, 0.07);\n        band.min(left).min(right)\n    })\n}\n\nfn icon_strikeout(size: u32) -\u003e Vec\u003cu8\u003e {\n    let s = size as f32;\n    let aa = 1.5 / s;\n    let mut buf = vec![0u8; (size * size * 4) as usize];\n    for y in 0..size {\n        for x in 0..size {\n            let px = x as f32 / s - 0.5;\n            let py = y as f32 / s - 0.5;\n            let (ax, ay, bx, by) = (-0.40f32, -0.45f32, 0.40f32, 0.45f32);\n            let (dx, dy) = (bx - ax, by - ay);\n            let t = ((px - ax) * dx + (py - ay) * dy) / (dx * dx + dy * dy);\n            let t = t.clamp(0.0, 1.0);\n            let d = ((px - (ax + t * dx)).powi(2) + (py - (ay + t * dy)).powi(2)).sqrt() - 0.045;\n            let a = (1.0 - smoothstep(-aa, aa, d)) * 230.0;\n            let i = ((y * size + x) * 4) as usize;\n            buf[i] = 20;\n            buf[i + 1] = 10;\n            buf[i + 2] = 10;\n            buf[i + 3] = a as u8;\n        }\n    }\n    buf\n}\n\n// ─── EGL + GL context ────────────────────────────────────────────────────────\n\n#[cfg(not(test))]\npub struct EglContext {\n    egl: egl::DynamicInstance\u003cegl::EGL1_5\u003e,\n    egl_display: egl::Display,\n    egl_surface: egl::Surface,\n    _egl_context: egl::Context,\n    wl_egl: WlEglSurface,\n    pub gl: glow::Context,\n    // Rounded-rect shader (background fills)\n    pub program: glow::NativeProgram,\n    vbo: glow::NativeBuffer,\n    loc_color: glow::UniformLocation,\n    loc_size: glow::UniformLocation,\n    loc_radius: glow::UniformLocation,\n    loc_pos: u32,\n    loc_local: u32,\n    // Icon overlay shader + textures\n    icon_prog: glow::NativeProgram,\n    icon_loc_opacity: glow::UniformLocation,\n    pub tex_mic: glow::NativeTexture,\n    pub tex_headphone: glow::NativeTexture,\n    pub tex_strikeout: glow::NativeTexture,\n    // Circular avatar shader\n    avatar_prog: glow::NativeProgram,\n    avatar_loc_opacity: glow::UniformLocation,\n}\n#[cfg(not(test))]\nimpl EglContext {\n    pub fn new(conn: \u0026Connection, wl_surface: \u0026WlSurface, width: i32, height: i32) -\u003e Self {\n        // Load libEGL.so.1 dynamically and require at least EGL 1.5\n        let egl_inst = unsafe {\n            egl::DynamicInstance::\u003cegl::EGL1_5\u003e::load_required()\n                .expect(\"EGL 1.5 required — is libEGL.so.1 installed?\")\n        };\n\n        // Pass the wl_display* to EGL.\n        // We use eglGetDisplay(wl_display*) which Mesa has always supported for Wayland,\n        // with eglGetPlatformDisplay as an optional stronger path.\n        let display_ptr = conn.backend().display_ptr() as *mut c_void;\n        assert!(\n            !display_ptr.is_null(),\n            \"wl_display pointer is null — client_system not active?\"\n        );\n\n        let egl_display = unsafe {\n            egl_inst\n                .get_platform_display(EGL_PLATFORM_WAYLAND_KHR, display_ptr, \u0026[])\n                .or_else(|_| {\n                    egl_inst\n                        .get_display(display_ptr)\n                        .ok_or(khronos_egl::Error::BadDisplay)\n                })\n                .expect(\"failed to get EGL display for Wayland\")\n        };\n        egl_inst.initialize(egl_display).expect(\"EGL init failed\");\n\n        // Choose an RGBA8 config with a full alpha channel for true transparency\n        let cfg_attribs = [\n            egl::SURFACE_TYPE,\n            egl::WINDOW_BIT,\n            egl::RENDERABLE_TYPE,\n            egl::OPENGL_ES2_BIT,\n            egl::RED_SIZE,\n            8,\n            egl::GREEN_SIZE,\n            8,\n            egl::BLUE_SIZE,\n            8,\n            egl::ALPHA_SIZE,\n            8,\n            egl::NONE,\n        ];\n        let config = egl_inst\n            .choose_first_config(egl_display, \u0026cfg_attribs)\n            .expect(\"EGL choose_config failed\")\n            .expect(\"no suitable EGL config found\");\n\n        // Create GLES2 context\n        egl_inst\n            .bind_api(egl::OPENGL_ES_API)\n            .expect(\"bind GLES2 API\");\n        let ctx_attribs = [egl::CONTEXT_CLIENT_VERSION, 2, egl::NONE];\n        let egl_context = egl_inst\n            .create_context(egl_display, config, None, \u0026ctx_attribs)\n            .expect(\"EGL create_context failed\");\n\n        // Create wl_egl_window from the layer surface's wl_surface ObjectId\n        let wl_egl = WlEglSurface::new(wl_surface.id(), width, height)\n            .expect(\"WlEglSurface creation failed\");\n\n        let egl_surface = unsafe {\n            egl_inst\n                .create_window_surface(egl_display, config, wl_egl.ptr() as *mut c_void, None)\n                .expect(\"EGL create_window_surface failed\")\n        };\n\n        egl_inst\n            .make_current(\n                egl_display,\n                Some(egl_surface),\n                Some(egl_surface),\n                Some(egl_context),\n            )\n            .expect(\"EGL make_current failed\");\n\n        // Disable blocking vsync; Wayland frame pacing is handled by commit timing\n        let _ = egl_inst.swap_interval(egl_display, 0);\n\n        // Load GL function pointers via glow\n        let gl = unsafe {\n            glow::Context::from_loader_function(|sym| match egl_inst.get_proc_address(sym) {\n                Some(f) =\u003e f as *const c_void,\n                None =\u003e std::ptr::null(),\n            })\n        };\n\n        // Enable alpha blending for tr .0, x1, y1, 1.0, 1.0,\n        ];\n\n        unsafe {\n            let bytes = std::slice::from_raw_parts(verts.as_ptr() as *const u8, 64);\n            self.gl.bind_buffer(glow::ARRAY_BUFFER, Some(self.vbo));\n            self.gl\n                .buffer_data_u8_slice(glow::ARRAY_BUFFER, bytes, glow::DYNAMIC_DRAW);\n\n            self.gl.enable_vertex_attrib_array(self.loc_pos);\n            self.gl.enable_vertex_attrib_array(self.loc_local);\n            self.gl\n                .vertex_attrib_pointer_f32(self.loc_pos, 2, glow::FLOAT, false, 16, 0);\n            self.gl\n                .vertex_attrib_pointer_f32(self.loc_local, 2, glow::FLOAT, false, 16, 8);\n\n            self.gl.uniform_4_f32(\n                Some(\u0026self.loc_color),\n                color[0],\n                color[1],\n                color[2],\n                color[3],\n            );\n            self.gl.uniform_2_f32(Some(\u0026self.loc_size), pw, ph);\n            self.gl.uniform_1_f32(Some(\u0026self.loc_radius), radius);\n\n            self.gl.draw_arrays(glow::TRIANGLE_STRIP, 0, 4);\n        }\n    }\n\n    pub fn swap(\u0026self) {\n        self.egl\n            .swap_buffers(self.egl_display, self.egl_surface)\n            .expect(\"EGL swap_buffers failed\");\n    }\n\n    /// Render an icon texture over a quad (same coord system as draw_rect).\n    #[allow(clippy::too_many_arguments)]\n    pub fn draw_icon(\n        \u0026self,\n        px: f32,\n        py: f32,\n        pw: f32,\n        ph: f32,\n        surf_w: f32,\n        surf_h: f32,\n        tex: glow::NativeTexture,\n        opacity: f32,\n    ) {\n        let x0 = px / surf_w * 2.0 - 1.0;\n        let x1 = (px + pw) / surf_w * 2.0 - 1.0;\n        let y0 = 1.0 - py / surf_h * 2.0;\n        let y1 = 1.0 - (py + ph) / surf_h * 2.0;\n        let verts: [f32; 16] = [\n            x0, y0, 0.0, 0.0, x1, y0, 1.0, 0.0, x0, y1, 0.0, 1.0, x1, y1, 1.0, 1.0,\n        ];\n        unsafe {\n            self.gl.use_program(Some(self.icon_prog));\n            self.gl.active_texture(glow::TEXTURE0);\n            self.gl.bind_texture(glow::TEXTURE_2D, Some(tex));\n            let bytes = std::slice::from_raw_parts(verts.as_ptr() as *const u8, 64);\n            self.gl.bind_buffer(glow::ARRAY_BUFFER, Some(self.vbo));\n            self.gl\n                .buffer_data_u8_slice(glow::ARRAY_BUFFER, bytes, glow::DYNAMIC_DRAW);\n            self.gl.enable_vertex_attrib_array(self.loc_pos);\n            self.gl.enable_vertex_attrib_array(self.loc_local);\n            self.gl\n                .vertex_attrib_pointer_f32(self.loc_pos, 2, glow::FLOAT, false, 16, 0);\n            self.gl\n                .vertex_attrib_pointer_f32(self.loc_local, 2, glow::FLOAT, false, 16, 8);\n            self.gl.uniform_1_f32(Some(\u0026self.icon_loc_opacity), opacity);\n            self.gl.draw_arrays(glow::TRIANGLE_STRIP, 0, 4);\n            self.gl.use_program(Some(self.program));\n        }\n    }\n\n    /// Render a circular-clipped avatar texture.\n    /// `desaturate`: 0.0 = full colour, 1.0 = greyscale (used for deafened participants).\n    #[allow(clippy::too_many_arguments)]\n    pub fn draw_avatar(\n        \u0026self,\n        px: f32,\n        py: f32,\n        size: f32,\n        surf_w: f32,\n        surf_h: f32,\n        tex: glow::NativeTexture,\n        opacity: f32,\n        desaturate: f32,\n    ) {\n        let x0 = px / surf_w * 2.0 - 1.0;\n        let x1 = (px + size) / surf_w * 2.0 - 1.0;\n        let y0 = 1.0 - py / surf_h * 2.0;\n        let y1 = 1.0 - (py + size) / surf_h * 2.0;\n        let verts: [f32; 16] = [\n            x0, y0, 0.0, 0.0, x1, y0, 1.0, 0.0, x0, y1, 0.0, 1.0, x1, y1, 1.0, 1.0,\n        ];\n        unsafe {\n            self.gl.use_program(Some(self.avatar_prog));\n            self.gl.active_texture(glow::TEXTURE0);\n            self.gl.bind_texture(glow::TEXTURE_2D, Some(tex));\n            let bytes = std::slice::from_raw_parts(verts.as_ptr() as *const u8, 64);\n            self.gl.bind_buffer(glow::ARRAY_BUFFER, Some(self.vbo));\n            self.gl\n                .buffer_data_u8_slice(glow::ARRAY_BUFFER, bytes, glow::DYNAMIC_DRAW);\n            self.gl.enable_vertex_attrib_array(self.loc_pos);\n            self.gl.enable_vertex_attrib_array(self.loc_local);\n            self.gl\n                .vertex_attrib_pointer_f32(self.loc_pos, 2, glow::FLOAT, false, 16, 0);\n            self.gl\n                .vertex_attrib_pointer_f32(self.loc_local, 2, glow::FLOAT, false, 16, 8);\n            self.gl\n                .uniform_1_f32(Some(\u0026self.avatar_loc_opacity), opacity);\n            let u_des = self\n                .gl\n                .get_uniform_location(self.avatar_prog, \"u_desaturate\");\n            self.gl.uniform_1_f32(u_des.as_ref(), desaturate);\n            self.gl.draw_arrays(glow::TRIANGLE_STRIP, 0, 4);\n            self.gl.use_program(Some(self.program));\n        }\n    }\n}\n\n/// Upload an RGBA pixel buffer as a GL TEXTURE_2D with linear filtering (non-square).\n#[cfg(not(test))]\npub unsafe fn upload_texture_wh(\n    gl: \u0026glow::Context,\n    pixels: \u0026[u8],\n    w: u32,\n    h: u32,\n) -\u003e glow::NativeTexture {\n    let tex = gl.create_texture().unwrap();\n    gl.bind_texture(glow::TEXTURE_2D, Some(tex));\n    gl.tex_parameter_i32(\n        glow::TEXTURE_2D,\n        glow::TEXTURE_WRAP_S,\n        glow::CLAMP_TO_EDGE as i32,\n    );\n    gl.tex_parameter_i32(\n        glow::TEXTURE_2D,\n        glow::TEXTURE_WRAP_T,\n        glow::CLAMP_TO_EDGE as i32,\n    );\n    gl.tex_parameter_i32(\n        glow::TEXTURE_2D,\n        glow::TEXTURE_MIN_FILTER,\n        glow::LINEAR as i32,\n    );\n    gl.tex_parameter_i32(\n        glow::TEXTURE_2D,\n        glow::TEXTURE_MAG_FILTER,\n        glow::LINEAR as i32,\n    );\n    gl.tex_image_2d(\n        glow::TEXTURE_2D,\n        0,\n        glow::RGBA as i32,\n        w as i32,\n        h as i32,\n        0,\n        glow::RGBA,\n        glow::UNSIGNED_BYTE,\n        glow::PixelUnpackData::Slice(Some(pixels)),\n    );\n    tex\n}\n\n/// Upload a square RGBA pixel buffer.\n#[cfg(not(test))]\nunsafe fn upload_texture(gl: \u0026glow::Context, pixels: \u0026[u8], size: u32) -\u003e glow::NativeTexture {\n    upload_texture_wh(gl, pixels, size, size)\n}\n\n// ─── Text rendering helpers ───────────────────────────────────────────────────\n\npub fn render_text_texture(font: \u0026fontdue::Font, text: \u0026str, px_size: f32) -\u003e (Vec\u003cu8\u003e, u32, u32) {\n    use fontdue::layout::{CoordinateSystem, Layout, LayoutSettings, TextStyle};\n    let mut layout = Layout::new(CoordinateSystem::PositiveYDown);\n    layout.reset(\u0026LayoutSettings {\n        x: 0.0,\n        y: 0.0,\n        max_width: Some(240.0),\n        ..Default::default()\n    });\n    layout.append(\u0026[font], \u0026TextStyle::new(text, px_size, 0));\n    let glyphs = layout.glyphs();\n    if glyphs.is_empty() {\n        return (vec![255u8; 4], 1, 1);\n    }\n    let text_w = glyphs\n        .iter()\n        .map(|g| (g.x + g.width as f32) as u32)\n        .max()\n        .unwrap_or(1)\n        .max(1);\n    let text_h = (px_size * 1.4).ceil() as u32;\n    let mut pixels = vec![0u8; (text_w * text_h * 4) as usize];\n    for g in glyphs {\n        if g.char_data.is_whitespace() {\n            continue;\n        }\n        let (metrics, bitmap) = font.rasterize(g.parent, px_size);\n        for (i, \u0026v) in bitmap.iter().enumerate() {\n            let gx = g.x as i32 + (i % metrics.width) as i32;\n            let gy = g.y as i32 + (i / metrics.width) as i32;\n            if gx \u003e= 0 \u0026\u0026 gy \u003e= 0 \u0026\u0026 (gx as u32) \u003c text_w \u0026\u0026 (gy as u32) \u003c text_h {\n                let idx = ((gy as u32 * text_w + gx as u32) * 4) as usize;\n                pixels[idx] = 255;\n                pixels[idx + 1] = 255;\n                pixels[idx + 2] = 255;\n                pixels[idx + 3] = v;\n            }\n        }\n    }\n
