tent":"// Shader program wrapper utilities — encapsulate program creation and common uniform setters.\n\nuse std::marker::PhantomData;\n\n/// Generic wrapper for the main rounded-rect shader program.\n/// Parameterized over a `G` which implements both `compile::GlInterface` and `program_gl::ProgramGl`.\npub struct MainProgram\u003cG\u003e\nwhere\n    G: crate::render::program_gl::ProgramGl,\n{\n    program: \u003cG as crate::render::compile::GlInterface\u003e::Program,\n    locs: crate::render::program_locations::MainProgramLocations\u003c\n        \u003cG as crate::render::program_gl::ProgramGl\u003e::UniformLocation,\n    \u003e,\n    _marker: PhantomData\u003cG\u003e,\n}\n\nimpl\u003cG\u003e MainProgram\u003cG\u003e\nwhere\n    G: crate::render::program_gl::ProgramGl,\n    \u003cG as crate::render::compile::GlInterface\u003e::Program: Copy,\n{\n    /// Compile, link and query locations for the main program.\n    pub unsafe fn new(gl: \u0026G, vert_src: \u0026str, frag_src: \u0026str) -\u003e Self {\n        let prog = crate::render::compile::compile_program_generic(gl, vert_src, frag_src);\n        let locs = crate::render::program_locations::query_main_program_generic(gl, \u0026prog);\n        MainProgram {\n            program: prog,\n            locs,\n            _marker: PhantomData,\n        }\n    }\n\n    pub unsafe fn use_program(\u0026self, gl: \u0026G) {\n        gl.use_program(\u0026self.program);\n    }\n\n    pub unsafe fn set_color(\u0026self, gl: \u0026G, color: [f32; 4]) {\n        gl.uniform_4_f32(\u0026self.locs.loc_color, color[0], color[1], color[2], color[3]);\n    }\n\n    pub unsafe fn set_size(\u0026self, gl: \u0026G, w: f32, h: f32) {\n        gl.uniform_2_f32(\u0026self.locs.loc_size, w, h);\n    }\n\n    pub unsafe fn set_radius(\u0026self, gl: \u0026G, r: f32) {\n        gl.uniform_1_f32(\u0026self.locs.loc_radius, r);\n    }\n\n    /// Accessor for underlying program id. Requires the Program type to be Copy.\n    pub fn id(\u0026self) -\u003e \u003cG as super::compile::GlInterface\u003e::Program {\n        self.program\n    }\n\n    /// Accessor for queried locations.\n    #[allow(dead_code)]\n    pub fn locs(\n        \u0026self,\n    ) -\u003e \u0026crate::render::program_locations::MainProgramLocations\u003c\n        \u003cG as crate::render::program_gl::ProgramGl\u003e::UniformLocation,\n    \u003e {\n        \u0026self.locs\n    }\n}\n\n/// Generic wrapper for simple programs that expose a single `u_opacity` uniform (icons, avatars).\npub struct OpacityProgram\u003cG\u003e\nwhere\n    G: crate::render::program_gl::ProgramGl,\n{\n    program: \u003cG as crate::render::compile::GlInterface\u003e::Program,\n    loc_opacity: \u003cG as crate::render::program_gl::ProgramGl\u003e::UniformLocation,\n    _marker: PhantomData\u003cG\u003e,\n}\n\nimpl\u003cG\u003e OpacityProgram\u003cG\u003e\nwhere\n    G: crate::render::program_gl::ProgramGl,\n    \u003cG as crate::render::compile::GlInterface\u003e::Program: Copy,\n{\n    pub unsafe fn new(gl: \u0026G, vert_src: \u0026str, frag_src: \u0026str) -\u003e Self {\n        let prog = crate::render::compile::compile_program_generic(gl, vert_src, frag_src);\n        let loc_opacity = crate::render::program_locations::query_opacity_generic(gl, \u0026prog);\n        OpacityProgram {\n            program: prog,\n            loc_opacity,\n            _marker: PhantomData,\n        }\n    }\n\n    #[allow(dead_code)]\n    pub unsafe fn use_program(\u0026self, gl: \u0026G) {\n        gl.use_program(\u0026self.program);\n    }\n\n    pub unsafe fn set_opacity(\u0026self, gl: \u0026G, o: f32) {\n        gl.uniform_1_f32(\u0026self.loc_opacity, o);\n    }\n\n    /// Accessor for underlying program id.\n    #[allow(dead_code)]\n    pub fn id(\u0026self) -\u003e \u003cG as crate::render::compile::GlInterface\u003e::Program {\n        self.program\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::cell::RefCell;\n\n    // Minimal Mock used to test wrappers. Implements both compile::GlInterface and\n    // program_gl::ProgramGl so it can be used with the generic wrappers.\n    struct MockGl {\n        vs_status: RefCell\u003cbool\u003e,\n        fs_status: RefCell\u003cbool\u003e,\n        program_status: RefCell\u003cbool\u003e,\n        vs_log: RefCell\u003cString\u003e,\n        fs_log: RefCell\u003cString\u003e,\n        prog_log: RefCell\u003cString\u003e,\n        next_shader: RefCell\u003cu32\u003e,\n        next_program: RefCell\u003cu32\u003e,\n        used_programs: RefCell\u003cVec\u003cu32\u003e\u003e,\n        uniform_calls: RefCell\u003cVec\u003c(u32, Vec\u003cf32\u003e)\u003e\u003e,\n    }\n\n    impl MockGl {\n        fn new() -\u003e Self {\n            MockGl {\n                vs_status: RefCell::new(true),\n                fs_status: RefCell::new(true),\n                program_status: RefCell::new(true),\n                vs_log: RefCell::new(String::new()),\n                fs_log: RefCell::new(String::new()),\n                prog_log: RefCell::new(String::new()),\n                next_shader: RefCell::new(1),\n                next_program: RefCell::new(100),\n                used_programs: RefCell::new(vec![]),\n                uniform_calls: RefCell::new(vec![]),\n            }\n        }\n    }\n\n    impl crate::render::compile::GlInterface for MockGl {\n        type Shader = u32;\n        type Program = u32;\n\n        fn create_shader(\u0026self, _shader_type: u32) -\u003e Result\u003cSelf::Shader, String\u003e {\n            let mut s = self.next_shader.borrow_mut();\n            let val = *s;\n            *s += 1;\n            Ok(val)\n        }\n\n        fn shader_source(\u0026self, _shader: \u0026Self::Shader, _src: \u0026str) {}\n\n        fn compile_shader(\u0026self, _shader: \u0026Self::Shader) {}\n\n        fn get_shader_compile_status(\u0026self, shader: \u0026Self::Shader) -\u003e bool {\n            if *shader % 2 == 0 {\n                *self.fs_status.borrow()\n            } else {\n                *self.vs_status.borrow()\n            }\n        }\n\n        fn get_shader_info_log(\u0026self, shader: \u0026Self::Shader) -\u003e String {\n            if *shader % 2 == 0 {\n                self.fs_log.borrow().clone()\n            } else {\n                self.vs_log.borrow().clone()\n            }\n        }\n\n        fn create_program(\u0026self) -\u003e Result\u003cSelf::Program, String\u003e {\n            let mut p = self.next_program.borrow_mut();\n            let val = *p;\n            *p += 1;\n            Ok(val)\n        }\n\n        fn attach_shader(\u0026self, _program: \u0026Self::Program, _shader: \u0026Self::Shader) {}\n\n        fn link_program(\u0026self, _program: \u0026Self::Program) {}\n\n        fn get_program_link_status(\u0026self, _program: \u0026Self::Program) -\u003e bool {\n            *self.program_status.borrow()\n        }\n\n        fn get_program_info_log(\u0026self, _program: \u0026Self::Program) -\u003e String {\n            self.prog_log.borrow().clone()\n        }\n\n        fn delete_shader(\u0026self, _shader: \u0026Self::Shader) {}\n    }\n\n    impl crate::render::program_gl::ProgramGl for MockGl {\n        type UniformLocation = u32;\n\n        fn use_program(\u0026self, program: \u0026\u003cSelf as crate::render::compile::GlInterface\u003e::Program) {\n            self.used_programs.borrow_mut().push(*program);\n        }\n\n        fn uniform_4_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32, y: f32, z: f32, w: f32) {\n            self.uniform_calls\n                .borrow_mut()\n                .push((*loc, vec![x, y, z, w]));\n        }\n\n        fn uniform_2_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32, y: f32) {\n            self.uniform_calls.borrow_mut().push((*loc, vec![x, y]));\n        }\n\n        fn uniform_1_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32) {\n            self.uniform_calls.borrow_mut().push((*loc, vec![x]));\n        }\n\n        fn get_uniform_location(\n            \u0026self,\n            _program: \u0026\u003cSelf as crate::render::compile::GlInterface\u003e::Program,\n            name: \u0026str,\n        ) -\u003e Option\u003cSelf::UniformLocation\u003e {\n            match name {\n                \"u_color\" =\u003e Some(10),\n                \"u_size\" =\u003e Some(11),\n                \"u_radius\" =\u003e Some(12),\n                \"u_opacity\" =\u003e Some(20),\n                _ =\u003e None,\n            }\n        }\n\n        fn get_attrib_location(\n            \u0026self,\n            _program: \u0026\u003cSelf as crate::render::compile::GlInterface\u003e::Program,\n            name: \u0026str,\n        ) -\u003e Option\u003cu32\u003e {\n            match name {\n                \"a_position\" =\u003e Some(1),\n                \"a_local\" =\u003e Some(2),\n                _ =\u003e None,\n            }\n        }\n    }\n\n    #[test]\n    fn main_and_opacity_program_setters() {\n        let mock = MockGl::new();\n        let main_prog =\n            unsafe { MainProgram::\u003cMockGl\u003e::new(\u0026mock, \"void main() {}\", \"void main() {}\") };\n        let opacity_prog =\n            unsafe { OpacityProgram::\u003cMockGl\u003e::new(\u0026mock, \"void main() {}\", \"void main() {}\") };\n\n        unsafe { main_prog.use_program(\u0026mock) };\n        assert!(mock.used_programs.borrow().contains(\u0026main_prog.id()));\n\n        unsafe { main_prog.set_color(\u0026mock, [1.0, 0.0, 0.0, 1.0]) };\n        let calls = mock.uniform_calls.borrow();\n        assert_eq!(calls.last().unwrap().0, 10);\n        assert_eq!(calls.last().unwrap().1, vec![1.0, 0.0, 0.0, 1.0]);\n        drop(calls);\n\n        unsafe { main_prog.set_size(\u0026mock, 32.0, 16.0) };\n        let calls = mock.uniform_calls.borrow();\n        assert_eq!(calls.last().unwrap().0, 11);\n        drop(calls);\n\n        unsafe { main_prog.set_radius(\u0026mock, 5.0) };\n        let calls = mock.uniform_calls.borrow();\n        assert_eq!(calls.last().unwrap().0, 12);\n        drop(calls);\n\n        unsafe { opacity_prog.set_opacity(\u0026mock, 0.5) };\n        let calls = mock.uniform_calls.borrow();\n        assert_eq!(calls.last().unwrap().0, 20);\n        drop(calls);\n    }\n}\n","traces":[{"line":24,"address":[12839696],"length":1,"stats":{"Line":1}},{"line":25,"address":[12839798],"length":1,"stats":{"Line":1}},{"line":26,"address":[12839812],"length":1,"stats":{"Line":1}},{"line":34,"address":[12839632],"length":1,"stats":{"Line":1}},{"line":35,"address":[12839657],"length":1,"stats":{"Line":1}},{"line":38,"address":[12839952],"length":1,"stats":{"Line":1}},{"line":39,"address":[12839977],"length":1,"stats":{"Line":1}},{"line":42,"address":[12839888],"length":1,"stats":{"Line":1}},{"line":43,"address":[12839927],"length":1,"stats":{"Line":1}},{"line":46,"address":[12839568],"length":1,"stats":{"Line":1}},{"line":47,"address":[12839601],"length":1,"stats":{"Line":1}},{"line":51,"address":[12839680],"length":1,"stats":{"Line":1}},{"line":52,"address":[12839685],"length":1,"stats":{"Line":1}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[12840064],"length":1,"stats":{"Line":1}},{"line":82,"address":[12840098],"length":1,"stats":{"Line":1}},{"line":83,"address":[12840117],"length":1,"stats":{"Line":1}},{"line":92,"address":[],"length":0,"stats":{"Line":0}},{"line":93,"address":[],"length":0,"stats":{"Line":0}},{"line":96,"address":[12840016],"length":1,"stats":{"Line":1}},{"line":97,"address":[12840049],"length":1,"stats":{"Line":1}},{"line":102,"address":[],"length":0,"stats":{"Line":0}},{"line":103,"address":[],"length":0,"stats":{"Line":0}}],"covered":18,"coverable":23},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","program_gl.rs"],"content":"// Program-level GL abstraction used by shader program wrappers.\n// Allows unit-testing wrappers with a mock GL and keeps production code tied to glow.\n\n/// ProgramGl extends the compile::GlInterface so implementations also provide shader\n/// creation/linking methods (Program type) while adding uniform and location helpers.\npub trait ProgramGl: super::compile::GlInterface {\n    type UniformLocation;\n\n    fn use_program(\u0026self, program: \u0026\u003cSelf as super::compile::GlInterface\u003e::Program);\n    fn uniform_4_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32, y: f32, z: f32, w: f32);\n    fn uniform_2_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32, y: f32);\n    fn uniform_1_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32);\n\n    fn get_uniform_location(\n        \u0026self,\n        program: \u0026\u003cSelf as super::compile::GlInterface\u003e::Program,\n        name: \u0026str,\n    ) -\u003e Option\u003cSelf::UniformLocation\u003e;\n    fn get_attrib_location(\n        \u0026self,\n        program: \u0026\u003cSelf as super::compile::GlInterface\u003e::Program,\n        name: \u0026str,\n    ) -\u003e Option\u003cu32\u003e;\n}\n\n#[cfg(not(test))]\nimpl ProgramGl for glow::Context {\n    type UniformLocation = glow::UniformLocation;\n\n    fn use_program(\u0026self, program: \u0026\u003cSelf as super::compile::GlInterface\u003e::Program) {\n        unsafe { glow::HasContext::use_program(self, Some(*program)) }\n    }\n\n    fn uniform_4_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32, y: f32, z: f32, w: f32) {\n        unsafe { glow::HasContext::uniform_4_f32(self, Some(loc), x, y, z, w) }\n    }\n\n    fn uniform_2_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32, y: f32) {\n        unsafe { glow::HasContext::uniform_2_f32(self, Some(loc), x, y) }\n    }\n\n    fn uniform_1_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32) {\n        unsafe { glow::HasContext::uniform_1_f32(self, Some(loc), x) }\n    }\n\n    fn get_uniform_location(\n        \u0026self,\n        program: \u0026\u003cSelf as super::compile::GlInterface\u003e::Program,\n        name: \u0026str,\n    ) -\u003e Option\u003cSelf::UniformLocation\u003e {\n        unsafe { glow::HasContext::get_uniform_location(self, *program, name) }\n    }\n\n    fn get_attrib_location(\n        \u0026self,\n        program: \u0026\u003cSelf as super::compile::GlInterface\u003e::Program,\n        name: \u0026str,\n    ) -\u003e Option\u003cu32\u003e {\n        unsafe { glow::HasContext::get_attrib_location(self, *program, name) }\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","program_locations.rs"],"content":"#![allow(dead_code)]\n// Centralized shader attribute/uniform names and query helpers.\n\npub const ATTR_POSITION: \u0026str = \"a_position\";\npub const ATTR_LOCAL: \u0026str = \"a_local\";\npub const UNIFORM_COLOR: \u0026str = \"u_color\";\npub const UNIFORM_SIZE: \u0026str = \"u_size\";\npub const UNIFORM_RADIUS: \u0026str = \"u_radius\";\npub const UNIFORM_OPACITY: \u0026str = \"u_opacity\";\n\n/// Locations for the main rounded-rect shader program.\npub struct MainProgramLocations\u003cU\u003e {\n    pub loc_pos: u32,\n    pub loc_local: u32,\n    pub loc_color: U,\n    pub loc_size: U,\n    pub loc_radius: U,\n}\n\n/// Generic query implementation that uses the ProgramGl abstraction so tests can supply a mock GL.\npub unsafe fn query_main_program_generic\u003cG: super::program_gl::ProgramGl\u003e(\n    gl: \u0026G,\n    program: \u0026\u003cG as super::compile::GlInterface\u003e::Program,\n) -\u003e MainProgramLocations\u003cG::UniformLocation\u003e {\n    let loc_color = gl.get_uniform_location(program, UNIFORM_COLOR).unwrap();\n    let loc_size = gl.get_uniform_location(program, UNIFORM_SIZE).unwrap();\n    let loc_radius = gl.get_uniform_location(program, UNIFORM_RADIUS).unwrap();\n    let loc_pos = gl.get_attrib_location(program, ATTR_POSITION).unwrap();\n    let loc_local = gl.get_attrib_location(program, ATTR_LOCAL).unwrap();\n    MainProgramLocations {\n        loc_pos,\n        loc_local,\n        loc_color,\n        loc_size,\n        loc_radius,\n    }\n}\n\n/// Convenience wrapper used by production code (glow::Context).\n#[cfg(not(test))]\npub unsafe fn query_main_program(\n    gl: \u0026glow::Context,\n    program: glow::NativeProgram,\n) -\u003e MainProgramLocations\u003cglow::UniformLocation\u003e {\n    query_main_program_generic(gl, \u0026program)\n}\n\n/// Generic query for the standard opacity uniform used by icon/avatar shaders.\npub unsafe fn query_opacity_generic\u003cG: super::program_gl::ProgramGl\u003e(\n    gl: \u0026G,\n    program: \u0026\u003cG as super::compile::GlInterface\u003e::Program,\n) -\u003e G::UniformLocation {\n    gl.get_uniform_location(program, UNIFORM_OPACITY).unwrap()\n}\n\n#[cfg(not(test))]\npub unsafe fn query_opacity(\n    gl: \u0026glow::Context,\n    program: glow::NativeProgram,\n) -\u003e glow::UniformLocation {\n    query_opacity_generic(gl, \u0026program)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn attr_and_uniform_names() {\n        assert_eq!(ATTR_POSITION, \"a_position\");\n        assert_eq!(ATTR_LOCAL, \"a_local\");\n        assert_eq!(UNIFORM_COLOR, \"u_color\");\n        assert_eq!(UNIFORM_SIZE, \"u_size\");\n        assert_eq!(UNIFORM_RADIUS, \"u_radius\");\n        assert_eq!(UNIFORM_OPACITY, \"u_opacity\");\n    }\n}\n","traces":[{"line":21,"address":[11867961,11867824],"length":1,"stats":{"Line":1}},{"line":25,"address":[11867877],"length":1,"stats":{"Line":1}},{"line":26,"address":[11867934,11867998],"length":1,"stats":{"Line":2}},{"line":27,"address":[11868097,11868041],"length":1,"stats":{"Line":2}},{"line":28,"address":[11868196,11868140],"length":1,"stats":{"Line":2}},{"line":29,"address":[11868239],"length":1,"stats":{"Line":1}},{"line":49,"address":[11867760],"length":1,"stats":{"Line":1}},{"line":53,"address":[11867774],"length":1,"stats":{"Line":1}}],"covered":8,"coverable":8},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","shaders.rs"],"content":"// ─── GLSL shaders (GLES2 / #version 100) ─────────────────────────────────────\n\n#[cfg(not(test))]\npub const VERT_SRC: \u0026str = r\"\nattribute vec2 a_position;\nattribute vec2 a_local;\nvarying vec2 v_local;\nvoid main() {\n    gl_Position = vec4(a_position, 0.0, 1.0);\n    v_local = a_local;\n}\n\";\n\n/// Rounded-rectangle SDF shader used for button backgrounds and the drag handle.\n#[cfg(not(test))]\npub const FRAG_SRC: \u0026str = r\"\nprecision mediump float;\nvarying vec2 v_local;\nuniform vec4 u_color;\nuniform vec2 u_size;\nuniform float u_radius;\n\nfloat sdRoundedBox(vec2 p, vec2 b, float r) {\n    vec2 d = abs(p) - b + r;\n    return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0) - r;\n}\nvoid main() {\n    vec2 p = (v_local - 0.5) * u_size;\n    float d = sdRoundedBox(p, u_size * 0.5, u_radius);\n    if (d \u003e 1.0) discard;\n    gl_FragColor = u_color;\n}\n\";\n\n/// Simple icon overlay shader — samples a white-on-transparent texture and\n/// multiplies by an opacity uniform. Y is flipped because pixel buffers are\n/// top-down but GL textures are bottom-up.\n#[cfg(not(test))]\npub const ICON_FRAG_SRC: \u0026str = r\"\nprecision mediump float;\nvarying vec2 v_local;\nuniform sampler2D u_texture;\nuniform float u_opacity;\nvoid main() {\n    vec4 c = texture2D(u_texture, vec2(v_local.x, 1.0 - v_local.y));\n    gl_FragColor = vec4(c.rgb, c.a * u_opacity);\n}\n\";\n\n/// Avatar shader — clips the quad to a circle using SDF, with optional greyscale desaturation.\n#[cfg(not(test))]\npub const AVATAR_FRAG_SRC: \u0026str = r\"\nprecision mediump float;\nvarying vec2 v_local;\nuniform sampler2D u_texture;\nuniform float u_opacity;\nuniform float u_desaturate;\nvoid main() {\n    vec2 uv = v_local - 0.5;\n    float d = length(uv) - 0.5 + 0.015;\n    float aa = 0.015;\n    float a = 1.0 - smoothstep(-aa, aa, d);\n    vec4 color = texture2D(u_texture, vec2(v_local.x, 1.0 - v_local.y));\n    float luma = dot(color.rgb, vec3(0.299, 0.587, 0.114));\n    color.rgb = mix(color.rgb, vec3(luma), u_desaturate);\n    gl_FragColor = vec4(color.rgb, color.a * a * u_opacity);\n}\n\";\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","text.rs"],"content":"pub fn render_text_texture(font: \u0026fontdue::Font, text: \u0026str, px_size: f32) -\u003e (Vec\u003cu8\u003e, u32, u32) {\n    use fontdue::layout::{CoordinateSystem, Layout, LayoutSettings, TextStyle};\n    let mut layout = Layout::new(CoordinateSystem::PositiveYDown);\n    layout.reset(\u0026LayoutSettings {\n        x: 0.0,\n        y: 0.0,\n        max_width: Some(240.0),\n        ..Default::default()\n    });\n    layout.append(\u0026[font], \u0026TextStyle::new(text, px_size, 0));\n    let glyphs = layout.glyphs();\n    if glyphs.is_empty() {\n        return (vec![255u8; 4], 1, 1);\n    }\n    let text_w = glyphs\n        .iter()\n        .map(|g| (g.x + g.width as f32) as u32)\n        .max()\n        .unwrap_or(1)\n        .max(1);\n    let text_h = (px_size * 1.4).ceil() as u32;\n    let mut pixels = vec![0u8; (text_w * text_h * 4) as usize];\n    for g in glyphs {\n        if g.char_data.is_whitespace() {\n            continue;\n        }\n        let (metrics, bitmap) = font.rasterize(g.parent, px_size);\n        for (i, \u0026v) in bitmap.iter().enumerate() {\n            let gx = g.x as i32 + (i % metrics.width) as i32;\n            let gy = g.y as i32 + (i / metrics.width) as i32;\n            if gx \u003e= 0 \u0026\u0026 gy \u003e= 0 \u0026\u0026 (gx as u32) \u003c text_w \u0026\u0026 (gy as u32) \u003c text_h {\n                let idx = ((gy as u32 * text_w + gx as u32) * 4) as usize;\n                pixels[idx] = 255;\n                pixels[idx + 1] = 255;\n                pixels[idx + 2] = 255;\n                pixels[idx + 3] = v;\n            }\n        }\n    }\n    // Flip rows vertically so the buffer matches OpenGL's bottom-up V=0 convention,\n    // which cancels out the `1.0 - v_local.y` Y-flip in the icon fragment shader.\n    let row_bytes = (text_w * 4) as usize;\n    for row in 0..text_h / 2 {\n        let a = (row * text_w * 4) as usize;\n        let b = ((text_h - 1 - row) * text_w * 4) as usize;\n        for col in 0..row_bytes {\n            pixels.swap(a + col, b + col);\n        }\n    }\n    (pixels, text_w, text_h)\n}\n\npub fn load_system_font() -\u003e Option\u003cfontdue::Font\u003e {\n    let paths = [\n        \"/usr/share/fonts/TTF/DejaVuSans.ttf\",\n        \"/usr/share/fonts/noto/NotoSans-Regular.ttf\",\n        \"/usr/share/fonts/noto-cjk/NotoSansCJK-Regular.ttc\",\n        \"/usr/share/fonts/liberation/LiberationSans-Regular.ttf\",\n        \"/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf\",\n        \"/usr/share/fonts/dejavu/DejaVuSans.ttf\",\n        \"/usr/share/fonts/TTF/Hack-Regular.ttf\",\n    ];\n    for p in \u0026paths {\n        if let Ok(data) = std::fs::read(p) {\n            if let Ok(font) =\n                fontdue::Font::from_bytes(data.as_slice(), fontdue::FontSettings::default())\n            {\n                tracing::info!(\"Loaded font: {p}\");\n                return Some(font);\n            }\n        }\n    }\n    None\n}\n","traces":[{"line":1,"address":[12756107,12756026,12752352],"length":1,"stats":{"Line":2}},{"line":3,"address":[12752454],"length":1,"stats":{"Line":3}},{"line":4,"address":[12752518],"length":1,"stats":{"Line":3}},{"line":8,"address":[12752459],"length":1,"stats":{"Line":2}},{"line":10,"address":[12752724],"length":1,"stats":{"Line":3}},{"line":11,"address":[12752797],"length":1,"stats":{"Line":3}},{"line":12,"address":[12752828],"length":1,"stats":{"Line":3}},{"line":13,"address":[12752886,12756040],"length":1,"stats":{"Line":2}},{"line":15,"address":[12752863,12753116],"length":1,"stats":{"Line":2}},{"line":17,"address":[12177754,12177838,12177744],"length":1,"stats":{"Line":4}},{"line":21,"address":[12753131],"length":1,"stats
