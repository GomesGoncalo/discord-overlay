    pub discord_client_id: String,\n    /// Discord application client secret\n    pub discord_client_secret: String,\n    /// Initial overlay opacity (0.1–1.0)\n    pub opacity: f32,\n    /// Maximum participant rows before scrolling kicks in\n    pub max_visible_rows: usize,\n    /// Initial X position (pixels from left edge of output)\n    pub initial_x: i32,\n    /// Initial Y position (pixels from top edge of output)\n    pub initial_y: i32,\n    /// Background colour as [R, G, B] in 0.0–1.0\n    pub bg_color: [f32; 3],\n    /// Speaking ring colour as [R, G, B]\n    pub speaking_color: [f32; 3],\n    /// Muted/deafened indicator colour as [R, G, B]\n    pub muted_color: [f32; 3],\n    /// Font size for participant names (pixels)\n    pub font_size: f32,\n    /// Start in compact mode (single row of avatars, no controls)\n    pub compact_by_default: bool,\n}\n\nimpl Default for Config {\n    fn default() -\u003e Self {\n        Self {\n            discord_client_id: String::new(),\n            discord_client_secret: String::new(),\n            opacity: 0.9,\n            max_visible_rows: 5,\n            initial_x: 20,\n            initial_y: 20,\n            bg_color: [0.12, 0.13, 0.16],\n            speaking_color: [0.23, 0.77, 0.33],\n            muted_color: [0.8, 0.15, 0.15],\n            font_size: 14.0,\n            compact_by_default: false,\n        }\n    }\n}\n\nimpl Config {\n    pub fn load() -\u003e Self {\n        Self::load_with_retry(3)\n    }\n\n    /// Load config with retry logic for in-progress file writes.\n    ///\n    /// When config file is being written, a read may catch the file mid-write.\n    /// This retries with a small delay to allow writes to complete.\n    /// Env vars (DISCORD_CLIENT_ID, DISCORD_CLIENT_SECRET) override config file values.\n    pub fn load_with_retry(max_retries: usize) -\u003e Self {\n        let path = dirs_config_path();\n        let mut cfg = None;\n\n        for attempt in 1..=max_retries {\n            match std::fs::read_to_string(\u0026path) {\n                Ok(text) =\u003e match toml::from_str::\u003cConfig\u003e(\u0026text) {\n                    Ok(c) =\u003e {\n                        info!(\"loaded from {path:?}\");\n                        cfg = Some(c);\n                        break;\n                    }\n                    Err(e) =\u003e {\n                        warn!(\"parse error in {path:?}: {e}\");\n                        if attempt \u003c max_retries {\n                            // TOML parse error might indicate incomplete file write\n                            std::thread::sleep(std::time::Duration::from_millis(50));\n                            continue;\n                        }\n                        warn!(\"using defaults after {} retries\", max_retries);\n                    }\n                },\n                Err(_) =\u003e {\n                    info!(\"no config file found at {path:?}, using defaults\");\n                    break;\n                }\n            }\n        }\n\n        let mut config = cfg.unwrap_or_default();\n\n        // Env vars override config file (useful for secrets in systemd unit overrides)\n        if let Ok(v) = std::env::var(\"DISCORD_CLIENT_ID\") {\n            debug!(\"DISCORD_CLIENT_ID overridden via env var\");\n            config.discord_client_id = v;\n        }\n        if let Ok(v) = std::env::var(\"DISCORD_CLIENT_SECRET\") {\n            debug!(\"DISCORD_CLIENT_SECRET overridden via env var\");\n            config.discord_client_secret = v;\n        }\n\n        config\n    }\n\n    /// Write a default config file if none exists.\n    pub fn write_default_if_missing() {\n        let path = dirs_config_path();\n        if path.exists() {\n            return;\n        }\n        // Ensure parent directory exists; try to create it. If it fails, log and continue\n        // — we still attempt to write the config file to the requested XDG path.\n        if let Some(parent) = path.parent() {\n            if let Err(e) = std::fs::create_dir_all(parent) {\n                error!(\"could not create config dir {:?}: {e}\", parent);\n                // Best-effort retry (in case of transient failures) and proceed to try writing\n                // the original config path. Do not silently switch to a HOME fallback as tests\n                // expect the configured XDG_CONFIG_HOME to be honoured.\n                let _ = std::fs::create_dir_all(parent);\n            }\n        }\n\n        let content = r#\"# hypr-overlay configuration\n# All fields are optional — remove any line to use the default.\n\n# Discord application credentials (required).\n# Create an app at https://discord.com/developers/applications\n# Copy \"Application ID\" as client_id and OAuth2 → \"Client Secret\" as client_secret.\ndiscord_client_id     = \"\"\ndiscord_client_secret = \"\"\n\n# Overlay opacity when in a voice channel (0.1–1.0)\nopacity = 0.9\n\n# Maximum participant rows visible before the list scrolls\nmax_visible_rows = 5\n\n# Initial position on screen (pixels from top-left of the output)\ninitial_x = 20\ninitial_y = 20\n\n# Colours as [R, G, B] in 0.0–1.0 range\nbg_color       = [0.12, 0.13, 0.16]\nspeaking_color = [0.23, 0.77, 0.33]\nmuted_color    = [0.80, 0.15, 0.15]\n\n# Font size for participant names (pixels)\nfont_size = 14.0\n\n# Start in compact mode (single row of avatars, no controls)\ncompact_by_default = false\n\"#;\n\n        // Try a straightforward write first; if it fails, attempt a create+write.\n        match std::fs::write(\u0026path, content) {\n            Ok(_) =\u003e {\n                info!(\"wrote default config to {path:?}\");\n            }\n            Err(e) =\u003e {\n                error!(\"could not write default config: {e}, attempting create/open\");\n                if let Some(parent) = path.parent() {\n                    let _ = std::fs::create_dir_all(parent);\n                }\n                match std::fs::OpenOptions::new()\n                    .create(true)\n                    .write(true)\n                    .truncate(true)\n                    .open(\u0026path)\n                {\n                    Ok(mut f) =\u003e {\n                        use std::io::Write;\n                        if let Err(e2) = f.write_all(content.as_bytes()) {\n                            error!(\"failed to write default config after create: {e2}\");\n                        } else {\n                            info!(\"wrote default config to {path:?}\");\n                        }\n                    }\n                    Err(e3) =\u003e {\n                        error!(\"could not create default config file: {e3}\");\n                    }\n                }\n            }\n        }\n    }\n}\n\npub fn config_path() -\u003e std::path::PathBuf {\n    dirs_config_path()\n}\n\nfn dirs_config_path() -\u003e std::path::PathBuf {\n    let base = std::env::var(\"XDG_CONFIG_HOME\")\n        .map(std::path::PathBuf::from)\n        .unwrap_or_else(|_| {\n            let home = std::env::var(\"HOME\").unwrap_or_else(|_| \".\".into());\n            std::path::PathBuf::from(home).join(\".config\")\n        });\n    base.join(\"hypr-overlay\").join(\"config.toml\")\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use serial_test::serial;\n    use std::env;\n    use std::fs;\n\n    #[test]\n    fn default_values() {\n        let d = Config::default();\n        assert_eq!(d.opacity, 0.9);\n        assert_eq!(d.max_visible_rows, 5);\n        assert_eq!(d.font_size, 14.0);\n        assert!(!d.compact_by_default);\n    }\n\n    #[test]\n    #[serial]\n    fn write_default_and_load() {\n        let tid = format!(\"{:?}\", std::thread::current().id());\n        let tmp =\n            std::env::temp_dir().join(format!(\"hypr_cfg_test_{}_{}\", std::process::id(), tid));\n        let _ = fs::remove_dir_all(\u0026tmp);\n        std::env::set_var(\"XDG_CONFIG_HOME\", \u0026tmp);\n        let cfg_path = config_path 65},{"path":["/","home","ggomes","Documents","discord-overlay","src","discord","auth.rs"],"content":"//! OAuth2 authentication with Discord.\n\nuse serde_json::json;\nuse std::os::unix::net::UnixStream;\nuse std::time::Duration;\nuse tracing::{debug, error, info, warn};\n\nuse super::ipc::{is_timeout, load_token, read_frame, save_token, send_cmd, token_path, OP_FRAME};\nuse super::types::Config;\n\nfn http_exchange(params: \u0026str) -\u003e Option\u003c(String, String)\u003e {\n    let resp = ureq::post(\"https://discord.com/api/oauth2/token\")\n        .set(\"Content-Type\", \"application/x-www-form-urlencoded\")\n        .send_string(params)\n        .ok()?;\n    let v: serde_json::Value = resp.into_json().ok()?;\n    Some((\n        v[\"access_token\"].as_str()?.to_string(),\n        v[\"refresh_token\"].as_str()?.to_string(),\n    ))\n}\n\nfn exchange_code(cfg: \u0026Config, code: \u0026str) -\u003e Option\u003c(String, String)\u003e {\n    let params = format!(\n        \"client_id={}\u0026client_secret={}\u0026grant_type=authorization_code\u0026code={}\u0026redirect_uri=http%3A%2F%2F127.0.0.1\",\n        cfg.client_id, cfg.client_secret, code\n    );\n    http_exchange(\u0026params)\n}\n\nfn do_refresh(cfg: \u0026Config, refresh: \u0026str) -\u003e Option\u003c(String, String)\u003e {\n    let params = format!(\n        \"client_id={}\u0026client_secret={}\u0026grant_type=refresh_token\u0026refresh_token={}\",\n        cfg.client_id, cfg.client_secret, refresh\n    );\n    http_exchange(\u0026params)\n}\n\n/// Distinguishes a token-rejection error from other auth failures.\n#[derive(Debug)]\npub enum AuthError {\n    /// Discord rejected the token (evt=ERROR, e.g. code 4009 \"Invalid token\").\n    InvalidToken,\n    /// Any other failure (I/O error, timeout, etc.).\n    Other,\n}\n\n/// Send AUTHENTICATE, wait for response.\npub fn authenticate(stream: \u0026mut UnixStream, token: \u0026str) -\u003e Result\u003cString, AuthError\u003e {\n    send_cmd(\n        stream,\n        json!({\n            \"cmd\": \"AUTHENTICATE\",\n            \"args\": { \"access_token\": token },\n            \"nonce\": \"auth\"\n        }),\n    );\n    let deadline = std::time::Instant::now() + Duration::from_secs(5);\n    loop {\n        if std::time::Instant::now() \u003e deadline {\n            return Err(AuthError::Other);\n        }\n        match read_frame(stream) {\n            Ok((OP_FRAME, v)) if v[\"nonce\"] == \"auth\" || v[\"cmd\"] == \"AUTHENTICATE\" =\u003e {\n                if v[\"evt\"] == \"ERROR\" {\n                    warn!(\"AUTHENTICATE error: {}\", v[\"data\"][\"message\"]);\n                    return Err(AuthError::InvalidToken);\n                }\n                return Ok(token.to_string());\n            }\n            Ok(_) =\u003e continue,\n            Err(e) if is_timeout(\u0026e) =\u003e continue,\n            Err(_) =\u003e return Err(AuthError::Other),\n        }\n    }\n}\n\n/// Full OAuth flow: AUTHORIZE → code → HTTP exchange → AUTHENTICATE.\npub fn authorize_flow(cfg: \u0026Config, stream: \u0026mut UnixStream) -\u003e Option\u003cString\u003e {\n    info!(\"Starting OAuth — please check Discord for an authorization popup\");\n    send_cmd(\n        stream,\n        json!({\n            \"cmd\":  \"AUTHORIZE\",\n            \"args\": {\n                \"client_id\": cfg.client_id,\n                \"scopes\":    [\"rpc\", \"rpc.voice.read\", \"rpc.voice.write\"]\n            },\n            \"nonce\": \"authorize\"\n        }),\n    );\n\n    // Wait up to 2 minutes for the user to click \"Authorize\" in Discord\n    let deadline = std::time::Instant::now() + Duration::from_secs(120);\n    let code = loop {\n        if std::time::Instant::now() \u003e deadline {\n            warn!(\"Authorization timed out\");\n            return None;\n        }\n        match read_frame(stream) {\n            Ok((OP_FRAME, v)) if v[\"nonce\"] == \"authorize\" || v[\"cmd\"] == \"AUTHORIZE\" =\u003e {\n                if v[\"evt\"] == \"ERROR\" {\n                    warn!(\"AUTHORIZE error: {}\", v[\"data\"][\"message\"]);\n                    return None;\n                }\n                if let Some(code) = v[\"data\"][\"code\"].as_str() {\n                    break code.to_string();\n                }\n            }\n            Ok(_) =\u003e continue,\n            Err(e) if is_timeout(\u0026e) =\u003e continue,\n            Err(e) =\u003e {\n                error!(\"error during AUTHORIZE: {e}\");\n                return None;\n            }\n        }\n    };\n\n    info!(\"Got auth code, exchanging for access token...\");\n    let (at, rt) = exchange_code(cfg, \u0026code)?;\n    save_token(\u0026at, \u0026rt);\n    info!(\"Token saved to {}\", token_path().display());\n    authenticate(stream, \u0026at).ok()\n}\n\npub fn try_auth(cfg: \u0026Config, stream: \u0026mut UnixStream) -\u003e Option\u003cString\u003e {\n    let _span = tracing::info_span!(\"discord_auth\").entered();\n    if let Some((at, rt)) = load_token() {\n        debug!(\"found cached token, authenticating\");\n        // Try the cached access token\n        match authenticate(stream, \u0026at) {\n            Ok(tok) =\u003e return Some(tok),\n            Err(AuthError::InvalidToken) =\u003e {\n                // Token invalid/expired — try the refresh token\n                warn!(\"access token invalid/expired, refreshing...\");\n                if let Some((new_at, new_rt)) = do_refresh(cfg, \u0026rt) {\n                    info!(\"token refreshed successfully\");\n                    save_token(\u0026new_at, \u0026new_rt);\n                    match authenticate(stream, \u0026new_at) {\n                        Ok(tok) =\u003e return Some(tok),\n                        Err(AuthError::InvalidToken) =\u003e {\n                            // Refresh token also rejected — clear cache and do full OAuth\n                            warn!(\n                                \"[discord] Refresh token invalid, clearing cache and re-authenticating\"\n                            );\n                            let _ = std::fs::remove_file(token_path());\n                        }\n                        Err(AuthError::Other) =\u003e return None,\n                    }\n                } else {\n                    // HTTP refresh request failed — clear stale cache and do full OAuth\n                    warn!(\"Token refresh failed, clearing cache\");\n                    let _ = std::fs::remove_file(token_path());\n                }\n            }\n            Err(AuthError::Other) =\u003e return None,\n        }\n    }\n    // No valid token — do full OAuth flow\n    authorize_flow(cfg, stream)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use serde_json::json;\n    use std::os::unix::net::UnixStream;\n\n    #[test]\n    fn authenticate_invalid_token() {\n        let (mut a, mut b) = UnixStream::pair().unwrap();\n        let err = json!({\"nonce\": \"auth\", \"evt\": \"ERROR\", \"data\": {\"message\": \"invalid token\"}});\n        super::super::ipc::write_frame(\u0026mut b, super::super::ipc::OP_FRAME, \u0026err.to_string())\n            .unwrap();\n        let res = authenticate(\u0026mut a, \"TOKEN\");\n        assert!(matches!(res, Err(AuthError::InvalidToken)));\n    }\n\n    #[test]\n    fn authenticate_success() {\n        let (mut a, mut b) = UnixStream::pair().unwrap();\n        let ok = json!({\"nonce\":\"auth\",\"cmd\":\"AUTHENTICATE\",\"data\":{}});\n        super::super::ipc::write_frame(\u0026mut b, super::super::ipc::OP_FRAME, \u0026ok.to_string())\n            .unwrap();\n        let res = authenticate(\u0026mut a, \"TOKEN2\");\n        assert_eq!(res.unwrap(), \"TOKEN2\".to_string());\n    }\n}\n","traces":[{"line":11,"address":[12653226,12651888,12653273],"length":1,"stats":{"Line":0}},{"line":12,"address":[12651943,12652083],"length":1,"stats":{"Line":0}},{"line":14,"address":[12652040],"length":1,"stats":{"Line":0}},{"line":16,"address":[12          warn!(\"connection error, retrying in {backoff_secs}s\");\n            }\n        }\n        let _ = tx.send(DiscordEvent::Disconnected);\n        std::thread::sleep(Duration::from_secs(backoff_secs));\n        backoff_secs = (backoff_secs * 2).min(30);\n    }\n}\n\n/// Subscribe to voice settings and channel changes.\npub fn subscribe_initial(stream: \u0026mut UnixStream) {\n    send_cmd(\n        stream,\n        json!({\n            \"cmd\": \"GET_VOICE_SETTINGS\",\n            \"args\": {},\n            \"nonce\": \"gvs\"\n        }),\n    );\n    send_cmd(\n        stream,\n        json!({\n            \"cmd\":  \"SUBSCRIBE\",\n            \"evt\":  \"VOICE_SETTINGS_UPDATE\",\n            \"args\": {},\n            \"nonce\": \"sub_vsu\"\n        }),\n    );\n    send_cmd(\n        stream,\n        json!({\n            \"cmd\": \"SUBSCRIBE\",\n            \"evt\": \"VOICE_CHANNEL_SELECT\",\n            \"args\": {},\n            \"nonce\": \"sub_vcs\"\n        }),\n    );\n    send_cmd(\n        stream,\n        json!({\n            \"cmd\": \"GET_SELECTED_VOICE_CHANNEL\",\n            \"args\": {},\n            \"nonce\": \"gvsc\"\n        }),\n    );\n}\n\nfn try_connect(\n    cfg: \u0026Config,\n    tx: \u0026calloop::channel::Sender\u003cDiscordEvent\u003e,\n    cmd_rx: \u0026mpsc::Receiver\u003cDiscordCommand\u003e,\n) -\u003e Result\u003c(), ()\u003e {\n    let _span = tracing::info_span!(\"discord_connect\").entered();\n    let mut stream = loop {\n        match find_socket() {\n            Some(s) =\u003e break s,\n            None =\u003e {\n                info!(\"Discord not found, retrying in 5s...\");\n                std::thread::sleep(Duration::from_secs(5));\n            }\n        }\n    };\n\n    stream\n        .set_read_timeout(Some(Duration::from_millis(50)))\n        .ok();\n\n    let handshake = json!({\"v\": 1, \"client_id\": cfg.client_id}).to_string();\n    write_frame(\u0026mut stream, OP_HANDSHAKE, \u0026handshake).map_err(|_| ())?;\n\n    let ready = wait_for_ready(\u0026mut stream)?;\n    let local_user_id = ready[\"data\"][\"user\"][\"id\"]\n        .as_str()\n        .unwrap_or(\"\")\n        .to_string();\n    let local_username = ready[\"data\"][\"user\"][\"username\"]\n        .as_str()\n        .unwrap_or(\"unknown\")\n        .to_string();\n    let local_avatar = ready[\"data\"][\"user\"][\"avatar\"]\n        .as_str()\n        .filter(|s| !s.is_empty())\n        .map(|s| s.to_string());\n    info!(\"handshake OK — user: {local_username} ({local_user_id})\");\n\n    try_auth(cfg, \u0026mut stream).ok_or(())?;\n    info!(\"authenticated\");\n    let _ = tx.send(DiscordEvent::Ready {\n        username: local_username.clone(),\n        user_id: local_user_id.clone().into(),\n    });\n\n    subscribe_initial(\u0026mut stream);\n\n    let mut nonce: u64 = 1000;\n    loop {\n        while let Ok(cmd) = cmd_rx.try_recv() {\n            nonce += 1;\n            match cmd {\n                DiscordCommand::SetMute(m) =\u003e send_cmd(\n                    \u0026mut stream,\n                    json!({\n                        \"cmd\":  \"SET_VOICE_SETTINGS\",\n                        \"args\": { \"mute\": m },\n                        \"nonce\": nonce.to_string()\n                    }),\n                ),\n                DiscordCommand::SetDeaf(d) =\u003e send_cmd(\n                    \u0026mut stream,\n                    json!({\n                        \"cmd\":  \"SET_VOICE_SETTINGS\",\n                        \"args\": { \"deaf\": d },\n                        \"nonce\": nonce.to_string()\n                    }),\n                ),\n            }\n        }\n\n        match read_frame(\u0026mut stream) {\n            Ok((OP_FRAME, v)) =\u003e {\n                let cmd = v[\"cmd\"].as_str().unwrap_or(\"\");\n                let evt = v[\"evt\"].as_str().unwrap_or(\"\");\n                let vnonce = v[\"nonce\"].as_str().unwrap_or(\"\");\n                trace!(cmd, evt, nonce = vnonce, \"ipc frame received\");\n\n                let (events, avatars, subscribe_channel, guild_id) = process_frame_events(\n                    \u0026v,\n                    \u0026local_user_id,\n                    \u0026local_username,\n                    local_avatar.as_ref(),\n                );\n                if !events.is_empty()\n                    || !avatars.is_empty()\n                    || subscribe_channel.is_some()\n                    || guild_id.is_some()\n                {\n                    for (uid, hash) in avatars {\n                        avatar::fetch_and_send(uid, hash, tx.clone());\n                    }\n                    for e in events {\n                        let _ = tx.send(e);\n                    }\n                    if let Some(cid) = subscribe_channel {\n                        subscribe_for_channel(\u0026mut stream, \u0026cid, \u0026mut nonce);\n                        // VOICE_CHANNEL_SELECT only carries the channel ID; fetch full\n                        // channel info (name, participants, guild_id) via a separate command.\n                        if evt == \"VOICE_CHANNEL_SELECT\" {\n                            send_cmd(\n                                \u0026mut stream,\n                                json!({\n                                    \"cmd\": \"GET_SELECTED_VOICE_CHANNEL\",\n                                    \"args\": {},\n                                    \"nonce\": \"gvsc\"\n                                }),\n                            );\n                        }\n                    }\n                    if let Some(gid) = guild_id {\n                        send_cmd(\n                            \u0026mut stream,\n                            json!({\n                                \"cmd\": \"GET_GUILD\",\n                                \"args\": { \"guild_id\": gid },\n                                \"nonce\": \"get_guild\"\n                            }),\n                        );\n                    }\n                    continue;\n                }\n\n                if cmd == \"GET_GUILD\" \u0026\u0026 vnonce == \"get_guild\" {\n                    if let Some(name) = v[\"data\"][\"name\"].as_str() {\n                        let _ = tx.send(DiscordEvent::GuildName {\n                            name: name.to_string(),\n                        });\n                    }\n                } else if cmd == \"GET_SELECTED_VOICE_CHANNEL\" \u0026\u0026 vnonce == \"gvsc\" {\n                    debug!(\"gvsc data: {}\", v[\"data\"]);\n                    if !v[\"data\"].is_null() {\n                        let cid = v[\"data\"][\"id\"].as_str().unwrap_or(\"\").to_string();\n                        if !cid.is_empty() {\n                            debug!(\"subscribing SPEAKING_START for channel {cid}\");\n                            subscribe_for_channel(\u0026mut stream, \u0026cid, \u0026mut nonce);\n                        }\n                        let others = parse_participants(\u0026v[\"data\"]);\n                        let self_p = others.iter().find(|p| p.user_id == local_user_id);\n                        let self_nick = self_p.and_then(|p| p.nick.clone());\n                        let self_avatar = local_avatar\n                            .clone()\n                            .or_else(|| self_p.and_then(|p| p.avatar_hash.clone()));\n                        let self_muted = self_p.map(|p| p.muted).unwrap_or(false);\n                        let self_deafened = self_p.map(|p| p.deafened).unwrap_or(false);\n                        let mut parts = vec![super::types::Participant {\n                            user_id: local_user_id.as_str().into(),\n                            username: local_username.clone(),\n                            nick: self_nick,\n                            avatar_hash: self_avatar,\n                            muted: self_muted,\n                            deafened: self_deafened,\n                        }];\n                        parts.extend(others.into_iter().filter(|p| p.user_id != local_user_id));\n                        let channel_name = v[\"data\"][\"name\"]\n                            .as_str()\n                            .filter(|s| !s.is_empty())\n                            .map(|s| s.to_string());\n                        debug!(\n                            \"[discord] {} participant(s) in channel {:?}\",\n                            parts.len(),\n                            channel_name\n                        );\n                        for p in \u0026parts {\n                            if let Some(hash) = \u0026p.avatar_hash {\n                                avatar::fetch_and_send(p.user_id.clone(), hash.clone(), tx.clone());\n                            }\n                        }\n                        let _ = tx.send(DiscordEvent::VoiceParticipants {\n                            participants: parts,\n                            channel_name,\n                        });\n                        if let Some(guild_id) = v[\"data\"][\"guild_id\"].as_str() {\n                            if !guild_id.is_empty() {\n                                send_cmd(\n                                    \u0026mut stream,\n                                    json!({\n                                        \"cmd\": \"GET_GUILD\",\n                                        \"args\": { \"guild_id\": guild_id },\n                                        \"nonce\": \"get_guild\"\n                                    }),\n                                );\n                            }\n                        }\n                    } else {\n                        debug!(\"not in a voice channel\");\n                        let _ = tx.send(DiscordEvent::VoiceParticipants {\n                            participants: vec![],\n                            channel_name: None,\n                        });\n                    }\n                } else if evt == \"VOICE_CHANNEL_SELECT\" {\n                    let cid = v[\"data\"][\"channel_id\"].as_str().unwrap_or(\"\");\n                    debug!(\"VOICE_CHANNEL_SELECT channel_id={cid:?}\");\n                    if !cid.is_empty() {\n                        send_cmd(\n                            \u0026mut stream,\n                            json!({\n                                \"cmd\": \"GET_SELECTED_VOICE_CHANNEL\",\n                                \"args\": {},\n                                \"nonce\": \"gvsc\"\n                            }),\n                        );\n                    } else {\n                        let _ = tx.send(DiscordEvent::GuildName {\n                            name: String::new(),\n                        });\n                        let _ = tx.send(DiscordEvent::VoiceParticipants {\n                            participants: vec![],\n                            channel_name: None,\n                        });\n                    }\n                } else if evt == \"SPEAKING_START\" {\n                    if let Some(uid) = v[\"data\"][\"user_id\"].as_str() {\n                        trace!(user_id = uid, \"speaking start\");\n                        let _ = tx.send(DiscordEvent::SpeakingUpdate {\n                            user_id: uid.into(),\n                            speaking: true,\n                        });\n                    }\n                } else if evt == \"SPEAKING_END\" {\n                    if let Some(uid) = v[\"data\"][\"user_id\"].as_str() {\n                        trace!(user_id = uid, \"speaking end\");\n                        let _ = tx.send(DiscordEvent::SpeakingUpdate {\n                            user_id: uid.into(),\n                            speaking: false,\n                        });\n                    }\n                } else if evt == \"VOICE_STATE_UPDATE\" {\n                    debug!(\"VOICE_STATE_UPDATE data={}\", v[\"data\"]);\n                    let p = parse_voice_state(\u0026v[\"data\"]);\n                    if !p.user_id.is_empty() {\n                        let _ = tx.send(DiscordEvent::ParticipantStateUpdate {\n                            user_id: p.user_id,\n                            muted: p.muted,\n                            deafened: p.deafened,\n                        });\n                    }\n                } else if evt == \"VOICE_STATE_CREATE\" {\n                    debug!(\"VOICE_STATE_CREATE data={}\", v[\"data\"]);\n                    let p = parse_voice_state(\u0026v[\"data\"]);\n                    if !p.user_id.is_empty() {\n                        if let Some(hash) = \u0026p.avatar_hash {\n                            avatar::fetch_and_send(p.user_id.clone(), hash.clone(), tx.clone());\n                        }\n                        let _ = tx.send(DiscordEvent::UserJoined(p));\n                    }\n                } else if evt == \"VOICE_STATE_DELETE\" {\n                    debug!(\"VOICE_STATE_DELETE data={}\", v[\"data\"]);\n                    if let Some(uid) = v[\"data\"][\"user\"][\"id\"].as_str() {\n                        let _ = tx.send(DiscordEvent::UserLeft {\n                            user_id: uid.into(),\n                        });\n                    }\n                } else if evt == \"ERROR\" {\n                    debug!(\n                        \"[discord] ERROR cmd={cmd:?} nonce={vnonce:?} msg={}\",\n                        v[\"data\"][\"message\"]\n                    );\n                } else {\n                    dispatch_event(\u0026v, tx);\n                }\n            }\n            Ok(_) =\u003e {}\n            Err(e) if is_timeout(\u0026e) =\u003e {}\n            Err(e) =\u003e {\n                warn!(\"read error: {e}\");\n                return Ok(());\n            }\n        }\n    }\n}\n\nfn wait_for_ready(stream: \u0026mut UnixStream) -\u003e Result\u003cValue, ()\u003e {\n    let deadline = std::time::Instant::now() + Duration::from_secs(10);\n    loop {\n        if std::time::Instant::now() \u003e deadline {\n            return Err(());\n        }\n        match read_frame(stream) {\n            Ok((OP_FRAME, v)) if v[\"evt\"] == \"READY\" =\u003e return Ok(v),\n            Ok(_) =\u003e continue,\n            Err(e) if is_timeout(\u0026e) =\u003e continue,\n            Err(_) =\u003e return Err(()),\n        }\n    }\n}\n\nfn process_frame_events(\n    v: \u0026Value,\n    local_user_id: \u0026str,\n    local_username: \u0026str,\n    local_avatar: Option\u003c\u0026String\u003e,\n) -\u003e FrameProcessResult {\n    let handlers = get_event_handlers();\n\n    for handler in handlers {\n        if handler.matches(v) {\n            if let Some(result) = handler.handle(v, local_user_id, local_username, local_avatar) {\n                return result;\n            }\n        }\n    }\n\n    (Vec::new(), Vec::new(), None, None)\n}\n\nfn dispatch_event(v: \u0026Value, tx: \u0026calloop::channel::Sender\u003cDiscordEvent\u003e) {\n    match v[\"evt\"].as_str() {\n        Some(\"VOICE_SETTINGS_UPDATE\") =\u003e {\n            let mute = v[\"data\"][\"mute\"].as_bool().unwrap_or(false);\n            let deaf = v[\"data\"][\"deaf\"].as_bool().unwrap_or(false);\n            let _ = tx.send(DiscordEvent::VoiceSettings { mute, deaf });\n            if let Some(mode_type) = v[\"data\"][\"mode\"][\"type\"].as_str() {\n                let ptt = mode_type == \"PUSH_TO_TALK\";\n                let _ = tx.send(DiscordEvent::VoiceMode { ptt });\n            }\n        }\n        _ =\u003e {\n            if v[\"cmd\"] == \"GET_VOICE_SETTINGS\" \u0026\u0026 v[\"nonce\"] == \"gvs\" {\n                let mute = v[\"data\"][\"mute\"].as_bool().unwrap_or(false);\n                let deaf = v[\"data\"][\"deaf\"].as_bool().unwrap_or(false);\n                let _ = tx.send(DiscordEvent::VoiceSettings { mute, deaf });\n                if let Some(mode_type) = v[\"data\"][\"mode\"][\"type\"].as_str() {\n                    let ptt = mode_type == \"PUSH_TO_TALK\";\n                    let _ = tx.send(DiscordEvent::VoiceMode { ptt });\n                }\n            }\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::super::handlers::EventHandler;\n    use super::*;\n    use serde_json::json;\n    use std::io::{self, Cursor};\n\n    #[test]\n    fn is_timeout_kinds() {\n        let e1 = io::Error::new(io::ErrorKind::WouldBlock, \"\");\n        let e2 = io::Error::new(io::ErrorKind::TimedOut, \"\");\n        let e3 = io::Error::other(\"\");\n        assert!(is_timeout(\u0026e1));\n        assert!(is_timeout(\u0026e2));\n        assert!(!is_timeout(\u0026e3));\n    }\n\n    #[test]\n    fn dispatch_event_get_voice_settings() {\n        let (tx, rx) = calloop::channel::channel::\u003cDiscordEvent\u003e();\n        let v = json!({\n            \"cmd\": \"GET_VOICE_SETTINGS\",\n            \"nonce\": \"gvs\",\n            \"data\": { \"mute\": true, \"deaf\": false, \"mode\": { \"type\": \"PUSH_TO_TALK\" } }\n        });\n        dispatch_event(\u0026v, \u0026tx);\n        let e1 = rx.recv().unwrap();\n        match e1 {\n            DiscordEvent::VoiceSettings { mute, deaf } =\u003e {\n                assert!(mute);\n                assert!(!deaf);\n            }\n            _ =\u003e panic!(\"expected VoiceSettings\"),\n        }\n        let e2 = rx.recv().unwrap();\n        match e2 {\n            DiscordEvent::VoiceMode { ptt } =\u003e assert!(ptt),\n            _ =\u003e panic!(\"expected VoiceMode\"),\n        }\n    }\n\n    #[test]\n    fn dispatch_event_voice_settings_update_without_mode() {\n        let (tx, rx) = calloop::channel::channel::\u003cDiscordEvent\u003e();\n        let v = json!({ \"evt\": \"VOICE_SETTINGS_UPDATE\", \"data\": { \"mute\": false, \"deaf\": false } });\n        dispatch_event(\u0026v, \u0026tx);\n        let e = rx.recv().unwrap();\n        match e {\n            DiscordEvent::VoiceSettings { mute, deaf } =\u003e {\n                assert!(!mute);\n                assert!(!deaf);\n            }\n            _ =\u003e panic!(\"expected VoiceSettings\"),\n        }\n        assert!(rx.try_recv().is_err());\n    }\n\n    #[test]\n    fn dispatch_event_voice_settings_update_with_mode() {\n        let (tx, rx) = calloop::channel::channel::\u003cDiscordEvent\u003e();\n        let v = json!({ \"evt\": \"VOICE_SETTINGS_UPDATE\", \"data\": { \"mute\": false, \"deaf\": true, \"mode\": { \"type\": \"VOICE_ACTIVITY\" } } });\n        dispatch_event(\u0026v, \u0026tx);\n        let e1 = rx.recv().unwrap();\n        match e1 {\n            DiscordEvent::VoiceSettings { mute, deaf } =\u003e {\n                assert!(!mute);\n                assert!(deaf);\n            }\n            _ =\u003e panic!(\"expected VoiceSettings\"),\n        }\n        let e2 = rx.recv().unwrap();\n        match e2 {\n            DiscordEvent::VoiceMode { ptt } =\u003e assert!(!ptt),\n            _ =\u003e panic!(\"expected VoiceMode\"),\n        }\n    }\n\n    #[test]\n    fn dispatch_event_ptt_true() {\n        let (tx, rx) = calloop::channel::channel::\u003cDiscordEvent\u003e();\n        let v = json!({ \"evt\": \"VOICE_SETTINGS_UPDATE\", \"data\": { \"mute\": false, \"deaf\": false, \"mode\": { \"type\": \"PUSH_TO_TALK\" } } });\n        dispatch_event(\u0026v, \u0026tx);\n        let e1 = rx.recv().unwrap();\n        match e1 {\n            DiscordEvent::VoiceSettings { mute, deaf } =\u003e {\n                assert!(!mute);\n                assert!(!deaf);\n            }\n            _ =\u003e panic!(\"expected VoiceSettings\"),\n        }\n        let e2 = rx.recv().unwrap();\n        match e2 {\n            DiscordEvent::VoiceMode { ptt } =\u003e assert!(ptt),\n            _ =\u003e panic!(\"expected VoiceMode\"),\n        }\n        assert!(rx.try_recv().is_err());\n    }\n\n    #[test]\n    fn wait_for_ready_reads_ready() {\n        let (mut a, mut b) = std::os::unix::net::UnixStream::pair().unwrap();\n        let non_ready = json!({\"evt\": \"NOT_READY\"});\n        super::super::ipc::write_frame(\u0026mut a, super::super::ipc::OP_FRAME, \u0026non_ready.to_string())\n            .expect(\"write\");\n        let ready = json!({\"evt\": \"READY\", \"data\": { \"user\": { \"id\": \"u1\", \"username\": \"bob\" }}});\n        super::super::ipc::write_frame(\u0026mut a, super::super::ipc::OP_FRAME, \u0026ready.to_string())\n            .expect(\"write\");\n        let got = wait_for_ready(\u0026mut b).expect(\"wait_for_ready\");\n        assert_eq!(got[\"evt\"].as_str().unwrap(), \"READY\");\n        assert_eq!(got[\"data\"][\"user\"][\"id\"].as_str().unwrap(), \"u1\");\n    }\n\n    #[test]\n    fn read_frame_invalid_json() {\n        use std::io::Write;\n        let mut c = Cursor::new(Vec::new());\n        let op = 1u32;\n        let payload = b\"not-json\";\n        c.write_all(\u0026op.to_le_bytes()).unwrap();\n        c.write_all(\u0026(payload.len() as u32).to_le_bytes()).unwrap();\n        c.write_all(payload).unwrap();\n        c.set_position(0);\n        let res = super::super::ipc::read_frame(\u0026mut c);\n        assert!(res.is_err());\n        assert_eq!(res.unwrap_err().kind(), io::ErrorKind::InvalidData);\n    }\n\n    #[test]\n    fn process_frame_get_selected_empty() {\n        let v = json!({\"cmd\": \"GET_SELECTED_VOICE_CHANNEL\", \"nonce\": \"gvsc\", \"data\": null});\n        let (events, avatars, subscribe, guild) = process_frame_events(\u0026v, \"local\", \"me\", None);\n        assert_eq!(events.len(), 1);\n        match \u0026events[0] {\n            DiscordEvent::VoiceParticipants {\n                participants,\n                channel_name,\n            } =\u003e {\n                assert!(participants.is_empty());\n                assert!(channel_name.is_none());\n            }\n            _ =\u003e panic!(\"expected VoiceParticipants\"),\n        }\n        assert!(avatars.is_empty());\n        assert!(subscribe.is_none());\n        assert!(guild.is_none());\n    }\n\n    #[test]\n    fn process_frame_get_selected_with_data() {\n        let data = json!({\n            \"id\": \"chan1\",\n            \"name\": \"Room\",\n            \"guild_id\": \"g1\",\n            \"voice_states\": [\n                { \"user\": { \"id\": \"local\", \"username\": \"me\", \"avatar\": \"ahash\" }, \"voice_state\": { \"self_mute\": false, \"self_deaf\": false }, \"nick\": \"MeNick\" },\n                { \"user\": { \"id\": \"u2\", \"username\": \"Bob\", \"avatar\": \"bh\" }, \"voice_state\": {}, \"nick\": \"BobNick\" }\n            ]\n        });\n        let v = json!({\"cmd\": \"GET_SELECTED_VOICE_CHANNEL\", \"nonce\": \"gvsc\", \"data\": data});\n        let (events, avatars, subscribe, guild) = process_frame_events(\u0026v, \"local\", \"me\", None);\n        assert_eq!(subscribe, Some(\"chan1\".to_string()));\n        assert_eq!(guild, Some(\"g1\".to_string()));\n        assert_eq!(events.len(), 1);\n        match \u0026events[0] {\n            DiscordEvent::VoiceParticipants {\n                participants,\n                channel_name,\n            } =\u003e {\n                assert_eq!(participants.len(), 2);\n                assert_eq!(channel_name.as_deref(), Some(\"Room\"));\n                assert_eq!(participants[0].user_id, \"local\");\n                assert_eq!(\n                    participants[0]\n                        .nick\n                        .as_deref()\n                        .unwrap_or(\u0026participants[0].username),\n                    \"MeNick\"\n                );\n                assert_eq!(participants[1].user_id, \"u2\");\n                assert_eq!(\n                    participants[1]\n                        .nick\n                        .as_deref()\n                        .unwrap_or(\u0026participants[1].username),\n                    \"BobNick\"\n                );\n            }\n            _ =\u003e panic!(\"expected VoiceParticipants\"),\n        }\n        assert_eq!(avatars.len(), 2);\n    }\n\n    #[test]\n    fn process_frame_speaking_start_end() {\n        let v1 = json!({\"evt\": \"SPEAKING_START\", \"data\": {\"user_id\": \"u1\"}});\n        let h1 = super::super::handlers::SpeakingStartHandler;\n        let res1 = h1.handle(\u0026v1, \"local\", \"me\", None).unwrap();\n        assert_eq!(res1.0.len(), 1);\n\n        let v2 = json!({\"evt\": \"SPEAKING_END\", \"data\": {\"user_id\": \"u1\"}});\n        let h2 = super::super::handlers::SpeakingEndHandler;\n        let res2 = h2.handle(\u0026v2, \"local\", \"me\", None).unwrap();\n        assert_eq!(res2.0.len(), 1);\n    }\n\n    #[test]\n    fn process_frame_voice_state_update_create_delete() {\n        let vs_update = json!({\n            \"user\": {\"id\": \"u2\", \"username\": \"frank\"},\n            \"voice_state\": {\"self_mute\": true, \"self_deaf\": false, \"mute\": false, \"deaf\": false}\n        });\n        let v_update = json!({\"evt\": \"VOICE_STATE_UPDATE\", \"data\": vs_update});\n        let h_update = super::super::handlers::VoiceStateUpdateHandler;\n        let res_update = h_update.handle(\u0026v_update, \"local\", \"me\", None).unwrap();\n        assert_eq!(res_update.0.len(), 1);\n\n        let vs_create = json!({\n            \"user\": {\"id\": \"u2\", \"username\": \"frank\", \"avatar\": \"hash123\"},\n            \"voice_state\": {\"self_mute\": true, \"self_deaf\": false, \"mute\": false, \"deaf\": false}\n        });\n        let v_create = json!({\"evt\": \"VOICE_STATE_CREATE\", \"data\": vs_create});\n        let h_create = super::super::handlers::VoiceStateCreateHandler;\n        let res_create = h_create.handle(\u0026v_create, \"local\", \"me\", None).unwrap();\n        assert_eq!(res_create.0.len(), 1);\n        assert_eq!(res_create.1.len(), 1);\n\n        let v_delete = json!({\"evt\": \"VOICE_STATE_DELETE\", \"data\": {\"user\": {\"id\": \"u3\"}}});\n        let h_delete = super::super::handlers::VoiceStateDeleteHandler;\n        let res_delete = h_delete.handle(\u0026v_delete, \"local\", \"me\", None).unwrap();\n        assert_eq!(res_delete.0.len(), 1);\n    }\n\n    #[test]\n    fn process_frame_with_invalid_json() {\n        let v = json!({\"invalid\": \"test\"});\n        let (events, _, _, _) = process_frame_events(\u0026v, \"local\", \"me\", None);\n        assert!(events.is_empty());\n    }\n}\n","traces":[{"line":18,"address":[12344405,12344369,12340048],"length":1,"stats":{"Line":0}},{"line":23,"address":[12340087],"length":1,"stats":{"Line":0}},{"line":24,"address":[12344364],"length":1,"stats":{"Line":0}},{"line":25,"address":[12340174,12340099,12340565],"length":1,"stats":{"Line":0}},{"line":26,"address":[12340548,12341484],"length":1,"stats":{"Line":0}},{"line":27,"address":[12341925],"length":1,"stats":{"Line":0}},{"line":28,"address":[12341528,12341930],"length":1,"stats":{"Line":0}},{"line":29,"address":[12341913],"length":1,"stats":{"Line":0}},{"line":32,"address":[12341497,12342901],"length":1,"stats":{"Line":0}},{"line":35,"address":[12344228,12342860],"length":1,"stats":{"Line":0}},{"line":36,"address":[12344235],"length":1,"stats":{"Line":0}},{"line":37,"address":[12344279],"length":1,"stats":{"Line":0}},{"line":42,"address":[12395507,12391744,12395457],"length":1,"stats":{"Line":0}},{"line":45,"address":[12392189,12392409,12391995,12395696,12391881],"length":1,"stats":{"Line":0}},{"line":53,"address":[12395608,12392736,12393375,12392619,12392946,12393152],"length":1,"stats":{"Line":0}},{"line":62,"address":[12394151,12393735,12394374,12395520,12393945,12393618],"length":1,"stats":{"Line":0}},{"line":71,"address":[12395435,12394734,12395463,12395160,12394617,12394937],"length":1,"stats":{"Line":0}},{"line":79,"address":[12345473,12344432,12345467],"length":1,"stats":{"Line":0}},{"line":84,"address":[12344547],"length":1,"stats":{"Line":0}},{"line":86,"address":[12345486,12345548],"length":1,"stats":{"Line":0}},{"line":87,"address":[12345582],"length":1,"stats":{"Line":0}},{"line":89,"address":[12345633,12346048], Line":1}},{"line":403,"address":[12390825],"length":1,"stats":{"Line":1}},{"line":404,"address":[12390863],"length":1,"stats":{"Line":1}}],"covered":28,"coverable":189},{"path":["/","home","ggomes","Documents","discord-overlay","src","discord","handlers.rs"],"content":"//! Event handlers for Discord IPC frame processing.\n\nuse super::parser::{parse_participants, parse_voice_state};\nuse super::types::{DiscordEvent, JsonExt, Participant, ParticipantBuilder};\nuse serde_json::Value;\n\npub type FrameProcessResult = (\n    Vec\u003cDiscordEvent\u003e,\n    Vec\u003c(crate::discord::UserId, String)\u003e,\n    Option\u003cString\u003e,\n    Option\u003cString\u003e,\n);\n\n/// Cached data about the local user from participant list.\nstruct SelfParticipantData {\n    nick: Option\u003cString\u003e,\n    avatar_hash: Option\u003cString\u003e,\n    muted: bool,\n    deafened: bool,\n}\n\n/// Extract local user's data from participant list in a single pass.\n/// Returns the data and a vec of all other participants.\nfn extract_self_data(\n    participants: \u0026[Participant],\n    local_user_id: \u0026str,\n    local_avatar: Option\u003c\u0026String\u003e,\n) -\u003e (SelfParticipantData, Vec\u003cParticipant\u003e) {\n    let self_data = participants\n        .iter()\n        .find(|p| p.user_id == local_user_id)\n        .map(|p| SelfParticipantData {\n            nick: p.nick.clone(),\n            avatar_hash: local_avatar.cloned().or_else(|| p.avatar_hash.clone()),\n            muted: p.muted,\n            deafened: p.deafened,\n        })\n        .unwrap_or(SelfParticipantData {\n            nick: None,\n            avatar_hash: local_avatar.cloned(),\n            muted: false,\n            deafened: false,\n        });\n\n    let others = participants\n        .iter()\n        .filter(|p| p.user_id != local_user_id)\n        .cloned()\n        .collect();\n\n    (self_data, others)\n}\n\npub trait EventHandler {\n    fn matches(\u0026self, v: \u0026Value) -\u003e bool;\n    fn handle(\n        \u0026self,\n        v: \u0026Value,\n        local_user_id: \u0026str,\n        local_username: \u0026str,\n        local_avatar: Option\u003c\u0026String\u003e,\n    ) -\u003e Option\u003cFrameProcessResult\u003e;\n}\n\npub struct GetGuildHandler;\nimpl EventHandler for GetGuildHandler {\n    fn matches(\u0026self, v: \u0026Value) -\u003e bool {\n        v.get_string(\"cmd\") == \"GET_GUILD\" \u0026\u0026 v.get_string(\"nonce\") == \"get_guild\"\n    }\n\n    fn handle(\n        \u0026self,\n        v: \u0026Value,\n        _local_user_id: \u0026str,\n        _local_username: \u0026str,\n        _local_avatar: Option\u003c\u0026String\u003e,\n    ) -\u003e Option\u003cFrameProcessResult\u003e {\n        if let Some(name) = v[\"data\"].get_str_option(\"name\") {\n            let events = vec![DiscordEvent::GuildName { name }];\n            return Some((events, Vec::new(), None, None));\n        }\n        None\n    }\n}\n\npub struct VoiceChannelSelectHandler;\nimpl EventHandler for VoiceChannelSelectHandler {\n    fn matches(\u0026self, v: \u0026Value) -\u003e bool {\n        v.get_string(\"cmd\") == \"GET_SELECTED_VOICE_CHANNEL\" \u0026\u0026 v.get_string(\"nonce\") == \"gvsc\"\n    }\n\n    fn handle(\n        \u0026self,\n        v: \u0026Value,\n        local_user_id: \u0026str,\n        local_username: \u0026str,\n        local_avatar: Option\u003c\u0026String\u003e,\n    ) -\u003e Option\u003cFrameProcessResult\u003e {\n        if !v[\"data\"].is_null() {\n            let subscribe_channel = v[\"data\"].get_str_option(\"id\");\n\n            let all_participants = parse_participants(\u0026v[\"data\"]);\n            let (self_data, others) =\n                extract_self_data(\u0026all_participants, local_user_id, local_avatar);\n\n            let mut parts =\n                vec![\n                    ParticipantBuilder::new(local_user_id.to_string(), local_username)\n                        .nick(self_data.nick)\n                        .avatar_hash(self_data.avatar_hash.clone())\n                        .muted(self_data.muted)\n                        .deafened(self_data.deafened)\n                        .build(),\n                ];\n            parts.extend(others);\n\n            let channel_name = v[\"data\"][\"name\"]\n                .as_str()\n                .filter(|s| !s.is_empty())\n                .map(|s| s.to_string());\n\n            let mut avatars = Vec::new();\n            for p in \u0026parts {\n                if let Some(hash) = \u0026p.avatar_hash {\n                    avatars.push((p.user_id.clone(), hash.clone()));\n                }\n            }\n\n            let guild_id = v[\"data\"][\"guild_id\"]\n                .as_str()\n                .filter(|s| !s.is_empty())\n                .map(|s| s.to_string());\n\n            let events = vec![DiscordEvent::VoiceParticipants {\n                participants: parts,\n                channel_name,\n            }];\n\n            Some((events, avatars, subscribe_channel, guild_id))\n        } else {\n            let events = vec![DiscordEvent::VoiceParticipants {\n                participants: vec![],\n                channel_name: None,\n            }];\n            Some((events, Vec::new(), None, None))\n        }\n    }\n}\n\npub struct SpeakingStartHandler;\nimpl EventHandler for SpeakingStartHandler {\n    fn matches(\u0026self, v: \u0026Value) -\u003e bool {\n        v.get_string(\"evt\") == \"SPEAKING_START\"\n    }\n\n    fn handle(\n        \u0026self,\n        v: \u0026Value,\n        _local_user_id: \u0026str,\n        _local_username: \u0026str,\n        _local_avatar: Option\u003c\u0026String\u003e,\n    ) -\u003e Option\u003cFrameProcessResult\u003e {\n        if let Some(uid) = v[\"data\"].get_str_option(\"user_id\") {\n            let events = vec![DiscordEvent::SpeakingUpdate {\n                user_id: uid.into(),\n                speaking: true,\n            }];\n            return Some((events, Vec::new(), None, None));\n        }\n        None\n    }\n}\n\npub struct SpeakingEndHandler;\nimpl EventHandler for SpeakingEndHandler {\n    fn matches(\u0026self, v: \u0026Value) -\u003e bool {\n        v.get_string(\"evt\") == \"SPEAKING_END\"\n    }\n\n    fn handle(\n        \u0026self,\n        v: \u0026Value,\n        _local_user_id: \u0026str,\n        _local_username: \u0026str,\n        _local_avatar: Option\u003c\u0026String\u003e,\n    ) -\u003e Option\u003cFrameProcessResult\u003e {\n        if let Some(uid) = v[\"data\"].get_str_option(\"user_id\") {\n            let events = vec![DiscordEvent::SpeakingUpdate {\n                user_id: uid.into(),\n                speaking: false,\n            }];\n            return Some((events, Vec::new(), None, None));\n        }\n        None\n    }\n}\n\npub struct VoiceStateUpdateHandler;\nimpl EventHandler for VoiceStateUpdateHandler {\n    fn matches(\u0026self, v: \u0026Value) -\u003e bool {\n        v.get_string(\"evt\") == \"VOICE_STATE_UPDATE\"\n    }\n\n    fn handle(\n        \u0026self,\n        v: \u0026Value,\n        _local_user_id: \u0026str,\n        _local_username: \u0026str,\n        _local_avatar: Option\u003c\u0026String\u003e,\n    ) -\u003e Option\u003cFrameProcessResult\u003e {\n        let p = parse_voice_state(\u0026v[\"data\"]);\n        if !p.user_id.is_empty() {\n            let events = vec![DiscordEvent::ParticipantStateUpdate {\n                user_id: p.user_id,\n                muted: p.muted,\n                deafened: p.deafened,\n            }];\n            return Some((events, Vec::new(), None, None));\n        }\n        None\n    }\n}\n\npub struct VoiceStateCreateHandler;\nimpl EventHandler for VoiceStateCreateHandler {\n    fn matches(\u0026self, v: \u0026Value) -\u003e bool {\n        v.get_string(\"evt\") == \"VOICE_STATE_CREATE\"\n    }\n\n    fn handle(\n        \u0026self,\n        v: \u0026Value,\n        _local_user_id: \u0026str,\n        _local_username: \u0026str,\n        _local_avatar: Option\u003c\u0026String\u003e,\n    ) -\u003e Option\u003cFrameProcessResult\u003e {\n        let p = parse_voice_state(\u0026v[\"data\"]);\n        if !p.user_id.is_empty() {\n            let mut avatars = Vec::new();\n            if let Some(hash) = \u0026p.avatar_hash {\n                avatars.push((p.user_id.clone(), hash.clone()));\n            }\n            let events = vec![DiscordEvent::UserJoined(p)];\n            return Some((events, avatars, None, None));\n        }\n        None\n    }\n}\n\npub struct VoiceStateDeleteHandler;\nimpl EventHandler for VoiceStateDeleteHandler {\n    fn matches(\u0026self, v: \u0026Value) -\u003e bool {\n        v.get_string(\"evt\") == \"VOICE_STATE_DELETE\"\n    }\n\n    fn handle(\n        \u0026self,\n        v: \u0026Value,\n        _local_user_id: \u0026str,\n        _local_username: \u0026str,\n        _local_avatar: Option\u003c\u0026String\u003e,\n    ) -\u003e Option\u003cFrameProcessResult\u003e {\n        if let Some(uid) = v[\"data\"][\"user\"][\"id\"].as_str() {\n            let events = vec![DiscordEvent::UserLeft {\n                user_id: uid.into(),\n            }];\n            return Some((events, Vec::new(), None, None));\n        }\n        None\n    }\n}\n\npub struct VoiceChannelSelectEventHandler;\nimpl EventHandler for VoiceChannelSelectEventHandler {\n    fn matches(\u0026self, v: \u0026Value) -\u003e bool {\n        v.get_string(\"evt\") == \"VOICE_CHANNEL_SELECT\"\n    }\n\n    fn handle(\n        \u0026self,\n        v: \u0026Value,\n        _local_user_id: \u0026str,\n        _local_username: \u0026str,\n        _local_avatar: Option\u003c\u0026String\u003e,\n    ) -\u003e Option\u003cFrameProcessResult\u003e {\n        if let Some(cid) = v[\"data\"].get_str_option(\"channel_id\") {\n            Some((Vec::new(), Vec::new(), Some(cid), None))\n        } else {\n            let events = vec![\n                DiscordEvent::GuildName {\n                    name: String::new(),\n                },\n                DiscordEvent::VoiceParticipants {\n                    participants: vec![],\n                    channel_name: None,\n                },\n            ];\n            Some((events, Vec::new(), None, None))\n        }\n    }\n}\n\npub fn get_event_handlers() -\u003e Vec\u003cBox\u003cdyn EventHandler\u003e\u003e {\n    vec![\n        Box::new(GetGuildHandler),\n        Box::new(VoiceChannelSelectHandler),\n        Box::new(SpeakingStartHandler),\n        Box::new(SpeakingEndHandler),\n        Box::new(VoiceStateUpdateHandler),\n        Box::new(VoiceStateCreateHandler),\n        Box::new(VoiceStateDeleteHandler),\n        Box::new(VoiceChannelSelectEventHandler),\n    ]\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use serde_json::json;\n\n    #[test]\n    fn process_frame_speaking_start() {\n        let v = json!({\"evt\": \"SPEAKING_START\", \"data\": {\"user_id\": \"u1\"}});\n        let h = SpeakingStartHandler;\n        let res = h.handle(\u0026v, \"local\", \"me\", None);\n        assert!(res.is_some());\n        let (events, _, _, _) = res.unwrap();\n        assert_eq!(events.len(), 1);\n        match \u0026events[0] {\n            DiscordEvent::SpeakingUpdate { user_id, speaking } =\u003e {\n                assert!(user_id == \"u1\");\n                assert!(*speaking);\n            }\n            _ =\u003e panic!(\"expected SpeakingUpdate\"),\n        }\n    }\n\n    #[test]\n    fn process_frame_speaking_end() {\n        let v = json!({\"evt\": \"SPEAKING_END\", \"data\": {\"user_id\": \"u2\"}});\n        let h = SpeakingEndHandler;\n        let res = h.handle(\u0026v, \"local\", \"me\", None);\n        assert!(res.is_some());\n        let (events, _, _, _) = res.unwrap();\n        assert_eq!(events.len(), 1);\n        match \u0026events[0] {\n            DiscordEvent::SpeakingUpdate { user_id, speaking } =\u003e {\n                assert!(user_id == \"u2\");\n                assert!(!*speaking);\n            }\n            _ =\u003e panic!(\"expected SpeakingUpdate\"),\n        }\n    }\n\n    #[test]\n    fn process_frame_voice_state_update() {\n        let vs = json!({\n            \"user\": {\"id\": \"u3\", \"username\": \"dave\"},\n            \"voice_state\": {\"self_mute\": true, \"self_deaf\": false, \"mute\": false, \"deaf\": false}\n        });\n        let v = json!({\"evt\": \"VOICE_STATE_UPDATE\", \"data\": vs});\n        let h = VoiceStateUpdateHandler;\n        let res = h.handle(\u0026v, \"local\", \"me\", None);\n        assert!(res.is_some());\n        let (events, _, _, _) = res.unwrap();\n        assert_eq!(events.len(), 1);\n        match \u0026events[0] {\n            DiscordEvent::ParticipantStateUpdate {\n                user_id,\n                muted,\n                deafened,\n            } =\u003e {\n                assert!(user_id == \"u3\");\n                assert!(*muted);\n                assert!(!*deafened);\n            }\n            _ =\u003e panic!(\"expected ParticipantStateUpdate\"),\n        }\n    }\n\n    #[test]\n    fn process_frame_voice_state_create() {\n        let vs = json!({\n            \"user\": {\"id\": \"u4\", \"username\": \"eve\", \"avatar\": \"ehash\"},\n            \"voice_state\": {\"self_mute\": false, \"self_deaf\": false, \"mute\": false, \"deaf\": false}\n        });\n        let v = json!({\"evt\": \"VOICE_STATE_CREATE\", \"data\": vs});\n        let h = VoiceStateCreateHandler;\n        let res = h.handle(\u0026v, \"local\", \"me\", None);\n        assert!(res.is_some());\n        let (events, avatars, _, _) = res.unwrap();\n        assert_eq!(events.len(), 1);\n        assert_eq!(avatars.len(), 1);\n        assert_eq!(avatars[0].0, \"u4\");\n        assert_eq!(avatars[0].1, \"ehash\");\n        match \u0026events[0] {\n            DiscordEvent::UserJoined(p) =\u003e {\n                assert_eq!(p.user_id, \"u4\");\n                assert_eq!(p.username, \"eve\");\n            }\n            _ =\u003e panic!(\"expected UserJoined\"),\n        }\n    }\n\n    #[test]\n    fn process_frame_voice_state_delete() {\n        let v = json!({\"evt\": \"VOICE_STATE_DELETE\", \"data\": {\"user\": {\"id\": \"u5\"}}});\n        let h = VoiceStateDeleteHandler;\n        let res = h.handle(\u0026v, \"local\", \"me\", None);\n        assert!(res.is_some());\n        let (events, _, _, _) = res.unwrap();\n        assert_eq!(events.len(), 1);\n        match \u0026events[0] {\n            DiscordEvent::UserLeft { user_id } =\u003e {\n                assert!(user_id == \"u5\");\n            }\n            _ =\u003e panic!(\"expected UserLeft\"),\n        }\n    }\n\n    #[test]\n    fn process_frame_voice_channel_select_event() {\n        let v = json!({\"evt\": \"VOICE_CHANNEL_SELECT\", \"data\": {\"channel_id\": \"ch1\"}});\n        let h = VoiceChannelSelectEventHandler;\n        let res = h.handle(\u0026v, \"local\", \"me\", None);\n        assert!(res.is_some());\n        let (events, _, subscribe, _) = res.unwrap();\n        assert!(events.is_empty());\n        assert_eq!(subscribe, Some(\"ch1\".to_string()));\n    }\n\n    #[test]\n    fn process_frame_voice_channel_select_event_empty() {\n        let v = json!({\"evt\": \"VOICE_CHANNEL_SELECT\", \"data\": {\"channel_id\": \"\"}});\n        let h = VoiceChannelSelectEventHandler;\n        let res = h.handle(\u0026v, \"local\", \"me\", None);\n        assert!(res.is_some());\n        let (events, _, _, _) = res.unwrap();\n        assert_eq!(events.len(), 2);\n        match (\u0026events[0], \u0026events[1]) {\n            (\n                DiscordEvent::GuildName { name },\n                DiscordEvent::VoiceParticipants {\n                    participants,\n                    channel_name,\n                },\n            ) =\u003e {\n                assert!(name.is_empty());\n                assert!(participants.is_empty());\n                assert!(channel_name.is_none());\n            }\n            _ =\u003e panic!(\"expected GuildName and VoiceParticipants\"),\n        }\n    }\n\n    #[test]\n    fn process_frame_get_guild() {\n        let v = json!({\"cmd\": \"GET_GUILD\", \"nonce\": \"get_guild\", \"data\": {\"name\": \"MyServer\"}});\n        let h = GetGuildHandler;\n        let res = h.handle(\u0026v, \"local\", \"me\", None);\n        assert!(res.is_some());\n        let (events, _, _, _) = res.unwrap();\n        assert_eq!(events.len(), 1);\n        match \u0026events[0] {\n            DiscordEvent::GuildName { name } =\u003e {\n                assert_eq!(name, \"MyServer\");\n            }\n            _ =\u003e panic!(\"expected GuildName\"),\n        }\n    }\n\n    #[test]\n    fn process_frame_voice_channel_select_nonempty() {\n        let data = json!({\n            \"id\": \"chan2\",\n            \"name\": \"General\",\n            \"guild_id\": \"g2\",\n            \"voice_states\": [\n                { \"user\": { \"id\": \"u1\", \"username\": \"alice\" }, \"voice_state\": {} }\n            ]\n        });\n        let v = json!({\"cmd\": \"GET_SELECTED_VOICE_CHANNEL\", \"nonce\": \"gvsc\", \"data\": data});\n        let h = VoiceChannelSelectHandler;\n        let res = h.handle(\u0026v, \"u1\", \"alice\", None);\n        assert!(res.is_some());\n        let (events, _, subscribe, guild) = res.unwrap();\n        assert_eq!(events.len(), 1);\n        assert_eq!(subscribe, Some(\"chan2\".to_string()));\n        assert_eq!(guild, Some(\"g2\".to_string()));\n    }\n}\n","traces":[{"line":24,"address":[12114173,12114179,12113536],"length":1,"stats":{"Line":2}},{"line":29,"address":[12113610,12113660,12113848],"length":1,"stats":{"Line":5}},{"line":31,"address":[12113652],"length":1,"stats":{"Line":5}},{"line":32,"address":[12113681],"length":1,"stats":{"Line":4}},{"line":33,"address":[12201355],"length":1,"stats":{"Line":1}},{"line":34,"address":[12201445,12201378,12201681,12201664],"length":1,"stats":{"Line":7}},{"line":35,"address":[12201466],"length },{"line":310,"address":[12114615,12114669],"length":1,"stats":{"Line":4}},{"line":311,"address":[12114692,12114746],"length":1,"stats":{"Line":3}},{"line":312,"address":[12114769],"length":1,"stats":{"Line":1}}],"covered":115,"coverable":121},{"path":["/","home","ggomes","Documents","discord-overlay","src","discord","ipc.rs"],"content":"//! Low-level IPC protocol: socket finding, frame I/O, token caching.\n\nuse serde_json::{json, Value};\nuse std::io::{self, Read, Write};\nuse std::os::unix::net::UnixStream;\nuse tracing::{debug, info, warn};\n\n/// Frame structure: [op: u32 LE][len: u32 LE][payload: UTF-8 JSON]\npub const OP_HANDSHAKE: u32 = 0;\npub const OP_FRAME: u32 = 1;\n\nfn get_uid() -\u003e u32 {\n    std::fs::read_to_string(\"/proc/self/status\")\n        .ok()\n        .and_then(|s| {\n            s.lines()\n                .find(|l| l.starts_with(\"Uid:\"))\n                .and_then(|l| l.split_whitespace().nth(1))\n                .and_then(|s| s.parse().ok())\n        })\n        .unwrap_or(1000)\n}\n\npub fn find_socket() -\u003e Option\u003cUnixStream\u003e {\n    let uid = get_uid();\n    let runtime = std::env::var(\"XDG_RUNTIME_DIR\").unwrap_or_else(|_| format!(\"/run/user/{uid}\"));\n    let tmpdir = std::env::var(\"TMPDIR\").unwrap_or_else(|_| \"/tmp\".to_string());\n\n    let bases = [\n        runtime.clone(),\n        format!(\"{runtime}/app/com.discordapp.Discord\"), // Flatpak\n        format!(\"{runtime}/snap.discord\"),               // Snap\n        tmpdir,\n        \"/tmp\".to_string(),\n    ];\n\n    for base in \u0026bases {\n        for i in 0..10 {\n            let path = format!(\"{base}/discord-ipc-{i}\");\n            if let Ok(s) = UnixStream::connect(\u0026path) {\n                info!(\"connected to {path}\");\n                return Some(s);\n            }\n        }\n    }\n    None\n}\n\npub fn write_frame(stream: \u0026mut impl Write, op: u32, payload: \u0026str) -\u003e io::Result\u003c()\u003e {\n    let data = payload.as_bytes();\n    stream.write_all(\u0026op.to_le_bytes())?;\n    stream.write_all(\u0026(data.len() as u32).to_le_bytes())?;\n    stream.write_all(data)\n}\n\n/// Maximum IPC frame payload size (16 MiB). Discord frames are tiny in practice;\n/// this guards against corrupt or malicious length fields causing huge allocations.\nconst MAX_FRAME_LEN: usize = 16 * 1024 * 1024;\n\npub fn read_frame(stream: \u0026mut impl Read) -\u003e io::Result\u003c(u32, Value)\u003e {\n    let mut hdr = [0u8; 8];\n    stream.read_exact(\u0026mut hdr)?;\n    let op = u32::from_le_bytes(\n        hdr[0..4]\n            .try_into()\n            .map_err(|_| io::Error::new(io::ErrorKind::InvalidData, \"invalid opcode header\"))?,\n    );\n    let len = u32::from_le_bytes(\n        hdr[4..8]\n            .try_into()\n            .map_err(|_| io::Error::new(io::ErrorKind::InvalidData, \"invalid length header\"))?,\n    ) as usize;\n    if len \u003e MAX_FRAME_LEN {\n        warn!(\n            len,\n            max = MAX_FRAME_LEN,\n            \"IPC frame rejected: payload exceeds size limit\"\n        );\n        return Err(io::Error::new(\n            io::ErrorKind::InvalidData,\n            format!(\"frame too large: {len} bytes (max {MAX_FRAME_LEN})\"),\n        ));\n    }\n    let mut buf = vec![0u8; len];\n    stream.read_exact(\u0026mut buf)?;\n    let v =\n        serde_json::from_slice(\u0026buf).map_err(|e| io::Error::new(io::ErrorKind::InvalidData, e))?;\n    Ok((op, v))\n}\n\npub fn is_timeout(e: \u0026io::Error) -\u003e bool {\n    matches!(\n        e.kind(),\n        io::ErrorKind::WouldBlock | io::ErrorKind::TimedOut\n    )\n}\n\npub fn send_cmd(stream: \u0026mut UnixStream, msg: Value) {\n    if let Err(e) = write_frame(stream, OP_FRAME, \u0026msg.to_string()) {\n        warn!(\"IPC send failed: {e}\");\n    }\n}\n\npub fn token_path() -\u003e std::path::PathBuf {\n    let home = std::env::var(\"HOME\").unwrap_or_else(|_| \"/tmp\".to_string());\n    let dir = std::path::Path::new(\u0026home)\n        .join(\".cache\")\n        .join(\"hypr-overlay\");\n    let _ = std::fs::create_dir_all(\u0026dir);\n    dir.join(\"discord-token.json\")\n}\n\npub fn load_token() -\u003e Option\u003c(String, String)\u003e {\n    let data = std::fs::read_to_string(token_path()).ok()?;\n    let v: Value = serde_json::from_str(\u0026data).ok()?;\n    Some((\n        v[\"access_token\"].as_str()?.to_string(),\n        v[\"refresh_token\"].as_str()?.to_string(),\n    ))\n}\n\npub fn save_token(access: \u0026str, refresh: \u0026str) {\n    let path = token_path();\n    match std::fs::write(\n        \u0026path,\n        json!({\"access_token\": access, \"refresh_token\": refresh}).to_string(),\n    ) {\n        Ok(()) =\u003e debug!(\"token saved to {}\", path.display()),\n        Err(e) =\u003e warn!(\"failed to save token to {}: {e}\", path.display()),\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::io::Cursor;\n\n    #[test]\n    fn frame_roundtrip() {\n        let op = 1u32;\n        let payload = r#\"{\"hello\":\"world\"}\"#;\n        let mut buf = Vec::new();\n        write_frame(\u0026mut buf, op, payload).expect(\"write\");\n\n        let mut c = Cursor::new(buf);\n        let (got_op, got_val) = read_frame(\u0026mut c).expect(\"read\");\n        assert_eq!(got_op, op);\n        assert_eq!(got_val[\"hello\"].as_str().unwrap(), \"world\");\n    }\n\n    #[test]\n    fn write_frame_basic() {\n        let mut buf = Vec::new();\n        let payload = \"test\";\n        write_frame(\u0026mut buf, 1, payload).expect(\"write\");\n        assert!(!buf.is_empty());\n        // Frame: op(4) + len(4) + payload\n        assert!(buf.len() \u003e= 8);\n    }\n}\n","traces":[{"line":12,"address":[12015440],"length":1,"stats":{"Line":0}},{"line":13,"address":[12015444],"length":1,"stats":{"Line":0}},{"line":15,"address":[11612804,11612608],"length":1,"stats":{"Line":0}},{"line":16,"address":[11612620,11612693],"length":1,"stats":{"Line":0}} :{Config, DiscordCommand, DiscordEvent, Participant, UserId};\n\nuse std::sync::mpsc;\n\n/// Spawn the Discord IPC client in a background thread.\npub fn spawn(\n    config: Config,\n    tx: calloop::channel::Sender\u003cDiscordEvent\u003e,\n    cmd_rx: mpsc::Receiver\u003cDiscordCommand\u003e,\n) {\n    std::thread::spawn(move || run_client(config, tx, cmd_rx));\n}\n","traces":[{"line":27,"address":[12200592],"length":1,"stats":{"Line":0}},{"line":32,"address":[12200635],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":2},{"path":["/","home","ggomes","Documents","discord-overlay","src","discord","parser.rs"],"content":"//! JSON parsing for Discord voice state events.\n\nuse serde_json::{json, Value};\nuse std::os::unix::net::UnixStream;\n\nuse super::ipc::send_cmd;\nuse super::types::{JsonExt, Participant, ParticipantBuilder};\n\npub fn parse_participants(channel_data: \u0026Value) -\u003e Vec\u003cParticipant\u003e {\n    let states = channel_data[\"voice_states\"]\n        .as_array()\n        .cloned()\n        .unwrap_or_default();\n    states.iter().map(parse_voice_state).collect()\n}\n\npub fn parse_voice_state(vs: \u0026Value) -\u003e Participant {\n    let user = \u0026vs[\"user\"];\n    let vs_inner = \u0026vs[\"voice_state\"];\n    let self_mute = vs_inner.get_bool(\"self_mute\", false);\n    let self_deaf = vs_inner.get_bool(\"self_deaf\", false);\n    let server_mute = vs.get_bool(\"mute\", false) || vs_inner.get_bool(\"mute\", false);\n    let server_deaf = vs_inner.get_bool(\"deaf\", false);\n\n    let username = user\n        .get_str_option(\"username\")\n        .unwrap_or_else(|| \"?\".to_string());\n\n    ParticipantBuilder::new(user.get_string(\"id\"), username)\n        .nick(vs.get_str_option(\"nick\"))\n        .avatar_hash(user.get_str_option(\"avatar\"))\n        .muted(self_mute || server_mute)\n        .deafened(self_deaf || server_deaf)\n        .build()\n}\n\npub fn subscribe_for_channel(stream: \u0026mut UnixStream, channel_id: \u0026str, nonce: \u0026mut u64) {\n    *nonce += 1;\n    send_cmd(\n        stream,\n        json!({\n            \"cmd\": \"SUBSCRIBE\",\n            \"evt\": \"SPEAKING_START\",\n            \"args\": { \"channel_id\": channel_id },\n            \"nonce\": format!(\"ss_{nonce}\")\n        }),\n    );\n    *nonce += 1;\n    send_cmd(\n        stream,\n        json!({\n            \"cmd\": \"SUBSCRIBE\",\n            \"evt\": \"SPEAKING_END\",\n            \"args\": { \"channel_id\": channel_id },\n            \"nonce\": format!(\"se_{nonce}\")\n        }),\n    );\n    *nonce += 1;\n    send_cmd(\n        stream,\n        json!({\n            \"cmd\": \"SUBSCRIBE\",\n            \"evt\": \"VOICE_STATE_CREATE\",\n            \"args\": { \"channel_id\": channel_id },\n            \"nonce\": format!(\"vsc_{nonce}\")\n        }),\n    );\n    *nonce += 1;\n    send_cmd(\n        stream,\n        json!({\n            \"cmd\": \"SUBSCRIBE\",\n            \"evt\": \"VOICE_STATE_UPDATE\",\n            \"args\": { \"channel_id\": channel_id },\n            \"nonce\": format!(\"vsu_{nonce}\")\n        }),\n    );\n    *nonce += 1;\n    send_cmd(\n        stream,\n        json!({\n            \"cmd\": \"SUBSCRIBE\",\n            \"evt\": \"VOICE_STATE_DELETE\",\n            \"args\": { \"channel_id\": channel_id },\n            \"nonce\": format!(\"vsd_{nonce}\")\n        }),\n    );\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use serde_json::json;\n\n    #[test]\n    fn parse_voice_state_basic() {\n        let vs = json!({\n            \"user\": {\"id\": \"u1\", \"username\": \"bob\", \"avatar\": \"ahash\"},\n            \"voice_state\": {\"self_mute\": true, \"self_deaf\": false, \"mute\": false, \"deaf\": false},\n            \"mute\": false,\n            \"nick\": \"Bobby\"\n        });\n        let p = parse_voice_state(\u0026vs);\n        assert_eq!(p.user_id, \"u1\");\n        assert_eq!(p.username, \"bob\");\n        assert_eq!(p.nick.as_deref(), Some(\"Bobby\"));\n        assert_eq!(p.avatar_hash.as_deref(), Some(\"ahash\"));\n        assert!(p.muted);\n        assert!(!p.deafened);\n    }\n\n    #[test]\n    fn parse_voice_state_missing_user() {\n        let vs = json!({ \"voice_state\": { \"self_mute\": false } });\n        let p = parse_voice_state(\u0026vs);\n        assert_eq!(p.user_id, \"\");\n        assert_eq!(p.username, \"?\");\n        assert!(p.nick.is_none());\n        assert!(p.avatar_hash.is_none());\n        assert!(!p.muted);\n        assert!(!p.deafened);\n    }\n\n    #[test]\n    fn parse_voice_state_server_mute() {\n        let vs = json!({\n            \"user\": {\"id\": \"u2\", \"username\": \"alice\"},\n            \"voice_state\": {\"self_mute\": false, \"self_deaf\": false, \"mute\": true, \"deaf\": false},\n            \"mute\": false\n        });\n        let p = parse_voice_state(\u0026vs);\n        assert_eq!(p.user_id, \"u2\");\n        assert!(p.muted);\n        assert!(!p.deafened);\n    }\n\n    #[test]\n    fn parse_voice_state_no_voice_state() {\n        let vs = json!({ \"user\": {\"id\": \"u3\", \"username\": \"carol\", \"avatar\": \"\"}, \"nick\": \"\" });\n        let p = parse_voice_state(\u0026vs);\n        assert_eq!(p.user_id, \"u3\");\n        assert_eq!(p.username, \"carol\");\n        assert!(p.avatar_hash.is_none());\n        assert!(!p.muted);\n        assert!(!p.deafened);\n    }\n\n    #[test]\n    fn parse_participants_array() {\n        let vs1 = json!({ \"user\": {\"id\": \"u1\", \"username\": \"bob\"}, \"voice_state\": {} });\n        let vs2 = json!({ \"user\": {\"id\": \"u2\", \"username\": \"alice\"}, \"voice_state\": {} });\n        let ch = json!({ \"voice_states\": [vs1, vs2] });\n        let parts = parse_participants(\u0026ch);\n        assert_eq!(parts.len(), 2);\n        assert_eq!(parts[0].user_id, \"u1\");\n        assert_eq!(parts[1].user_id, \"u2\");\n    }\n}\n\n#[test]\nfn parse_voice_state_with_server_deafen() {\n    let vs = json!({\n        \"user\": {\"id\": \"u4\", \"username\": \"david\"},\n        \"voice_state\": {\"self_mute\": false, \"self_deaf\": false, \"mute\": false, \"deaf\": true},\n        \"mute\": false\n    });\n    let p = parse_voice_state(\u0026vs);\n    assert_eq!(p.user_id, \"u4\");\n    assert!(!p.muted);\n    assert!(p.deafened);\n}\n\n#[test]\nfn parse_voice_state_empty_avatar() {\n    let vs = json!({\n        \"user\": {\"id\": \"u5\", \"username\": \"eve\", \"avatar\": \"\"},\n        \"voice_state\": {}\n    });\n    let p = parse_voice_state(\u0026vs);\n    assert_eq!(p.user_id, \"u5\");\n    assert!(p.avatar_hash.is_none());\n}\n\n#[test]\nfn parse_participants_empty_array() {\n    let ch = json!({ \"voice_states\": [] });\n    let parts = parse_participants(\u0026ch);\n    assert!(parts.is_empty());\n}\n\n#[test]\nfn parse_participants_multiple_with_nicks() {\n    let vs1 =\n        json!({ \"user\": {\"id\": \"u1\", \"username\": \"bob\"}, \"voice_state\": {}, \"nick\": \"Bobby\" });\n    let vs2 =\n        json!({ \"user\": {\"id\": \"u2\", \"username\": \"alice\"}, \"voice_state\": {}, \"nick\": \"Ali\" });\n    let ch = json!({ \"voice_states\": [vs1, vs2] });\n    let parts = parse_participants(\u0026ch);\n    assert_eq!(parts.len(), 2);\n    assert_eq!(parts[0].nick.as_deref(), Some(\"Bobby\"));\n    assert_eq!(parts[1].nick.as_deref(), Some(\"Ali\"));\n}\n","traces":[{"line":9,"address":[12317915,12317921,12317632],"length":1,"stats":{"Line":1}},{"line":10,"address":[12317670],"length":1,"stats":{"Line":1}},{"line":14,"address":[12317749,12317821],"length":1,"stats":{"Line":2}},{"line":17,"address":[12316608,12317588,12317564],"length":1,"stats":{"Line":1}},{"line":18,"address":[12316646],"length":1,"stats":{"Line":1}},{"line":19,"address":[12316712],"length":1,"stats":{"Line":1}},{"line":20,"address":[12316752],"length":1,"stats":{"Line":1}},{"line":21,"address":[12316789],"length":1,"stats":{"Line":1}},{"line":22,"address":[12316826],"length":1,"stats":{"Line":
