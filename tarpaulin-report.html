ine":7}}],"covered":31,"coverable":31},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","mod.rs"],"content":"#[cfg(not(test))]\nuse glow::HasContext;\n#[cfg(not(test))]\nuse khronos_egl as egl;\npub mod shaders;\n\npub mod program_locations;\n\npub mod program_gl;\n\npub mod program;\n\n#[cfg(not(test))]\npub use shaders::{AVATAR_FRAG_SRC, FRAG_SRC, ICON_FRAG_SRC, VERT_SRC};\n\n// EGL_PLATFORM_WAYLAND_KHR (0x31D8) — part of EGL_KHR_platform_wayland\n#[cfg(not(test))]\nconst EGL_PLATFORM_WAYLAND_KHR: egl::Enum = 0x31D8;\n\n// ─── Procedural icon generation ──────────────────────────────────────────────\n\npub mod math;\n\npub mod draw;\n\npub use math::{rasterize, sdf_arc, sdf_rrect, smoothstep};\n\nfn icon_mic(size: u32) -\u003e Vec\u003cu8\u003e {\n    // Centered: body top=+0.335, base bottom=-0.335 → visual center at 0\n    rasterize(size, |px, py| {\n        let body = sdf_rrect(px, py, 0.0, 0.115, 0.12, 0.22, 0.12);\n        let stand = sdf_arc(px, py, 0.0, 0.035, 0.28, 0.03, true);\n        let stem = sdf_rrect(px, py, 0.0, -0.245, 0.03, 0.055, 0.03);\n        let base = sdf_rrect(px, py, 0.0, -0.305, 0.16, 0.03, 0.03);\n        body.min(stand).min(stem).min(base)\n    })\n}\n\nfn icon_headphone(size: u32) -\u003e Vec\u003cu8\u003e {\n    // Centered and scaled to match mic visual size\n    rasterize(size, |px, py| {\n        let band = sdf_arc(px, py, 0.0, -0.07, 0.27, 0.035, false);\n        let left = sdf_rrect(px, py, -0.27, -0.07, 0.08, 0.13, 0.06);\n        let right = sdf_rrect(px, py, 0.27, -0.07, 0.08, 0.13, 0.06);\n        band.min(left).min(right)\n    })\n}\n\nfn icon_strikeout(size: u32) -\u003e Vec\u003cu8\u003e {\n    let s = size as f32;\n    let aa = 1.5 / s;\n    let mut buf = vec![0u8; (size * size * 4) as usize];\n    for y in 0..size {\n        for x in 0..size {\n            let px = x as f32 / s - 0.5;\n            let py = y as f32 / s - 0.5;\n            let (ax, ay, bx, by) = (-0.40f32, -0.45f32, 0.40f32, 0.45f32);\n            let (dx, dy) = (bx - ax, by - ay);\n            let t = ((px - ax) * dx + (py - ay) * dy) / (dx * dx + dy * dy);\n            let t = t.clamp(0.0, 1.0);\n            let d = ((px - (ax + t * dx)).powi(2) + (py - (ay + t * dy)).powi(2)).sqrt() - 0.045;\n            let a = (1.0 - smoothstep(-aa, aa, d)) * 230.0;\n            let i = ((y * size + x) * 4) as usize;\n            buf[i] = 20;\n            buf[i + 1] = 10;\n            buf[i + 2] = 10;\n            buf[i + 3] = a as u8;\n        }\n    }\n    buf\n}\n\npub mod compile;\npub mod text;\npub mod textures;\n\npub use text::{load_system_font, render_text_texture};\n#[cfg(not(test))]\npub use textures::{upload_texture, upload_texture_wh};\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn smoothstep_values() {\n        assert_eq!(smoothstep(0.0, 1.0, 0.0), 0.0);\n        assert_eq!(smoothstep(0.0, 1.0, 1.0), 1.0);\n        assert!((smoothstep(0.0, 1.0, 0.5) - 0.5).abs() \u003c 1e-6);\n    }\n\n    #[test]\n    fn smoothstep_edge_cases() {\n        // Below range\n        assert!(smoothstep(0.5, 1.0, 0.0) == 0.0);\n\n        // Above range\n        assert!(smoothstep(0.0, 0.5, 1.0) == 1.0);\n\n        // Zero-width range (edge0 == edge1 causes division by zero, results in NaN or inf)\n        let _result = smoothstep(0.5, 0.5, 0.5);\n        // Don't test this case - it's undefined behavior with division by zero\n\n        // Negative values\n        let result = smoothstep(-1.0, 1.0, 0.0);\n        assert!((result - 0.5).abs() \u003c 1e-6);\n\n        // Larger range\n        let result = smoothstep(0.0, 100.0, 50.0);\n        assert!((result - 0.5).abs() \u003c 1e-6);\n    }\n\n    #[test]\n    fn sdf_rrect_center_inside() {\n        let d = sdf_rrect(0.0, 0.0, 0.0, 0.0, 0.2, 0.2, 0.05);\n        assert!(d \u003c 0.0);\n    }\n\n    #[test]\n    fn sdf_rrect_outside() {\n        // Point far outside should have positive distance\n        let d = sdf_rrect(1.0, 1.0, 0.0, 0.0, 0.1, 0.1, 0.05);\n        assert!(d \u003e 0.0);\n    }\n\n    #[test]\n    fn sdf_rrect_on_boundary() {\n        // Points on/near boundary should transition from negative to positive\n        let inside = sdf_rrect(0.0, 0.05, 0.0, 0.0, 0.1, 0.1, 0.01);\n        let outside = sdf_rrect(0.0, 0.15, 0.0, 0.0, 0.1, 0.1, 0.01);\n        assert!(inside \u003c 0.0);\n        assert!(outside \u003e 0.0);\n    }\n\n    #[test]\n    fn sdf_arc_behavior() {\n        let r = sdf_arc(0.0, -0.1, 0.0, 0.0, 0.28, 0.03, true);\n        assert!(r.is_finite());\n        let r2 = sdf_arc(0.0, 0.1, 0.0, 0.0, 0.28, 0.03, true);\n        assert_eq!(r2, 99.0);\n    }\n\n    #[test]\n    fn sdf_arc_top_and_bottom() {\n        // Test both top (bottom=false) and bottom (bottom=true) variants\n        let top = sdf_arc(0.0, 0.0, 0.0, 0.0, 0.2, 0.02, false);\n        let bottom = sdf_arc(0.0, 0.0, 0.0, 0.0, 0.2, 0.02, true);\n        assert!(top.is_finite());\n        assert!(bottom.is_finite());\n    }\n\n    #[test]\n    fn sdf_arc_at_different_radii() {\n        for r in [0.1, 0.2, 0.5, 1.0].iter() {\n            let d = sdf_arc(0.0, 0.0, 0.0, 0.0, *r, 0.05, true);\n            assert!(d.is_finite(), \"sdf_arc should be finite for radius {}\", r);\n        }\n    }\n\n    #[test]\n    fn rasterize_alpha_all() {\n        let buf = rasterize(8, |_px, _py| -10.0);\n        assert_eq!(buf.len(), (8 * 8 * 4) as usize);\n        for i in 0..(8 * 8) {\n            assert!(buf[i * 4 + 3] \u003e= 250);\n        }\n    }\n\n    #[test]\n    fn rasterize_varying_distances() {\n        // Test rasterization with varying SDF distances\n        let buf = rasterize(4, |px, py| {\n            let dx = px - 0.5;\n            let dy = py - 0.5;\n            (dx * dx + dy * dy).sqrt() - 0.2\n        });\n        assert_eq!(buf.len(), (4 * 4 * 4) as usize);\n\n        // Verify we have some variation in alpha values\n        let alphas: Vec\u003cu8\u003e = (0..4 * 4).map(|i| buf[i * 4 + 3]).collect();\n\n        // Should have at least some non-maximum values\n        assert!(alphas.iter().any(|\u0026a| a \u003c 255));\n    }\n\n    #[test]\n    fn rasterize_different_sizes() {\n        for size in [4, 8, 16, 32].iter() {\n            let buf = rasterize(*size, |_px, _py| -1.0);\n            assert_eq!(buf.len(), (*size * *size * 4) as usize);\n            // All pixels should have full alpha for negative distance\n            for i in 0..*size as usize * *size as usize {\n                assert!(buf[i * 4 + 3] \u003e 200);\n            }\n        }\n    }\n\n    #[test]\n    fn icons_nonempty() {\n        let m = icon_mic(16);\n        assert_eq!(m.len(), (16 * 16 * 4) as usize);\n        assert!(m.iter().any(|b| *b != 0));\n        let h = icon_headphone(16);\n        assert_eq!(h.len(), (16 * 16 * 4) as usize);\n        assert!(h.iter().any(|b| *b != 0));\n        let s = icon_strikeout(16);\n        assert_eq!(s.len(), (16 * 16 * 4) as usize);\n        assert!(s.iter().any(|b| *b != 0));\n    }\n\n    #[test]\n    fn icons_have_alpha() {\n        for (icon_fn, name) in [\n            (icon_mic as fn(u32) -\u003e Vec\u003cu8\u003e, \"mic\"),\n            (icon_headphone, \"headphone\"),\n            (icon_strikeout, \"strikeout\"),\n        ] {\n            let buf = icon_fn(16);\n            // Icons should have some pixel data (not all zeros)\n            assert!(\n                buf.iter().any(|\u0026b| b != 0),\n                \"{} icon should have non-zero pixels\",\n                name\n            );\n        }\n    }\n\n    #[test]\n    fn icons_consistent_size() {\n        for size in [8, 16, 32].iter() {\n            let m = icon_mic(*size);\n            let h = icon_headphone(*size);\n            let s = icon_strikeout(*size);\n            let expected_len = (*size * *size * 4) as usize;\n            assert_eq!(m.len(), expected_len);\n            assert_eq!(h.len(), expected_len);\n            assert_eq!(s.len(), expected_len);\n        }\n    }\n\n    #[test]\n    fn render_text_texture_with_system_font_optional() {\n        if let Some(font) = load_system_font() {\n            let (pixels, w, h) = render_text_texture(\u0026font, \"Hello\", 12.0);\n            assert!(w \u003e 0 \u0026\u0026 h \u003e 0);\n            assert_eq!(pixels.len(), (w * h * 4) as usize);\n        }\n    }\n\n    #[test]\n    fn render_text_texture_different_sizes() {\n        if let Some(font) = load_system_font() {\n            for size in [8.0, 12.0, 16.0, 24.0].iter() {\n                let (pixels, w, h) = render_text_texture(\u0026font, \"Test\", *size);\n                assert!(w \u003e 0 \u0026\u0026 h \u003e 0);\n                assert_eq!(pixels.len(), (w * h * 4) as usize);\n                // Larger font size should generally produce larger texture\n                assert!(w \u003e 4);\n                assert!(h \u003e 4);\n            }\n        }\n    }\n\n    #[test]\n    fn render_text_texture_empty_string() {\n        if let Some(font) = load_system_font() {\n            let (pixels, w, h) = render_text_texture(\u0026font, \"\", 12.0);\n            // Empty string may produce minimal texture or 1x1\n            assert!(w \u003e= 1 \u0026\u0026 h \u003e= 1);\n            assert_eq!(pixels.len(), (w * h * 4) as usize);\n        }\n    }\n}\n\n#[cfg(not(test))]\n// Additional helper methods for testability and a mock EGL backend used in #[cfg(test)]\nimpl EglContext {\n    pub fn upload_texture_wh(\u0026self, pixels: \u0026[u8], w: u32, h: u32) -\u003e glow::NativeTexture {\n        unsafe { upload_texture_wh(\u0026self.gl, pixels, w, h) }\n    }\n\n    pub fn delete_texture(\u0026self, tex: glow::NativeTexture) {\n        unsafe {\n            self.gl.delete_texture(tex);\n        }\n    }\n\n    pub fn tex_mic(\u0026self) -\u003e glow::NativeTexture {\n        self.tex_mic\n    }\n    pub fn tex_headphone(\u0026self) -\u003e glow::NativeTexture {\n        self.tex_headphone\n    }\n    pub fn tex_strikeout(\u0026self) -\u003e glow::NativeTexture {\n        self.tex_strikeout\n    }\n}\n\n// Type alias for the Egl backend used by App (real in normal builds, mock in tests)\n\n#[cfg(test)]\npub struct MockEgl {}\n\n#[cfg(test)]\nimpl MockEgl {\n    pub fn new() -\u003e Self {\n        MockEgl {}\n    }\n    pub fn resize(\u0026self, _w: i32, _h: i32) {}\n    #[allow(clippy::too_many_arguments)]\n    pub fn draw_rect(\n        \u0026self,\n        _px: f32,\n        _py: f32,\n        _pw: f32,\n        _ph: f32,\n        _surf_w: f32,\n        _surf_h: f32,\n        _color: [f32; 4],\n        _radius: f32,\n    ) {\n    }\n    #[allow(clippy::too_many_arguments)]\n    pub fn draw_icon(\n        \u0026self,\n        _px: f32,\n        _py: f32,\n        _pw: f32,\n        _ph: f32,\n        _surf_w: f32,\n        _surf_h: f32,\n        _tex: glow::NativeTexture,\n        _opacity: f32,\n    ) {\n    }\n    #[allow(clippy::too_many_arguments)]\n    pub fn draw_avatar(\n        \u0026self,\n        _px: f32,\n        _py: f32,\n        _size: f32,\n        _surf_w: f32,\n        _surf_h: f32,\n        _tex: glow::NativeTexture,\n        _opacity: f32,\n        _desaturate: f32,\n    ) {\n    }\n    pub fn swap(\u0026self) {}\n    pub fn delete_texture(\u0026self, _tex: glow::NativeTexture) {}\n    pub fn upload_texture_wh(\u0026self, _pixels: \u0026[u8], _w: u32, _h: u32) -\u003e glow::NativeTexture {\n        std::num::NonZeroU32::new(1)\n            .map(|nz| unsafe {\n                std::mem::transmute::\u003cstd::num::NonZeroU32, glow::NativeTexture\u003e(nz)\n            })\n            .unwrap()\n    }\n    pub fn tex_mic(\u0026self) -\u003e glow::NativeTexture {\n        std::num::NonZeroU32::new(2)\n            .map(|nz| unsafe {\n                std::mem::transmute::\u003cstd::num::NonZeroU32, glow::NativeTexture\u003e(nz)\n            })\n            .unwrap()\n    }\n    pub fn tex_headphone(\u0026self) -\u003e glow::NativeTexture {\n        std::num::NonZeroU32::new(3)\n            .map(|nz| unsafe {\n                std::mem::transmute::\u003cstd::num::NonZeroU32, glow::NativeTexture\u003e(nz)\n            })\n            .unwrap()\n    }\n    pub fn tex_strikeout(\u0026self) -\u003e glow::NativeTexture {\n        std::num::NonZeroU32::new(4)\n            .map(|nz| unsafe {\n                std::mem::transmute::\u003cstd::num::NonZeroU32, glow::NativeTexture\u003e(nz)\n            })\n            .unwrap()\n    }\n}\n\n#[cfg(not(test))]\nimpl EglContext {\n    pub fn viewport(\u0026self, x: i32, y: i32, w: i32, h: i32) {\n        unsafe {\n            self.gl.viewport(x, y, w, h);\n        }\n    }\n    pub fn clear_color(\u0026self, r: f32, g: f32, b: f32, a: f32) {\n        unsafe {\n            self.gl.clear_color(r, g, b, a);\n        }\n    }\n    pub fn clear(\u0026self, mask: u32) {\n        unsafe {\n            self.gl.clear(mask);\n        }\n    }\n    pub fn use_main_program(\u0026self) {\n        unsafe {\n            self.main_prog.use_program(\u0026self.gl);\n        }\n    }\n}\n\n#[cfg(test)]\nimpl MockEgl {\n    pub fn viewport(\u0026self, _x: i32, _y: i32, _w: i32, _h: i32) {}\n    pub fn clear_color(\u0026self, _r: f32, _g: f32, _b: f32, _a: f32) {}\n    pub fn clear(\u0026self, _mask: u32) {}\n    pub fn use_main_program(\u0026self) {}\n}\n\n// Trait and impls to allow using Box\u003cdyn EglBackend\u003e for production and tests.\n#[allow(clippy::too_many_arguments)]\npub trait EglBackend {\n    fn resize(\u0026self, width: i32, height: i32);\n    fn draw_rect(\n        \u0026self,\n        px: f32,\n        py: f32,\n        pw: f32,\n        ph: f32,\n        surf_w: f32,\n        surf_h: f32,\n        color: [f32; 4],\n        radius: f32,\n    );\n    fn draw_icon(\n        \u0026self,\n        px: f32,\n        py: f32,\n        pw: f32,\n        ph: f32,\n        surf_w: f32,\n        surf_h: f32,\n        tex: glow::NativeTexture,\n        opacity: f32,\n    );\n    fn draw_avatar(\n        \u0026self,\n        px: f32,\n        py: f32,\n        size: f32,\n        surf_w: f32,\n        surf_h: f32,\n        tex: glow::NativeTexture,\n        opacity: f32,\n        desaturate: f32,\n    );\n    fn swap(\u0026self);\n    fn delete_texture(\u0026self, tex: glow::NativeTexture);\n    fn upload_texture_wh(\u0026self, pixels: \u0026[u8], w: u32, h: u32) -\u003e glow::NativeTexture;\n    fn tex_mic(\u0026self) -\u003e glow::NativeTexture;\n    fn tex_headphone(\u0026self) -\u003e glow::NativeTexture;\n    fn tex_strikeout(\u0026self) -\u003e glow::NativeTexture;\n    fn viewport(\u0026self, x: i32, y: i32, w: i32, h: i32);\n    fn clear_color(\u0026self, r: f32, g: f32, b: f32, a: f32);\n    fn clear(\u0026self, mask: u32);\n    fn use_main_program(\u0026self);\n}\n\n#[cfg(not(test))]\npub mod egl_context;\n#[cfg(not(test))]\npub use self::egl_context::EglContext;\n\n#[cfg(test)]\nimpl EglBackend for MockEgl {\n    fn resize(\u0026self, _width: i32, _height: i32) {\n        self.resize(_width, _height)\n    }\n    fn draw_rect(\n        \u0026self,\n        px: f32,\n        py: f32,\n        pw: f32,\n        ph: f32,\n        surf_w: f32,\n        surf_h: f32,\n        color: [f32; 4],\n        radius: f32,\n    ) {\n        self.draw_rect(px, py, pw, ph, surf_w, surf_h, color, radius)\n    }\n    fn draw_icon(\n        \u0026self,\n        px: f32,\n        py: f32,\n        pw: f32,\n        ph: f32,\n        surf_w: f32,\n        surf_h: f32,\n        tex: glow::NativeTexture,\n        opacity: f32,\n    ) {\n        self.draw_icon(px, py, pw, ph, surf_w, surf_h, tex, opacity)\n    }\n    fn draw_avatar(\n        \u0026self,\n        px: f32,\n        py: f32,\n        size: f32,\n        surf_w: f32,\n        surf_h: f32,\n        tex: glow::NativeTexture,\n        opacity: f32,\n        desaturate: f32,\n    ) {\n        self.draw_avatar(px, py, size, surf_w, surf_h, tex, opacity, desaturate)\n    }\n    fn swap(\u0026self) {\n        self.swap()\n    }\n    fn delete_texture(\u0026self, tex: glow::NativeTexture) {\n        self.delete_texture(tex)\n    }\n    fn upload_texture_wh(\u0026self, pixels: \u0026[u8], w: u32, h: u32) -\u003e glow::NativeTexture {\n        self.upload_texture_wh(pixels, w, h)\n    }\n    fn tex_mic(\u0026self) -\u003e glow::NativeTexture {\n        self.tex_mic()\n    }\n    fn tex_headphone(\u0026self) -\u003e glow::NativeTexture {\n        self.tex_headphone()\n    }\n    fn tex_strikeout(\u0026self) -\u003e glow::NativeTexture {\n        self.tex_strikeout()\n    }\n    fn viewport(\u0026self, x: i32, y: i32, w: i32, h: i32) {\n        self.viewport(x, y, w, h)\n    }\n    fn clear_color(\u0026self, r: f32, g: f32, b: f32, a: f32) {\n        self.clear_color(r, g, b, a)\n    }\n    fn clear(\u0026self, mask: u32) {\n        self.clear(mask)\n    }\n    fn use_main_program(\u0026self) {\n        self.use_main_program()\n    }\n}\n\n#[cfg(test)]\nmod mock_tests {\n    use super::*;\n\n    #[test]\n    fn mock_egl_methods_noop() {\n        let egl = MockEgl::new();\n        egl.resize(100, 50);\n        egl.viewport(0, 0, 100, 50);\n        egl.clear_color(0.1, 0.2, 0.3, 0.4);\n        egl.clear(glow::COLOR_BUFFER_BIT);\n        egl.use_main_program();\n        let tex = egl.upload_texture_wh(\u0026[255u8; 4], 1, 1);\n        egl.draw_rect(0.0, 0.0, 10.0, 10.0, 100.0, 50.0, [1.0, 1.0, 1.0, 1.0], 2.0);\n        egl.draw_icon(0.0, 0.0, 8.0, 8.0, 100.0, 50.0, tex, 0.5);\n        egl.draw_avatar(0.0, 0.0, 8.0, 100.0, 50.0, tex, 0.5, 0.0);\n        egl.delete_texture(tex);\n        let _ = egl.tex_mic();\n        let _ = egl.tex_headphone();\n        let _ = egl.tex_strikeout();\n        egl.swap();\n    }\n}\n","traces":[{"line":28,"address":[12024608],"length":1,"stats":{"Line":2}},{"line":30,"address":[12024624],"length":1,"stats":{"Line":3}},{"line":31,"address":[12942656],"length":1,"stats":{"Line":2}},{"line":32,"address":[12942717],"length":1,"stats":{"Line":1}},{"line":33,"address":[12942780], hader program wrapper utilities — encapsulate program creation and common uniform setters.\n\nuse std::marker::PhantomData;\n\n/// Generic wrapper for the main rounded-rect shader program.\n/// Parameterized over a `G` which implements both `compile::GlInterface` and `program_gl::ProgramGl`.\npub struct MainProgram\u003cG\u003e\nwhere\n    G: crate::render::program_gl::ProgramGl,\n{\n    program: \u003cG as crate::render::compile::GlInterface\u003e::Program,\n    locs: crate::render::program_locations::MainProgramLocations\u003c\n        \u003cG as crate::render::program_gl::ProgramGl\u003e::UniformLocation,\n    \u003e,\n    _marker: PhantomData\u003cG\u003e,\n}\n\nimpl\u003cG\u003e MainProgram\u003cG\u003e\nwhere\n    G: crate::render::program_gl::ProgramGl,\n    \u003cG as crate::render::compile::GlInterface\u003e::Program: Copy,\n{\n    /// Compile, link and query locations for the main program.\n    pub unsafe fn new(gl: \u0026G, vert_src: \u0026str, frag_src: \u0026str) -\u003e Self {\n        let prog = crate::render::compile::compile_program_generic(gl, vert_src, frag_src);\n        let locs = crate::render::program_locations::query_main_program_generic(gl, \u0026prog);\n        MainProgram {\n            program: prog,\n            locs,\n            _marker: PhantomData,\n        }\n    }\n\n    pub unsafe fn use_program(\u0026self, gl: \u0026G) {\n        gl.use_program(\u0026self.program);\n    }\n\n    pub unsafe fn set_color(\u0026self, gl: \u0026G, color: [f32; 4]) {\n        gl.uniform_4_f32(\u0026self.locs.loc_color, color[0], color[1], color[2], color[3]);\n    }\n\n    pub unsafe fn set_size(\u0026self, gl: \u0026G, w: f32, h: f32) {\n        gl.uniform_2_f32(\u0026self.locs.loc_size, w, h);\n    }\n\n    pub unsafe fn set_radius(\u0026self, gl: \u0026G, r: f32) {\n        gl.uniform_1_f32(\u0026self.locs.loc_radius, r);\n    }\n\n    /// Accessor for underlying program id. Requires the Program type to be Copy.\n    pub fn id(\u0026self) -\u003e \u003cG as super::compile::GlInterface\u003e::Program {\n        self.program\n    }\n\n    /// Accessor for queried locations.\n    #[allow(dead_code)]\n    pub fn locs(\n        \u0026self,\n    ) -\u003e \u0026crate::render::program_locations::MainProgramLocations\u003c\n        \u003cG as crate::render::program_gl::ProgramGl\u003e::UniformLocation,\n    \u003e {\n        \u0026self.locs\n    }\n}\n\n/// Generic wrapper for simple programs that expose a single `u_opacity` uniform (icons, avatars).\npub struct OpacityProgram\u003cG\u003e\nwhere\n    G: crate::render::program_gl::ProgramGl,\n{\n    program: \u003cG as crate::render::compile::GlInterface\u003e::Program,\n    loc_opacity: \u003cG as crate::render::program_gl::ProgramGl\u003e::UniformLocation,\n    _marker: PhantomData\u003cG\u003e,\n}\n\nimpl\u003cG\u003e OpacityProgram\u003cG\u003e\nwhere\n    G: crate::render::program_gl::ProgramGl,\n    \u003cG as crate::render::compile::GlInterface\u003e::Program: Copy,\n{\n    pub unsafe fn new(gl: \u0026G, vert_src: \u0026str, frag_src: \u0026str) -\u003e Self {\n        let prog = crate::render::compile::compile_program_generic(gl, vert_src, frag_src);\n        let loc_opacity = crate::render::program_locations::query_opacity_generic(gl, \u0026prog);\n        OpacityProgram {\n            program: prog,\n            loc_opacity,\n            _marker: PhantomData,\n        }\n    }\n\n    #[allow(dead_code)]\n    pub unsafe fn use_program(\u0026self, gl: \u0026G) {\n        gl.use_program(\u0026self.program);\n    }\n\n    pub unsafe fn set_opacity(\u0026self, gl: \u0026G, o: f32) {\n        gl.uniform_1_f32(\u0026self.loc_opacity, o);\n    }\n\n    /// Accessor for underlying program id.\n    #[allow(dead_code)]\n    pub fn id(\u0026self) -\u003e \u003cG as crate::render::compile::GlInterface\u003e::Program {\n        self.program\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::cell::RefCell;\n\n    // Minimal Mock used to test wrappers. Implements both compile::GlInterface and\n    // program_gl::ProgramGl so it can be used with the generic wrappers.\n    struct MockGl {\n        vs_status: RefCell\u003cbool\u003e,\n        fs_status: RefCell\u003cbool\u003e,\n        program_status: RefCell\u003cbool\u003e,\n        vs_log: RefCell\u003cString\u003e,\n        fs_log: RefCell\u003cString\u003e,\n        prog_log: RefCell\u003cString\u003e,\n        next_shader: RefCell\u003cu32\u003e,\n        next_program: RefCell\u003cu32\u003e,\n        used_programs: RefCell\u003cVec\u003cu32\u003e\u003e,\n        uniform_calls: RefCell\u003cVec\u003c(u32, Vec\u003cf32\u003e)\u003e\u003e,\n    }\n\n    impl MockGl {\n        fn new() -\u003e Self {\n            MockGl {\n                vs_status: RefCell::new(true),\n                fs_status: RefCell::new(true),\n                program_status: RefCell::new(true),\n                vs_log: RefCell::new(String::new()),\n                fs_log: RefCell::new(String::new()),\n                prog_log: RefCell::new(String::new()),\n                next_shader: RefCell::new(1),\n                next_program: RefCell::new(100),\n                used_programs: RefCell::new(vec![]),\n                uniform_calls: RefCell::new(vec![]),\n            }\n        }\n    }\n\n    impl crate::render::compile::GlInterface for MockGl {\n        type Shader = u32;\n        type Program = u32;\n\n        fn create_shader(\u0026self, _shader_type: u32) -\u003e Result\u003cSelf::Shader, String\u003e {\n            let mut s = self.next_shader.borrow_mut();\n            let val = *s;\n            *s += 1;\n            Ok(val)\n        }\n\n        fn shader_source(\u0026self, _shader: \u0026Self::Shader, _src: \u0026str) {}\n\n        fn compile_shader(\u0026self, _shader: \u0026Self::Shader) {}\n\n        fn get_shader_compile_status(\u0026self, shader: \u0026Self::Shader) -\u003e bool {\n            if *shader % 2 == 0 {\n                *self.fs_status.borrow()\n            } else {\n                *self.vs_status.borrow()\n            }\n        }\n\n        fn get_shader_info_log(\u0026self, shader: \u0026Self::Shader) -\u003e String {\n            if *shader % 2 == 0 {\n                self.fs_log.borrow().clone()\n            } else {\n                self.vs_log.borrow().clone()\n            }\n        }\n\n        fn create_program(\u0026self) -\u003e Result\u003cSelf::Program, String\u003e {\n            let mut p = self.next_program.borrow_mut();\n            let val = *p;\n            *p += 1;\n            Ok(val)\n        }\n\n        fn attach_shader(\u0026self, _program: \u0026Self::Program, _shader: \u0026Self::Shader) {}\n\n        fn link_program(\u0026self, _program: \u0026Self::Program) {}\n\n        fn get_program_link_status(\u0026self, _program: \u0026Self::Program) -\u003e bool {\n            *self.program_status.borrow()\n        }\n\n        fn get_program_info_log(\u0026self, _program: \u0026Self::Program) -\u003e String {\n            self.prog_log.borrow().clone()\n        }\n\n        fn delete_shader(\u0026self, _shader: \u0026Self::Shader) {}\n    }\n\n    impl crate::render::program_gl::ProgramGl for MockGl {\n        type UniformLocation = u32;\n\n        fn use_program(\u0026self, program: \u0026\u003cSelf as crate::render::compile::GlInterface\u003e::Program) {\n            self.used_programs.borrow_mut().push(*program);\n        }\n\n        fn uniform_4_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32, y: f32, z: f32, w: f32) {\n            self.uniform_calls\n                .borrow_mut()\n                .push((*loc, vec![x, y, z, w]));\n        }\n\n        fn uniform_2_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32, y: f32) {\n            self.uniform_calls.borrow_mut().push((*loc, vec![x, y]));\n        }\n\n        fn uniform_1_f32(\u0026self, loc: \u0026Self::UniformLocation, x: f32) {\n            self.uniform_calls.borrow_mut().push((*loc, vec![x]));\n        }\n\n        fn g      loc_local,\n        loc_color,\n        loc_size,\n        loc_radius,\n    }\n}\n\n/// Convenience wrapper used by production code (glow::Context).\n#[cfg(not(test))]\npub unsafe fn query_main_program(\n    gl: \u0026glow::Context,\n    program: glow::NativeProgram,\n) -\u003e MainProgramLocations\u003cglow::UniformLocation\u003e {\n    query_main_program_generic(gl, \u0026program)\n}\n\n/// Generic query for the standard opacity uniform used by icon/avatar shaders.\npub unsafe fn query_opacity_generic\u003cG: super::program_gl::ProgramGl\u003e(\n    gl: \u0026G,\n    program: \u0026\u003cG as super::compile::GlInterface\u003e::Program,\n) -\u003e G::UniformLocation {\n    gl.get_uniform_location(program, UNIFORM_OPACITY).unwrap()\n}\n\n#[cfg(not(test))]\npub unsafe fn query_opacity(\n    gl: \u0026glow::Context,\n    program: glow::NativeProgram,\n) -\u003e glow::UniformLocation {\n    query_opacity_generic(gl, \u0026program)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn attr_and_uniform_names() {\n        assert_eq!(ATTR_POSITION, \"a_position\");\n        assert_eq!(ATTR_LOCAL, \"a_local\");\n        assert_eq!(UNIFORM_COLOR, \"u_color\");\n        assert_eq!(UNIFORM_SIZE, \"u_size\");\n        assert_eq!(UNIFORM_RADIUS, \"u_radius\");\n        assert_eq!(UNIFORM_OPACITY, \"u_opacity\");\n    }\n}\n","traces":[{"line":21,"address":[11867824,11867961],"length":1,"stats":{"Line":1}},{"line":25,"address":[11867877],"length":1,"stats":{"Line":1}},{"line":26,"address":[11867998,11867934],"length":1,"stats":{"Line":2}},{"line":27,"address":[11868041,11868097],"length":1,"stats":{"Line":2}},{"line":28,"address":[11868140,11868196],"length":1,"stats":{"Line":2}},{"line":29,"address":[11868239],"length":1,"stats":{"Line":1}},{"line":49,"address":[11867760],"length":1,"stats":{"Line":1}},{"line":53,"address":[11867774],"length":1,"stats":{"Line":1}}],"covered":8,"coverable":8},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","shaders.rs"],"content":"// ─── GLSL shaders (GLES2 / #version 100) ─────────────────────────────────────\n\n#[cfg(not(test))]\npub const VERT_SRC: \u0026str = r\"\nattribute vec2 a_position;\nattribute vec2 a_local;\nvarying vec2 v_local;\nvoid main() {\n    gl_Position = vec4(a_position, 0.0, 1.0);\n    v_local = a_local;\n}\n\";\n\n/// Rounded-rectangle SDF shader used for button backgrounds and the drag handle.\n#[cfg(not(test))]\npub const FRAG_SRC: \u0026str = r\"\nprecision mediump float;\nvarying vec2 v_local;\nuniform vec4 u_color;\nuniform vec2 u_size;\nuniform float u_radius;\n\nfloat sdRoundedBox(vec2 p, vec2 b, float r) {\n    vec2 d = abs(p) - b + r;\n    return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0) - r;\n}\nvoid main() {\n    vec2 p = (v_local - 0.5) * u_size;\n    float d = sdRoundedBox(p, u_size * 0.5, u_radius);\n    if (d \u003e 1.0) discard;\n    gl_FragColor = u_color;\n}\n\";\n\n/// Simple icon overlay shader — samples a white-on-transparent texture and\n/// multiplies by an opacity uniform. Y is flipped because pixel buffers are\n/// top-down but GL textures are bottom-up.\n#[cfg(not(test))]\npub const ICON_FRAG_SRC: \u0026str = r\"\nprecision mediump float;\nvarying vec2 v_local;\nuniform sampler2D u_texture;\nuniform float u_opacity;\nvoid main() {\n    vec4 c = texture2D(u_texture, vec2(v_local.x, 1.0 - v_local.y));\n    gl_FragColor = vec4(c.rgb, c.a * u_opacity);\n}\n\";\n\n/// Avatar shader — clips the quad to a circle using SDF, with optional greyscale desaturation.\n#[cfg(not(test))]\npub const AVATAR_FRAG_SRC: \u0026str = r\"\nprecision mediump float;\nvarying vec2 v_local;\nuniform sampler2D u_texture;\nuniform float u_opacity;\nuniform float u_desaturate;\nvoid main() {\n    vec2 uv = v_local - 0.5;\n    float d = length(uv) - 0.5 + 0.015;\n    float aa = 0.015;\n    float a = 1.0 - smoothstep(-aa, aa, d);\n    vec4 color = texture2D(u_texture, vec2(v_local.x, 1.0 - v_local.y));\n    float luma = dot(color.rgb, vec3(0.299, 0.587, 0.114));\n    color.rgb = mix(color.rgb, vec3(luma), u_desaturate);\n    gl_FragColor = vec4(color.rgb, color.a * a * u_opacity);\n}\n\";\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","text.rs"],"content":"pub fn render_text_texture(font: \u0026fontdue::Font, text: \u0026str, px_size: f32) -\u003e (Vec\u003cu8\u003e, u32, u32) {\n    use fontdue::layout::{CoordinateSystem, Layout, LayoutSettings, TextStyle};\n    let mut layout = Layout::new(CoordinateSystem::PositiveYDown);\n    layout.reset(\u0026LayoutSettings {\n        x: 0.0,\n        y: 0.0,\n        max_width: Some(240.0),\n        ..Default::default()\n    });\n    layout.append(\u0026[font], \u0026TextStyle::new(text, px_size, 0));\n    let glyphs = layout.glyphs();\n    if glyphs.is_empty() {\n        return (vec![255u8; 4], 1, 1);\n    }\n    let text_w = glyphs\n        .iter()\n        .map(|g| (g.x + g.width as f32) as u32)\n        .max()\n        .unwrap_or(1)\n        .max(1);\n    let text_h = (px_size * 1.4).ceil() as u32;\n    let mut pixels = vec![0u8; (text_w * text_h * 4) as usize];\n    for g in glyphs {\n        if g.char_data.is_whitespace() {\n            continue;\n        }\n        let (metrics, bitmap) = font.rasterize(g.parent, px_size);\n        for (i, \u0026v) in bitmap.iter().enumerate() {\n            let gx = g.x as i32 + (i % metrics.width) as i32;\n            let gy = g.y as i32 + (i / metrics.width) as i32;\n            if gx \u003e= 0 \u0026\u0026 gy \u003e= 0 \u0026\u0026 (gx as u32) \u003c text_w \u0026\u0026 (gy as u32) \u003c text_h {\n                let idx = ((gy as u32 * text_w + gx as u32) * 4) as usize;\n                pixels[idx] = 255;\n                pixels[idx + 1] = 255;\n                pixels[idx + 2] = 255;\n                pixels[idx + 3] = v;\n            }\n        }\n    }\n    // Flip rows vertically so the buffer matches OpenGL's bottom-up V=0 convention,\n    // which cancels out the `1.0 - v_local.y` Y-flip in the icon fragment shader.\n    let row_bytes = (text_w * 4) as usize;\n    for row in 0..text_h / 2 {\n        let a = (row * text_w * 4) as usize;\n        let b = ((text_h - 1 - row) * text_w * 4) as usize;\n        for col in 0..row_bytes {\n            pixels.swap(a + col, b + col);\n        }\n    }\n    (pixels, text_w, text_h)\n}\n\npub fn load_system_font() -\u003e Option\u003cfontdue::Font\u003e {\n    let paths = [\n        \"/usr/share/fonts/TTF/DejaVuSans.ttf\",\n        \"/usr/share/fonts/noto/NotoSans-Regular.ttf\",\n        \"/usr/share/fonts/noto-cjk/NotoSansCJK-Regular.ttc\",\n        \"/usr/share/fonts/liberation/LiberationSans-Regular.ttf\",\n        \"/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf\",\n        \"/usr/share/fonts/dejavu/DejaVuSans.ttf\",\n        \"/usr/share/fonts/TTF/Hack-Regular.ttf\",\n    ];\n    for p in \u0026paths {\n        if let Ok(data) = std::fs::read(p) {\n            if let Ok(font) =\n                fontdue::Font::from_bytes(data.as_slice(), fontdue::FontSettings::default())\n            {\n                tracing::info!(\"Loaded font: {p}\");\n                return Some(font);\n            }\n        }\n    }\n    None\n}\n","traces":[{"line":1,"address":[12756107,12756026,12752352],"length":1,"stats":{"Line":1}},{"line":3,"address":[12752454],"length":1,"stats":{"Line":2}},{"line":4,"address":[12752518],"length":1,"stats":{"Line":2}},{"line":8,"address":[12752459],"length":1,"stats":{"Line":1}},{"line":10,"address":[12752724],"length":1,"stats":{"Line":1}},{"line":11,"address":[12752797],"length":1,"stats":{"Line":2}},{"line":12,"address":[12752828],"length":1,"stats":{"Line":1}},{"line":13,"address":[12756040,12752886],"length":1,"stats":{"Line":2}},{"line":15,"address":[12753116,12752863],"length":1,"stats":{"Line":2}},{"line":17,"address":[12177754,12177838,12177744],"length":1,"stats":{"Line":4}},{"line":21,"address":[12753131],"length":1,"stats":{"Line":1 d":38,"coverable":39},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","textures.rs"],"content":"#[cfg(not(test))]\nuse glow::HasContext;\n\n#[cfg(not(test))]\npub unsafe fn upload_texture_wh(\n    gl: \u0026glow::Context,\n    pixels: \u0026[u8],\n    w: u32,\n    h: u32,\n) -\u003e glow::NativeTexture {\n    let tex = gl.create_texture().unwrap();\n    gl.bind_texture(glow::TEXTURE_2D, Some(tex));\n    gl.tex_parameter_i32(\n        glow::TEXTURE_2D,\n        glow::TEXTURE_WRAP_S,\n        glow::CLAMP_TO_EDGE as i32,\n    );\n    gl.tex_parameter_i32(\n        glow::TEXTURE_2D,\n        glow::TEXTURE_WRAP_T,\n        glow::CLAMP_TO_EDGE as i32,\n    );\n    gl.tex_parameter_i32(\n        glow::TEXTURE_2D,\n        glow::TEXTURE_MIN_FILTER,\n        glow::LINEAR as i32,\n    );\n    gl.tex_parameter_i32(\n        glow::TEXTURE_2D,\n        glow::TEXTURE_MAG_FILTER,\n        glow::LINEAR as i32,\n    );\n    gl.tex_image_2d(\n        glow::TEXTURE_2D,\n        0,\n        glow::RGBA as i32,\n        w as i32,\n        h as i32,\n        0,\n        glow::RGBA,\n        glow::UNSIGNED_BYTE,\n        glow::PixelUnpackData::Slice(Some(pixels)),\n    );\n    tex\n}\n\n#[cfg(not(test))]\npub unsafe fn upload_texture(gl: \u0026glow::Context, pixels: \u0026[u8], size: u32) -\u003e glow::NativeTexture {\n    upload_texture_wh(gl, pixels, size, size)\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ggomes","Documents","discord-overlay","src","render_error.rs"],"content":"//! Error types for rendering operations.\n\nuse crate::discord::UserId;\nuse std::fmt;\n\n/// Errors that can occur during rendering setup or operations.\n#[derive(Debug)]\n#[allow(dead_code)]\npub enum RenderError {\n    /// EGL display not found or initialization failed.\n    EglDisplayNotFound(String),\n    /// EGL config selection failed.\n    EglConfigSelectionFailed(String),\n    /// EGL context creation failed.\n    EglContextCreationFailed(String),\n    /// EGL surface creation failed.\n    EglSurfaceCreationFailed(String),\n    /// OpenGL shader compilation failed.\n    ShaderCompilationFailed { stage: \u0026'static str, log: String },\n    /// OpenGL program linking failed.\n    ProgramLinkingFailed(String),\n    /// Texture creation failed.\n    TextureCreationFailed(String),\n    /// Buffer object creation failed.\n    BufferCreationFailed(String),\n    /// Image decoding failed.\n    ImageDecodeFailed { user_id: UserId, error: String },\n    /// Font rendering failed.\n    FontRenderingFailed(String),\n}\n\nimpl fmt::Display for RenderError {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        match self {\n            Self::EglDisplayNotFound(e) =\u003e write!(f, \"EGL display not found: {}\", e),\n            Self::EglConfigSelectionFailed(e) =\u003e write!(f, \"EGL config selection failed: {}\", e),\n            Self::EglContextCreationFailed(e) =\u003e write!(f, \"EGL context creation failed: {}\", e),\n            Self::EglSurfaceCreationFailed(e) =\u003e write!(f, \"EGL surface creation failed: {}\", e),\n            Self::ShaderCompilationFailed { stage, log } =\u003e {\n                write!(f, \"{} shader compilation failed: {}\", stage, log)\n            }\n            Self::ProgramLinkingFailed(e) =\u003e write!(f, \"Program linking failed: {}\", e),\n            Self::TextureCreationFailed(e) =\u003e write!(f, \"Texture creation failed: {}\", e),\n            Self::BufferCreationFailed(e) =\u003e write!(f, \"Buffer creation failed: {}\", e),\n            Self::ImageDecodeFailed { user_id, error } =\u003e {\n                write!(\n                    f,\n                    \"Failed to decode avatar image for user {}: {}\",\n                    user_id, error\n                )\n            }\n            Self::FontRenderingFailed(e) =\u003e write!(f, \"Font rendering failed: {}\", e),\n        }\n    }\n}\n\nimpl std::error::Error for RenderError {}\n","
