"length":1,"stats":{"Line":0}},{"line":85,"address":[12325731,12325798],"length":1,"stats":{"Line":0}}],"covered":16,"coverable":32},{"path":["/","home","ggomes","Documents","discord-overlay","src","discord","types.rs"],"content":"//! Public types for Discord IPC communication.\n\nuse serde_json::Value;\nuse std::fmt;\n\npub struct Config {\n    pub client_id: String,\n    pub client_secret: String,\n}\n\n/// Unique Discord user identifier.\n/// Wrapping String in a newtype prevents accidental parameter swaps\n/// and makes intent clearer at call sites.\n#[derive(Debug, Clone, PartialEq, Eq, Hash, Default)]\npub struct UserId(pub String);\n\nimpl UserId {\n    #[allow(dead_code)]\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.0.is_empty()\n    }\n\n    pub fn bytes(\u0026self) -\u003e std::str::Bytes\u003c'_\u003e {\n        self.0.bytes()\n    }\n}\n\nimpl fmt::Display for UserId {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"{}\", self.0)\n    }\n}\n\nimpl From\u003cString\u003e for UserId {\n    fn from(s: String) -\u003e Self {\n        UserId(s)\n    }\n}\n\nimpl From\u003c\u0026str\u003e for UserId {\n    fn from(s: \u0026str) -\u003e Self {\n        UserId(s.to_string())\n    }\n}\n\nimpl PartialEq\u003c\u0026str\u003e for UserId {\n    fn eq(\u0026self, other: \u0026\u0026str) -\u003e bool {\n        self.0 == *other\n    }\n}\n\nimpl PartialEq\u003c\u0026str\u003e for \u0026UserId {\n    fn eq(\u0026self, other: \u0026\u0026str) -\u003e bool {\n        self.0 == *other\n    }\n}\n\nimpl PartialEq\u003cString\u003e for UserId {\n    fn eq(\u0026self, other: \u0026String) -\u003e bool {\n        \u0026self.0 == other\n    }\n}\n\n/// A participant in the current voice channel.\n#[derive(Debug, Clone)]\npub struct Participant {\n    pub user_id: UserId,\n    pub username: String,\n    pub nick: Option\u003cString\u003e,\n    pub avatar_hash: Option\u003cString\u003e,\n    /// True if muted by themselves or by the server.\n    pub muted: bool,\n    /// True if deafened by themselves or by the server.\n    pub deafened: bool,\n}\n\n/// Events sent from the Discord thread to the main thread.\n#[derive(Debug)]\npub enum DiscordEvent {\n    /// Successfully authenticated; contains the Discord username and user ID.\n    Ready { username: String, user_id: UserId },\n    /// Current mute/deafen state (sent on connect and on change).\n    VoiceSettings { mute: bool, deaf: bool },\n    /// Voice input mode: true = push-to-talk, false = voice activity.\n    VoiceMode { ptt: bool },\n    /// Current participants in the voice channel (full replace).\n    VoiceParticipants {\n        participants: Vec\u003cParticipant\u003e,\n        channel_name: Option\u003cString\u003e,\n    },\n    /// A user joined the voice channel.\n    UserJoined(Participant),\n    /// A user left the voice channel.\n    UserLeft { user_id: UserId },\n    /// A user's mute/deaf state changed.\n    ParticipantStateUpdate {\n        user_id: UserId,\n        muted: bool,\n        deafened: bool,\n    },\n    /// A user started or stopped speaking.\n    SpeakingUpdate { user_id: UserId, speaking: bool },\n    /// Avatar image downloaded and decoded.\n    AvatarLoaded {\n        user_id: UserId,\n        rgba: Vec\u003cu8\u003e,\n        size: u32,\n    },\n    /// Guild (server) name for the current voice channel.\n    GuildName { name: String },\n    /// Connection lost.\n    Disconnected,\n}\n\n/// Commands sent from the main thread to the Discord thread.\n#[derive(Debug)]\npub enum DiscordCommand {\n    SetMute(bool),\n    SetDeaf(bool),\n}\n\n/// Helper trait for cleaner JSON value extraction.\n/// Reduces repeated `.as_str().unwrap_or(\"\")` and `.as_bool().unwrap_or(false)` patterns.\npub trait JsonExt {\n    /// Extract string value, return empty string if missing or not a string.\n    fn get_string(\u0026self, key: \u0026str) -\u003e String;\n\n    /// Extract string value as Option, returns None if missing or empty.\n    fn get_str_option(\u0026self, key: \u0026str) -\u003e Option\u003cString\u003e;\n\n    /// Extract boolean value with default.\n    fn get_bool(\u0026self, key: \u0026str, default: bool) -\u003e bool;\n\n    /// Extract value at nested path like [\"data\"][\"name\"]\n    #[allow(dead_code)]\n    fn get_nested(\u0026self, path: \u0026[\u0026str]) -\u003e Option\u003cValue\u003e;\n}\n\nimpl JsonExt for Value {\n    fn get_string(\u0026self, key: \u0026str) -\u003e String {\n        self[key].as_str().unwrap_or(\"\").to_string()\n    }\n\n    fn get_str_option(\u0026self, key: \u0026str) -\u003e Option\u003cString\u003e {\n        self[key]\n            .as_str()\n            .filter(|s| !s.is_empty())\n            .map(|s| s.to_string())\n    }\n\n    fn get_bool(\u0026self, key: \u0026str, default: bool) -\u003e bool {\n        self[key].as_bool().unwrap_or(default)\n    }\n\n    fn get_nested(\u0026self, path: \u0026[\u0026str]) -\u003e Option\u003cValue\u003e {\n        let mut current = self.clone();\n        for key in path {\n            current = current[key].clone();\n            if current.is_null() {\n                return None;\n            }\n        }\n        Some(current)\n    }\n}\n\n/// Builder for Participant with sensible defaults.\npub struct ParticipantBuilder {\n    user_id: UserId,\n    username: String,\n    nick: Option\u003cString\u003e,\n    avatar_hash: Option\u003cString\u003e,\n    muted: bool,\n    deafened: bool,\n}\n\nimpl ParticipantBuilder {\n    pub fn new(user_id: impl Into\u003cUserId\u003e, username: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            user_id: user_id.into(),\n            username: username.into(),\n            nick: None,\n            avatar_hash: None,\n            muted: false,\n            deafened: false,\n        }\n    }\n\n    pub fn nick(mut self, nick: Option\u003cString\u003e) -\u003e Self {\n        self.nick = nick;\n        self\n    }\n\n    pub fn avatar_hash(mut self, hash: Option\u003cString\u003e) -\u003e Self {\n        self.avatar_hash = hash;\n        self\n    }\n\n    pub fn muted(mut self, muted: bool) -\u003e Self {\n        self.muted = muted;\n        self\n    }\n\n    pub fn deafened(mut self, deafened: bool) -\u003e Self {\n        self.deafened = deafened;\n        self\n    }\n\n    pub fn build(self) -\u003e Participant {\n        Participant {\n            user_id: self.user_id,\n            username: self.username,\n            nick: self.nick,\n            avatar_hash: self.avatar_hash.filter(|h| !h.is_empty()),\n            muted: self.muted,\n            deafened: self.deafened,\n        }\n    }\n}\n","traces":[{"line":19,"address":[12632720],"length":1,"stats":{"Line":0}},{"line":20,"address":[12632725],"length":1,"stats":{"Line":0}},{"line":23,"address":[12632736],"length":1,"stats":{"Line":1}},{"line":24,"address":[12632741],"length":1,"stats":{"Line":1}},{"line":27,"address":[12632688],"length":1,"stats":{"Line":1}},{"line":28,"address":[12632693],"length":1,"stats":{"Line":1}},{"line":33,"address":[12632928],"length":1,"stats":{"Line":0}},{"line":34,"address":[12632953],"length":1,"stats":{"Line":0}},{"line":39,"address":[12631792],"length":1,"stats":{"Line":1}},{"line":40,"address":[12631795],"length":1,"stats":{"Line":1}},{"line":45,"address":[12635344],"length":1,"stats":{"Line":1}},{"line":46,"address":[12635367],"length":1,"stats":{"Line":1}},{"line":51,"address":[12635424],"length":1,"stats":{"Line":4}},{"line":52,"address":[12635438],"length":1,"stats":{"Line":2}},{"line":57,"address":[12635456],"length":1,"stats":{"Line":1}},{"line":58,"address":[12635470],"length":1,"stats":{"Line":2}},{"line":63,"address":[12631824],"length":1,"stats":{"Line":0}},{"line":64,"address":[12631837],"length":1,"stats":{"Line":0}},{"line":144,"address":[11912336],"length":1,"stats":{"Line":1}}, ) -\u003e (i32, i32, i32, i32) {\n    let bw = 64;\n    let bh = (h as i32 - 16).max(1);\n    (w as i32 - bw - 8 - bw - 8, 8, bw, bh)\n}\npub fn drag_handle_rects(_w: u32, h: u32) -\u003e (i32, i32, i32, i32) {\n    (8, 8, 24, (h as i32 - 16).max(1))\n}\n\n// ─── Trait implementations ───────────────────────────────────────────────────\n\nimpl CompositorHandler for App {\n    fn scale_factor_changed(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026WlSurface,\n        _: i32,\n    ) {\n    }\n    fn transform_changed(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026WlSurface,\n        _: wl_output::Transform,\n    ) {\n    }\n    fn frame(\u0026mut self, _: \u0026Connection, _: \u0026QueueHandle\u003cSelf\u003e, _: \u0026WlSurface, _: u32) {}\n    fn surface_enter(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026WlSurface,\n        _: \u0026wl_output::WlOutput,\n    ) {\n    }\n    fn surface_leave(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026WlSurface,\n        _: \u0026wl_output::WlOutput,\n    ) {\n    }\n}\n\nimpl OutputHandler for App {\n    fn output_state(\u0026mut self) -\u003e \u0026mut OutputState {\n        \u0026mut self.output_state\n    }\n    fn new_output(\u0026mut self, _: \u0026Connection, _: \u0026QueueHandle\u003cSelf\u003e, _: wl_output::WlOutput) {}\n    fn update_output(\u0026mut self, _: \u0026Connection, _: \u0026QueueHandle\u003cSelf\u003e, _: wl_output::WlOutput) {}\n    fn output_destroyed(\u0026mut self, _: \u0026Connection, _: \u0026QueueHandle\u003cSelf\u003e, _: wl_output::WlOutput) {}\n}\n\nimpl LayerShellHandler for App {\n    fn closed(\u0026mut self, _: \u0026Connection, _: \u0026QueueHandle\u003cSelf\u003e, _: \u0026LayerSurface) {\n        self.exit = true;\n    }\n    fn configure(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026LayerSurface,\n        configure: LayerSurfaceConfigure,\n        _: u32,\n    ) {\n        let (w, h) = configure.new_size;\n        if w != 0 {\n            self.width = NonZeroU32::new(w).map_or(self.width, |v| v.get());\n        }\n        if h != 0 {\n            self.height = NonZeroU32::new(h).map_or(self.height, |v| v.get());\n        }\n        self.egl.resize(self.width as i32, self.height as i32);\n        self.draw();\n    }\n}\n\nimpl SeatHandler for App {\n    fn seat_state(\u0026mut self) -\u003e \u0026mut SeatState {\n        \u0026mut self.seat_state\n    }\n    fn new_seat(\u0026mut self, _: \u0026Connection, _: \u0026QueueHandle\u003cSelf\u003e, _: wl_seat::WlSeat) {}\n    fn new_capability(\n        \u0026mut self,\n        _: \u0026Connection,\n        qh: \u0026QueueHandle\u003cSelf\u003e,\n        seat: wl_seat::WlSeat,\n        capability: Capability,\n    ) {\n        if capability == Capability::Pointer {\n            let _ = self.seat_state.get_pointer(qh, \u0026seat);\n        }\n        if capability == Capability::Keyboard {\n            let _ = self.seat_state.get_keyboard::\u003c_, App\u003e(qh, \u0026seat, None);\n        }\n    }\n    fn remove_capability(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: wl_seat::WlSeat,\n        _: Capability,\n    ) {\n    }\n    fn remove_seat(\u0026mut self, _: \u0026Connection, _: \u0026QueueHandle\u003cSelf\u003e, _: wl_seat::WlSeat) {}\n}\n\nimpl PointerHandler for App {\n    fn pointer_frame(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026wl_pointer::WlPointer,\n        events: \u0026[PointerEvent],\n    ) {\n        use PointerEventKind::*;\n        for event in events {\n            if event.surface.id() != self.layer.wl_surface().id() {\n                continue;\n            }\n            match event.kind {\n                Enter { .. } | Leave { .. } =\u003e {\n                    if let Enter { .. } = event.kind {\n                        self.last_pointer_y = event.position.1;\n                    }\n                }\n\n                Motion { .. } =\u003e {\n                    self.last_pointer_y = event.position.1;\n                    if self.dragging {\n                        let (x, y) = (event.position.0 as i32, event.position.1 as i32);\n\n                        // Reconstruct absolute pointer position from expected surface pos +\n                        // surface-local event coordinates, then subtract grab offset.\n                        let ptr_screen_x = self.drag_base_pos.0 + x;\n                        let ptr_screen_y = self.drag_base_pos.1 + y;\n                        let new_x = ptr_screen_x - self.last_pointer.0;\n                        let new_y = ptr_screen_y - self.last_pointer.1;\n                        self.drag_base_pos = (new_x, new_y);\n\n                        if let Some(out) = self.drag_output.clone() {\n                            if let Some(info) = self.output_state.info(\u0026out) {\n                                let out_pos = info.logical_position.unwrap_or((0, 0));\n                                let out_scale = info.scale_factor.max(1);\n                                let left = (new_x - out_pos.0 * out_scale) / out_scale;\n                                let top = (new_y - out_pos.1 * out_scale) / out_scale;\n                                self.layer.set_anchor(Anchor::TOP | Anchor::LEFT);\n                                self.layer.set_margin(top, 0, 0, left);\n                                self.margins = (top, 0, 0, left); // keep in sync with drag_base_pos\n                                self.draw(); // egl.swap() commits margin changes + buffer\n                            }\n                        }\n                    }\n                }\n\n                Press { button, .. } =\u003e {\n                    let (x, y) = (event.position.0 as i32, event.position.1 as i32);\n\n                    if !self.compact \u0026\u0026 self.handle_button_clicks(x, y) {\n                        self.draw(); // immediately show pressed state\n                    }\n\n                    // In compact mode the whole surface is the drag handle.\n                    let on_drag_handle = if self.compact {\n                        button == BTN_LEFT\n                    } else {\n                        let (hx, hy, hw, hh) = drag_handle_rects(self.width, 64);\n                        button == BTN_LEFT \u0026\u0026 x \u003e= hx \u0026\u0026 x \u003c hx + hw \u0026\u0026 y \u003e= hy \u0026\u0026 y \u003c hy + hh\n                    };\n\n                    if on_drag_handle {\n                        // Double-click within 400 ms toggles compact mode\n                        let is_double_click = self\n                            .last_click_time\n                            .map(|t| t.elapsed() \u003c std::time::Duration::from_millis(400))\n                            .unwrap_or(false);\n                        self.last_click_time = Some(std::time::Instant::now());\n\n                        if is_double_click {\n                            self.compact = !self.compact;\n                            debug!(compact = self.compact, \"compact mode toggled\");\n                            self.dragging = false;\n                            self.last_click_time = None;\n                            self.apply_compact_resize();\n                            self.clear_input_region();\n                            self.draw();\n                            return;\n                        }\n\n                        self.start_drag(x, y);\n                    }\n                }\n\n                Release { button, .. } =\u003e {\n                    if button == BTN_LEFT {\n                        if self.dragging {\n                            debug!(\"drag released\");\n                        }\n                        self.dragging = false;\n                        if self.mute_held || self.deaf_held {\n                            self.mute_held = false;\n                            self.deaf_held = false;\n                            self.draw(); // restore normal button colors\n                        }\n                    }\n                }\n                Axis { vertical, .. } =\u003e {\n                    let delta = -vertical.absolute as f32 * 0.02;\n                    trace!(delta, pointer_y = self.last_pointer_y, \"scroll event\");\n                    if self.last_pointer_y \u003e 64.0 \u0026\u0026 !self.participants.is_empty() {\n                        // Scroll participant list: wheel-down increases offset (show further down)\n                        if delta \u003c 0.0 {\n                            let max_offset = self\n                                .participants\n                                .len()\n                                .saturating_sub(self.max_visible_rows);\n                            self.scroll_offset = (self.scroll_offset + 1).min(max_offset);\n                        } else {\n                            self.scroll_offset = self.scroll_offset.saturating_sub(1);\n                        }\n                    } else {\n                        // Control bar: adjust overlay opacity\n                        self.opacity = (self.opacity + delta).clamp(0.1, 1.0);\n                    }\n                    self.draw();\n                }\n            }\n        }\n    }\n}\n\nimpl KeyboardHandler for App {\n    fn enter(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026WlKeyboard,\n        _: \u0026WlSurface,\n        _: u32,\n        _: \u0026[u32],\n        _: \u0026[Keysym],\n    ) {\n    }\n    fn leave(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026WlKeyboard,\n        _: \u0026WlSurface,\n        _: u32,\n    ) {\n    }\n    fn press_key(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026WlKeyboard,\n        _: u32,\n        _: KeyEvent,\n    ) {\n    }\n    fn repeat_key(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026WlKeyboard,\n        _: u32,\n        _: KeyEvent,\n    ) {\n    }\n    fn release_key(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026WlKeyboard,\n        _: u32,\n        _: KeyEvent,\n    ) {\n    }\n    fn update_modifiers(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026WlKeyboard,\n        _: u32,\n        modifiers: Modifiers,\n        _: RawModifiers,\n        _: u32,\n    ) {\n        self.modifiers = modifiers;\n    }\n    fn update_repeat_info(\n        \u0026mut self,\n        _: \u0026Connection,\n        _: \u0026QueueHandle\u003cSelf\u003e,\n        _: \u0026WlKeyboard,\n        _: RepeatInfo,\n    ) {\n    }\n}\n\n// ─── Pointer helper methods ───────────────────────────────────────────────────\n\nimpl App {\n    /// Handle clicks on the mute/deafen buttons (non-compact mode only).\n    /// Returns true if any button was hit (for immediate visual feedback).\n    fn handle_button_clicks(\u0026mut self, x: i32, y: i32) -\u003e bool {\n        let mut clicked = false;\n        let (bx, by, bw, bh) = button_rects(self.width, 64);\n        if x \u003e= bx \u0026\u0026 x \u003c bx + bw \u0026\u0026 y \u003e= by \u0026\u0026 y \u003c by + bh {\n            self.deaf_held = true;\n            clicked = true;\n            let new_deaf = !self.discord_deaf;\n            debug!(deafen = new_deaf, \"deafen button clicked\");\n            if let Some(ref tx) = self.discord_cmd_tx {\n                let _ = tx.send(discord::DiscordCommand::SetDeaf(new_deaf));\n            }\n        }\n        let (bx2, by2, bw2, bh2) = button2_rects(self.width, 64);\n        if x \u003e= bx2 \u0026\u0026 x \u003c bx2 + bw2 \u0026\u0026 y \u003e= by2 \u0026\u0026 y \u003c by2 + bh2 {\n            self.mute_held = true;\n            clicked = true;\n            let new_mute = !self.discord_mute;\n            debug!(mute = new_mute, \"mute button clicked\");\n            if let Some(ref tx) = self.discord_cmd_tx {\n                let _ = tx.send(discord::DiscordCommand::SetMute(new_mute));\n            }\n        }\n        clicked\n    }\n\n    /// Convert the current anchor/margin state to an absolute screen position and\n    /// begin a drag. `(x, y)` are the surface-local pointer coordinates at press time.\n    fn start_drag(\u0026mut self, x: i32, y: i32) {\n        let outputs: Vec\u003c_\u003e = self\n            .layer\n            .wl_surface()\n            .data::\u003cSurfaceData\u003e()\n            .map(|d| d.outputs().collect())\n            .unwrap_or_default();\n        if let Some(output) = outputs.first() {\n            let out = output.clone();\n            if let Some(info) = self.output_state.info(\u0026out) {\n                let out_pos = info.logical_position.unwrap_or((0, 0));\n                let out_size = info.logical_size.unwrap_or((1920, 1080));\n                let out_scale = info.scale_factor;\n\n                let (top, right, bottom, left) = self.margins;\n                let surf_scale = self\n                    .layer\n                    .wl_surface()\n                    .data::\u003cSurfaceData\u003e()\n                    .map(|d| d.scale_factor())\n                    .unwrap_or(1);\n                let surf_w = self.width as i32 * surf_scale;\n                let surf_h = self.height as i32 * surf_scale;\n\n                let out_pos_px = (out_pos.0 * out_scale, out_pos.1 * out_scale);\n                let out_size_px = (out_size.0 * out_scale, out_size.1 * out_scale);\n\n                let abs_left = if self.anchor.contains(Anchor::RIGHT) {\n                    out_pos_px.0 + out_size_px.0 - right - surf_w\n                } else {\n                    out_pos_px.0 + left\n                };\n                let abs_top = if self.anchor.contains(Anchor::BOTTOM) {\n                    out_pos_px.1 + out_size_px.1 - bottom - surf_h\n                } else {\n                    out_pos_px.1 + top\n                };\n\n                self.anchor = Anchor::TOP | Anchor::LEFT;\n                self.layer.set_anchor(self.anchor);\n                let top_m = (abs_top - out_pos_px.1) / out_scale;\n                let left_m = (abs_left - out_pos_px.0) / out_scale;\n                self.layer.set_margin(top_m, 0, 0, left_m);\n                self.drag_base_pos = (abs_left, abs_top);\n                self.drag_output = Some(out);\n            }\n        }\n        debug!(x, y, \"drag started\");\n        self.dragging = true;\n        self.last_pointer = (x, y);\n        self.draw();\n    }\n}\n\n// ─── Delegate macros ─────────────────────────────────────────────────────────\n\ndelegate_compositor!(App);\ndelegate_output!(App);\ndelegate_seat!(App);\ndelegate_pointer!(App);\ndelegate_layer!(App);\ndelegate_registry!(App);\n\ndelegate_keyboard!(App);\n\nimpl ProvidesRegistryState for App {\n    fn registry(\u0026mut self) -\u003e \u0026mut RegistryState {\n        \u0026mut self.registry_state\n    }\n    registry_handlers![OutputState, SeatState];\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn button_rects_basic() {\n        let (x, y, w, h) = button_rects(360, 64);\n        assert_eq!(w, 64);\n        assert_eq!(h, 48);\n        assert_eq!(x, 360i32 - w - 8);\n        assert_eq!(y, 8);\n    }\n\n    #[test]\n    fn button2_rects_basic() {\n        let (x, _y, w, h) = button2_rects(360, 64);\n        assert_eq!(w, 64);\n        assert_eq!(h, 48);\n        assert_eq!(x, 360i32 - w - 8 - w - 8);\n    }\n\n    #[test]\n    fn drag_handle() {\n        let (x, y, w, h) = drag_handle_rects(360, 64);\n        assert_eq!(x, 8);\n        assert_eq!(y, 8);\n        assert_eq!(w, 24);\n        assert!(h \u003e 0);\n    }\n\n    #[test]\n    fn small_height_button_rects() {\n        let (_x, _y, _w, h) = button_rects(100, 10);\n        assert_eq!(h, 1);\n        let (_x2, _y2, _w2, h2) = button2_rects(100, 10);\n        assert_eq!(h2, 1);\n        let (_hx, _hy, _hw, hh) = drag_handle_rects(100, 10);\n        assert_eq!(hh, 1);\n    }\n\n    #[test]\n    fn button_rects_preserves_width() {\n        let (_, _, w, _) = button_rects(200, 100);\n        assert_eq!(w, 64);\n\n        let (_, _, w, _) = button_rects(500, 50);\n        assert_eq!(w, 64);\n    }\n\n    #[test]\n    fn button2_rects_at_right_edge() {\n        let (x1, _, _w1, _) = button_rects(360, 64);\n        let (x2, _, w2, _) = button2_rects(360, 64);\n        assert_eq!(x2, x1 - w2 - 8);\n    }\n\n    #[test]\n    fn drag_handle_ignores_width() {\n        let (x, _, _, _) = drag_handle_rects(200, 64);\n        assert_eq!(x, 8);\n\n        let (x, _, _, _) = drag_handle_rects(800, 100);\n        assert_eq!(x, 8);\n    }\n\n    #[test]\n    fn button_height_scales_with_window() {\n        let (_, _, _, h) = button_rects(100, 100);\n        assert_eq!(h, 84);\n\n        let (_, _, _, h) = button_rects(100, 50);\n        assert_eq!(h, 34);\n\n        let (_, _, _, h) = button_rects(100, 20);\n        assert_eq!(h, 4);\n\n        let (_, _, _, h) = button_rects(100, 8);\n        assert_eq!(h, 1);\n    }\n\n    #[test]\n    fn button_y_always_8() {\n        let (_, y, _, _) = button_rects(100, 64);\n        assert_eq!(y, 8);\n\n        let (_, y, _, _) = button_rects(500, 200);\n        assert_eq!(y, 8);\n    }\n}\n","traces":[{"line":30,"address":[11810352],"length":1,"stats":{"Line":1}},{ [12563822,12563770,12563922],"length":1,"stats":{"Line":0}},{"line":398,"address":[12563896,12564206,12563950,12564030],"length":1,"stats":{"Line":0}},{"line":399,"address":[12564104,12564000,12564211],"length":1,"stats":{"Line":0}},{"line":401,"address":[12564032,12563970,12564023],"length":1,"stats":{"Line":0}},{"line":403,"address":[12564239,12564319,12564485,12564061],"length":1,"stats":{"Line":0}},{"line":404,"address":[12564289,12564383,12564490],"length":1,"stats":{"Line":0}},{"line":406,"address":[12564259,12564321,12564312],"length":1,"stats":{"Line":0}},{"line":409,"address":[12564352,12564526],"length":1,"stats":{"Line":0}},{"line":410,"address":[12564532],"length":1,"stats":{"Line":0}},{"line":411,"address":[12564566,12564741],"length":1,"stats":{"Line":0}},{"line":412,"address":[12564920,12564718,12564769],"length":1,"stats":{"Line":0}},{"line":413,"address":[12564898],"length":1,"stats":{"Line":0}},{"line":414,"address":[12564949],"length":1,"stats":{"Line":0}},{"line":415,"address":[12565137,12564975],"length":1,"stats":{"Line":0}},{"line":418,"address":[12565784,12565383,12562802],"length":1,"stats":{"Line":0}},{"line":419,"address":[12565741],"length":1,"stats":{"Line":0}},{"line":420,"address":[12565748],"length":1,"stats":{"Line":0}},{"line":421,"address":[12565774],"length":1,"stats":{"Line":0}},{"line":437,"address":[12560224],"length":1,"stats":{"Line":0}},{"line":438,"address":[12560232],"length":1,"stats":{"Line":0}}],"covered":10,"coverable":167},{"path":["/","home","ggomes","Documents","discord-overlay","src","main.rs"],"content":"//! hypr-overlay-wl — phase 2: EGL/GLES2 hardware-accelerated layer-shell overlay.\n//!\n//! Transparent except for two rounded buttons (Mute/Deafen) and a drag handle.\n//! Click-through everywhere else via wl_surface.set_input_region.\n//! Discord IPC: set DISCORD_CLIENT_ID + DISCORD_CLIENT_SECRET to enable.\n\nmod avatar;\nmod config;\nmod discord;\nmod handlers;\nmod render;\nmod render_error;\nmod state;\n\nuse std::sync::mpsc;\n\nuse calloop::EventLoop;\nuse calloop_wayland_source::WaylandSource;\nuse sctk::compositor::CompositorState;\nuse sctk::output::OutputState;\nuse sctk::reexports::client::globals::registry_queue_init;\nuse sctk::reexports::client::Connection;\nuse sctk::registry::RegistryState;\nuse sctk::seat::keyboard::Modifiers;\nuse sctk::seat::SeatState;\nuse sctk::shell::wlr_layer::{Anchor, KeyboardInteractivity, Layer, LayerShell};\nuse sctk::shell::WaylandSurface;\nuse smithay_client_toolkit as sctk;\n\nuse config::Config;\n#[cfg(not(test))]\nuse render::EglContext;\nuse render::{load_system_font, EglBackend};\nuse state::App;\nuse tracing::{debug, error, info, trace, warn};\n\nfn main() {\n    use tracing_subscriber::{fmt, EnvFilter};\n    fmt()\n        .with_env_filter(\n            EnvFilter::try_from_env(\"RUST_LOG\")\n                .unwrap_or_else(|_| EnvFilter::new(\"hypr_overlay_wl=info\")),\n        )\n        .with_target(false)\n        .with_thread_ids(false)\n        .compact()\n        .init();\n    info!(\"Starting hypr-overlay-wl (EGL/GLES2)\");\n\n    let cfg = Config::load();\n    Config::write_default_if_missing();\n\n    let conn = Connection::connect_to_env().expect(\"Wayland connection failed\");\n    let (globals, event_queue) = registry_queue_init(\u0026conn).expect(\"registry init failed\");\n    let qh = event_queue.handle();\n\n    let compositor = CompositorState::bind(\u0026globals, \u0026qh).expect(\"wl_compositor not available\");\n    let layer_shell = LayerShell::bind(\u0026globals, \u0026qh).expect(\"layer shell not available\");\n\n    let surface = compositor.create_surface(\u0026qh);\n    let layer =\n        layer_shell.create_layer_surface(\u0026qh, surface, Layer::Overlay, Some(\"hypr_overlay\"), None);\n\n    layer.set_anchor(Anchor::TOP | Anchor::LEFT);\n    layer.set_keyboard_interactivity(KeyboardInteractivity::None);\n    layer.set_size(360, 64);\n    layer.set_exclusive_zone(-1);\n    layer.set_margin(cfg.initial_y, 0, 0, cfg.initial_x);\n    layer.commit();\n\n    let egl_ctx: Box\u003cdyn EglBackend\u003e = {\n        #[cfg(not(test))]\n        {\n            Box::new(EglContext::new(\u0026conn, layer.wl_surface(), 360, 64))\n        }\n        #[cfg(test)]\n        {\n            Box::new(crate::render::MockEgl::new())\n        }\n    };\n\n    // Set up calloop event loop — integrates Wayland + Discord channel\n    let mut event_loop: EventLoop\u003c'static, App\u003e = EventLoop::try_new().unwrap();\n    let loop_handle = event_loop.handle();\n\n    WaylandSource::new(conn, event_queue)\n        .insert(loop_handle.clone())\n        .unwrap();\n\n    // Optional Discord IPC — enabled when both env vars are set\n    let (discord_ev_tx, discord_ev_channel) = calloop::channel::channel::\u003cdiscord::DiscordEvent\u003e();\n    loop_handle\n        .insert_source(discord_ev_channel, |event, _, app| {\n            if let calloop::channel::Event::Msg(ev) = event {\n                debug!(\"EVENT: Discord event received: {:?}\", ev);\n                if app.handle_discord_event(ev) {\n                    debug!(\"EVENT: handle_discord_event returned true, calling draw()\");\n                    app.draw();\n                } else {\n                    debug!(\"EVENT: handle_discord_event returned false, skipping draw()\");\n                }\n            }\n        })\n        .unwrap();\n\n    // Combined animation + speaking-expiry tick (~180ms join/leave, 250ms idle fade)\n    loop_handle\n        .insert_source(\n            calloop::timer::Timer::from_duration(std::time::Duration::from_millis(16)),\n            |_, _, app| {\n                let now = std::time::Instant::now();\n                // anim_speed: full travel in ~180ms at a 16ms tick rate\n                const ANIM_SPEED: f32 = 0.016 / 0.18;\n\n                let mut needs_redraw = false;\n                needs_redraw |= app.tick_animations(ANIM_SPEED);\n                needs_redraw |= app.tick_speaking_expiry(now);\n                needs_redraw |= app.tick_ptt(now);\n                needs_redraw |= app.tick_idle_alpha();\n                needs_redraw |= app.tick_timer();\n\n                if needs_redraw {\n                    trace!(\"timer tick: redrawing\");\n                    app.draw();\n                } else {\n                    trace!(\"timer tick: no redraw needed\");\n                }\n\n                // Run at 16ms when animating, 500ms when idle or just tracking timer\n                let target_alpha = if app.in_channel { 1.0_f32 } else { 0.0_f32 };\n                let animating = app.participants.iter().any(|p| {\n                    p.anim \u003c 1.0 || p.leaving || p.speaking_anim \u003e 0.005 \u0026\u0026 p.speaking_anim \u003c 0.995\n                }) || app.participants.iter().any(|p| p.speaking_anim \u003e 0.5)\n                    || (app.idle_alpha - target_alpha).abs() \u003e 0.005;\n                let next = if animating {\n                    std::time::Duration::from_millis(16)\n                } else {\n                    // 500ms is fine for the session timer (≤500ms display lag per second)\n                    std::time::Duration::from_millis(500)\n                };\n                calloop::timer::TimeoutAction::ToDuration(next)\n            },\n        )\n        .unwrap();\n\n    let discord_cmd_tx = if !cfg.discord_client_id.is_empty()\n        \u0026\u0026 !cfg.discord_client_secret.is_empty()\n    {\n        let (tx, rx) = mpsc::sync_channel(32);\n        discord::spawn(\n            discord::Config {\n                client_id: cfg.discord_client_id.clone(),\n                client_secret: cfg.discord_client_secret.clone(),\n            },\n            discord_ev_tx,\n            rx,\n        );\n        info!(\"Discord IPC enabled — waiting for connection...\");\n        Some(tx)\n    } else {\n        error!(\n            \"Discord IPC disabled — set discord_client_id and discord_client_secret in\\n  ~/.config/hypr-overlay/config.toml\"\n        );\n        None\n    };\n\n    let mut app = App {\n        registry_state: RegistryState::new(\u0026globals),\n        seat_state: SeatState::new(\u0026globals, \u0026qh),\n        output_state: OutputState::new(\u0026globals, \u0026qh),\n        compositor,\n        layer,\n        egl: egl_ctx,\n        width: 360,\n        height: 64,\n        dragging: false,\n        last_pointer: (0, 0),\n        drag_base_pos: (cfg.initial_x, cfg.initial_y),\n        drag_output: None,\n        margins: (cfg.initial_y, 0, 0, cfg.initial_x),\n        anchor: Anchor::TOP | Anchor::LEFT,\n        modifiers: Modifiers::default(),\n        exit: false,\n        discord_cmd_tx,\n        discord_mute: false,\n        discord_deaf: false,\n        opacity: std::env::var(\"OVERLAY_OPACITY\")\n            .ok()\n            .and_then(|s| s.parse::\u003cf32\u003e().ok())\n            .unwrap_or(cfg.opacity)\n            .clamp(0.1, 1.0),\n        participants: vec![],\n        avatar_textures: std::collections::HashMap::new(),\n        name_textures: std::collections::HashMap::new(),\n        initials_textures: std::collections::HashMap::new(),\n        font: load_system_font(),\n        channel_name: None,\n        channel_name_tex: None,\n        guild_name: None,\n        guild_name_tex: None,\n        in_channel: false,\n        idle_alpha: 0.0,\n        channel_joined_at: None,\n        timer_tex: None,\n        last_timer_secs: u32::MAX,\n        scroll_offset: 0,\n        max_visible_rows: cfg.max_visible_rows,\n        scroll_indicator_tex: None,\n        last_scroll_state: (usize::MAX, usize::MAX),\n        last_pointer_y: 0.0,\n        compact: cfg.compact_by_default,\n        last_click_time: None,\n        ptt_mode: false,\n        ptt_active: false,\n        self_user_id: crate::discord::UserId::default(),\n        participant_count_tex: None,\n        last_participant_count: usize::MAX,\n        overflow_badge_tex: None,\n        last_overflow_count: usize::MAX,\n        ellipsis_tex: None,\n        speaking_pulse_phase: 0.0,\n        mute_held: false,\n        deaf_held: false,\n        config: cfg,\n    };\n\n    // Config hot-reload via inotify: watch config dir and send () on changes\n    let (inotify_reload_tx, inotify_reload_rx) = calloop::channel::channel::\u003c()\u003e();\n    {\n        use inotify::{Inotify, WatchMask};\n        let config_path = config::config_path();\n        std::thread::spawn(move || {\n            let mut inotify = match Inotify::init() {\n                Ok(i) =\u003e i,\n                Err(e) =\u003e {\n                    warn!(\"inotify init failed: {e}\");\n                    return;\n                }\n            };\n            if let Some(dir) = config_path.parent() {\n                if let Err(e) = inotify\n                    .watches()\n                    .add(dir, WatchMask::CLOSE_WRITE | WatchMask::MOVED_TO)\n                {\n                    warn!(\"inotify watch add failed: {e}\");\n                    return;\n                }\n            }\n            let config_filename = config_path.file_name().map(|f| f.to_owned());\n            let mut buf = [0u8; 1024];\n            loop {\n                match inotify.read_events_blocking(\u0026mut buf) {\n                    Ok(events) =\u003e {\n                        let changed = events.into_iter().any(|e| {\n                            e.name\n                                .map(|n| Some(n) == config_filename.as_deref())\n                                .unwrap_or(false)\n                        });\n                        if changed {\n                            let _ = inotify_reload_tx.send(());\n                        }\n                    }\n                    Err(e) =\u003e {\n                        warn!(\"inotify read error: {e}\");\n                        break;\n                    }\n                }\n            }\n        });\n    }\n    loop_handle\n        .insert_source(inotify_reload_rx, |event, _, app| {\n            if let calloop::channel::Event::Msg(()) = event {\n                info!(\"config file changed, reloading...\");\n                let new_cfg = Config::load();\n                app.opacity = new_cfg.opacity;\n                app.max_visible_rows = new_cfg.max_visible_rows;\n                // Collect data needed for texture regeneration before updating config\n                let participants: Vec\u003c(crate::discord::UserId, String)\u003e = app\n                    .participants\n                    .iter()\n                    .map(|p| (p.user_id.clone(), p.display_name.clone()))\n                    .collect();\n                let channel_name = app.channel_name.clone();\n                let guild_name = app.guild_name.clone();\n                app.config = new_cfg;\n                // Regenerate name + initials textures with new font size\n                for (uid, name) in \u0026participants {\n                    if let Some((tex, _, _)) = app.name_textures.remove(uid) {\n                        app.egl.delete_texture(tex);\n                    }\n                    app.make_name_texture(uid, name);\n                    if let Some((tex, _, _)) = app.initials_textures.remove(uid) {\n                        app.egl.delete_texture(tex);\n                    }\n                    app.ensure_initial_texture(uid, name);\n                }\n                // Regenerate channel name texture\n                if let Some((tex, _, _)) = app.channel_name_tex.take() {\n                    app.egl.delete_texture(tex);\n                }\n                if let Some(ref name) = channel_name {\n                    let display = format!(\"# {name}\");\n                    app.channel_name_tex = app.render_text_tex(\u0026display, app.config.font_size * 0.93);\n                }\n                // Regenerate guild name texture\n                if let Some((tex, _, _)) = app.guild_name_tex.take() {\n                    app.egl.delete_texture(tex);\n                }\n                if let Some(ref name) = guild_name {\n                    app.guild_name_tex = app.render_text_tex(name, app.config.font_size * 0.79);\n                }\n                // Reset sentinels so timer, count, scroll indicator regenerate on next draw/tick\n                if let Some((tex, _, _)) = app.timer_tex.take() {\n                    app.egl.delete_texture(tex);\n                }\n                app.last_timer_secs = u32::MAX;\n                app.last_participant_count = usize::MAX;\n                app.last_scroll_state = (usize::MAX, usize::MAX);\n                // Invalidate ellipsis and overflow badge (font-size-dependent)\n                if let Some((tex, _, _)) = app.ellipsis_tex.take() {\n                    app.egl.delete_texture(tex);\n                }\n                if let Some((tex, _, _)) = app.overflow_badge_tex.take() {\n                    app.egl.delete_texture(tex);\n                }\n                app.last_overflow_count = usize::MAX;\n                app.draw();\n            }\n        })\n        .expect(\"inotify reload source\");\n\n    let loop_signal = event_loop.get_signal();\n    event_loop\n        .run(None, \u0026mut app, move |app| {\n            if app.exit {\n                loop_signal.stop();\n            }\n        })\n        .expect(\"event loop error\");\n\n    info!(\"hypr-overlay exiting\");\n}\n","traces":[{"line":37,"address":[11769547,11764336,11776228],"length":1,"stats":{"Line":0}},{"line":39,"address":[11764403],"length":1,"stats":{"Line":0}},{"line":41,"address":[11764521],"length":1,"stats":{"Line":0}},{"line":42,"address":[11764546],"length":1,"stats":{"Line":0}},{"line":48,"address":[11765140,11764684],"length":1,"stats":{"Line":0}},{"line":50,"address":[11765109],"length":1,"stats":{"Line":0}},{"line":51,"address":[11765130],"length":1,"stats":{"Line":0}},{"line":53,"address":[11765648],"length":1,"stats":{"Line":0}},{"line":54,"ad h":1,"stats":{"Line":0}},{"line":342,"address":[11774428,11774847],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":154},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","compile.rs"],"content":"// Shader compile/link helper for render module.\nuse tracing::debug;\n\n// Abstraction over GLES API used by the compile helper. This allows unit-testing the\n// compile/link logic without a real GL context by providing a mock implementation.\npub trait GlInterface {\n    type Shader;\n    type Program;\n\n    fn create_shader(\u0026self, shader_type: u32) -\u003e Result\u003cSelf::Shader, String\u003e;\n    fn shader_source(\u0026self, shader: \u0026Self::Shader, src: \u0026str);\n    fn compile_shader(\u0026self, shader: \u0026Self::Shader);\n    fn get_shader_compile_status(\u0026self, shader: \u0026Self::Shader) -\u003e bool;\n    fn get_shader_info_log(\u0026self, shader: \u0026Self::Shader) -\u003e String;\n    fn create_program(\u0026self) -\u003e Result\u003cSelf::Program, String\u003e;\n    fn attach_shader(\u0026self, program: \u0026Self::Program, shader: \u0026Self::Shader);\n    fn link_program(\u0026self, program: \u0026Self::Program);\n    fn get_program_link_status(\u0026self, program: \u0026Self::Program) -\u003e bool;\n    fn get_program_info_log(\u0026self, program: \u0026Self::Program) -\u003e String;\n    fn delete_shader(\u0026self, shader: \u0026Self::Shader);\n}\n\nimpl GlInterface for glow::Context {\n    type Shader = glow::NativeShader;\n    type Program = glow::NativeProgram;\n\n    fn create_shader(\u0026self, shader_type: u32) -\u003e Result\u003cSelf::Shader, String\u003e {\n        unsafe { glow::HasContext::create_shader(self, shader_type) }\n    }\n\n    fn shader_source(\u0026self, shader: \u0026Self::Shader, src: \u0026str) {\n        unsafe { glow::HasContext::shader_source(self, *shader, src) }\n    }\n\n    fn compile_shader(\u0026self, shader: \u0026Self::Shader) {\n        unsafe { glow::HasContext::compile_shader(self, *shader) }\n    }\n\n    fn get_shader_compile_status(\u0026self, shader: \u0026Self::Shader) -\u003e bool {\n        unsafe { glow::HasContext::get_shader_compile_status(self, *shader) }\n    }\n\n    fn get_shader_info_log(\u0026self, shader: \u0026Self::Shader) -\u003e String {\n        unsafe { glow::HasContext::get_shader_info_log(self, *shader) }\n    }\n\n    fn create_program(\u0026self) -\u003e Result\u003cSelf::Program, String\u003e {\n        unsafe { glow::HasContext::create_program(self) }\n    }\n\n    fn attach_shader(\u0026self, program: \u0026Self::Program, shader: \u0026Self::Shader) {\n        unsafe { glow::HasContext::attach_shader(self, *program, *shader) }\n    }\n\n    fn link_program(\u0026self, program: \u0026Self::Program) {\n        unsafe { glow::HasContext::link_program(self, *program) }\n    }\n\n    fn get_program_link_status(\u0026self, program: \u0026Self::Program) -\u003e bool {\n        unsafe { glow::HasContext::get_program_link_status(self, *program) }\n    }\n\n    fn get_program_info_log(\u0026self, program: \u0026Self::Program) -\u003e String {\n        unsafe { glow::HasContext::get_program_info_log(self, *program) }\n    }\n\n    fn delete_shader(\u0026self, shader: \u0026Self::Shader) {\n        unsafe { glow::HasContext::delete_shader(self, *shader) }\n    }\n}\n\n/// Generic compile/link implementation parameterized over a GlInterface.\npub fn compile_program_generic\u003cG: GlInterface\u003e(\n    gl: \u0026G,\n    vert_src: \u0026str,\n    frag_src: \u0026str,\n) -\u003e G::Program {\n    let vs = gl\n        .create_shader(glow::VERTEX_SHADER)\n        .expect(\"create_shader failed\");\n    gl.shader_source(\u0026vs, vert_src);\n    gl.compile_shader(\u0026vs);\n    assert!(\n        gl.get_shader_compile_status(\u0026vs),\n        \"vertex shader: {}\",\n        gl.get_shader_info_log(\u0026vs)\n    );\n\n    let fs = gl\n        .create_shader(glow::FRAGMENT_SHADER)\n        .expect(\"create_shader failed\");\n    gl.shader_source(\u0026fs, frag_src);\n    gl.compile_shader(\u0026fs);\n    assert!(\n        gl.get_shader_compile_status(\u0026fs),\n        \"fragment shader: {}\",\n        gl.get_shader_info_log(\u0026fs)\n    );\n\n    let prog = gl.create_program().expect(\"create_program failed\");\n    gl.attach_shader(\u0026prog, \u0026vs);\n    gl.attach_shader(\u0026prog, \u0026fs);\n    gl.link_program(\u0026prog);\n    assert!(\n        gl.get_program_link_status(\u0026prog),\n        \"link: {}\",\n        gl.get_program_info_log(\u0026prog)\n    );\n    gl.delete_shader(\u0026vs);\n    gl.delete_shader(\u0026fs);\n    debug!(\"shader program compiled and linked\");\n    prog\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::cell::RefCell;\n\n    struct MockGl {\n        vs_status: RefCell\u003cbool\u003e,\n        fs_status: RefCell\u003cbool\u003e,\n        program_status: RefCell\u003cbool\u003e,\n        vs_log: RefCell\u003cString\u003e,\n        fs_log: RefCell\u003cString\u003e,\n        prog_log: RefCell\u003cString\u003e,\n        next_shader: RefCell\u003cu32\u003e,\n        next_program: RefCell\u003cu32\u003e,\n    }\n\n    impl MockGl {\n        fn new() -\u003e Self {\n            MockGl {\n                vs_status: RefCell::new(true),\n                fs_status: RefCell::new(true),\n                program_status: RefCell::new(true),\n                vs_log: RefCell::new(String::new()),\n                fs_log: RefCell::new(String::new()),\n                prog_log: RefCell::new(String::new()),\n                next_shader: RefCell::new(1),\n                next_program: RefCell::new(100),\n            }\n        }\n    }\n\n    impl GlInterface for MockGl {\n        type Shader = u32;\n        type Program = u32;\n\n        fn create_shader(\u0026self, _shader_type: u32) -\u003e Result\u003cSelf::Shader, String\u003e {\n            let mut s = self.next_shader.borrow_mut();\n            let val = *s;\n            *s += 1;\n            Ok(val)\n        }\n\n        fn shader_source(\u0026self, _shader: \u0026Self::Shader, _src: \u0026str) {}\n\n        fn compile_shader(\u0026self, _shader: \u0026Self::Shader) {}\n\n        fn get_shader_compile_status(\u0026self, shader: \u0026Self::Shader) -\u003e bool {\n            if *shader % 2 == 0 {\n                *self.fs_status.borrow()\n            } else {\n                *self.vs_status.borrow()\n            }\n        }\n\n        fn get_shader_info_log(\u0026self, shader: \u0026Self::Shader) -\u003e String {\n            if *shader % 2 == 0 {\n                self.fs_log.borrow().clone()\n            } else {\n                self.vs_log.borrow().clone()\n            }\n        }\n\n        fn create_program(\u0026self) -\u003e Result\u003cSelf::Program, String\u003e {\n            let mut p = self.next_program.borrow_mut();\n            let val = *p;\n            *p += 1;\n            Ok(val)\n        }\n\n        fn attach_shader(\u0026self, _program: \u0026Self::Program, _shader: \u0026Self::Shader) {}\n\n        fn link_program(\u0026self, _program: \u0026Self::Program) {}\n\n        fn get_program_link_status(\u0026self, _program: \u0026Self::Program) -\u003e bool {\n            *self.program_status.borrow()\n        }\n\n        fn get_program_info_log(\u0026self, _program: \u0026Self::Program) -\u003e String {\n            self.prog_log.borrow().clone()\n        }\n\n        fn delete_shader(\u0026self, _shader: \u0026Self::Shader) {}\n    }\n\n    #[test]\n    fn compile_program_generic_success() {\n        let mock = MockGl::new();\n        let prog = compile_program_generic(\u0026mock, \"void main() {}\", \"void main() {}\");\n        assert!(prog \u003e= 100);\n    }\n\n    #[test]\n    #[should_panic(expected = \"fragment shader:\")]\n    fn compile_program_fragment_fail() {\n        let mock = MockGl::new();\n        *mock.fs_status.borrow_mut() = false;\n        *mock.fs_log.borrow_mut() = \"frag error\".to_string();\n        let _ = compile_program_generic(\u0026mock, \"void main() {}\", \"bad frag\");\n    }\n\n    #[test]\n    #[should_panic(expected = \"vertex shader:\")]\n    fn compile_program_vertex_fail() {\n        let mock = MockGl::new();\n        *mock.vs_status.borrow_mut() = false;\n        *mock.vs_log.borrow_mut() = \"vs error\".to_string();\n        let _ = compile_program_generic(\u0026mock, \"bad vert\", \"void main() {}\");\n    }\n\n    #[test]\n    #[should_panic(expected = \"link:\")]\n    fn compile_program_link_fail() {\n        let mock = MockGl::new();\n        *mock.program_status.borrow_mut() = false;\n        *mock.prog_log.borrow_mut() = \"link error\".to_string();\n        let _ = compile_program_generic(\u0026mock, \"void main() {}\", \"void main() {}\");\n    }\n}\n","traces":[{"line":27,"address":[12126704],"length":1,"stats":{"Line":0}},{"line":28,"address":[12126724],"length":1,"stats":{"Line":0}},{"line":31,"address":[12126784],"length":1,"stats":{"Line":0}},{"line":32,"address":[12126808],"length":1,"stats":{"Line":0}},{"line":35,"address":[12126832],"length":1,"stats":{"Line":0}},{"line":36,"address":[12126846],"length":1,"stats":{"Line":0}},{"line":39,"address":[12127040],"length":1,"stats":{"Line":0}},{"line":40,"address":[12127054],"length":1,"stats":{"Line":0}},{"line":43,"address":[12126912],"length":1,"stats":{"Line":0}},{"line":44,"address":[12126933],"length":1,"stats":{"Line":0}},{"line":47,"address":[12126864],"length":1,"stats":{"Line":0}},{"line":48,"address":[12126881],"length":1,"stats":{"Line":0}},{"line":51,"address":[12126656],"length":1,"stats":{"Line":0}},{"line":52,"address":[12126674],"length":1,"stats":{"Line":0}},{"line":55,"address":[12126624],"length":1,"stats":{"Line":0}},{"line":56,"address":[12126638],"length":1,"stats":{"Line":0}},{"line":59,"address":[12127008],"length":1,"stats":{"Line":0}},{"line":60,"address":[12127022],"length":1,"stats":{"Line":0}},{"line":63,"address":[12126960],"length":1,"stats":{"Line":0}},{"line":64,"address":[12126981],"length":1,"stats":{"Line":0}},{"line":67,"address":[12126752],"length":1,"stats":{"Line":0}},{"line":68,"address":[12126766],"length":1,"stats":{"Line":0}},{"line":73,"address":[12055173,12057509,12054837,12057312,12054640,12057845],"length":1,"stats":{"Line":6}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[12054754,12057426],"length":1,"stats":{"Line":5}},{"line":81,"address":[12057502,12054830],"length":1,"stats":{"Line":5}},{"line":82,"address":[12057560,12054888],"length":1,"stats":{"Line":5}},{"line":83,"address":[12057583,12054911],"length":1,"stats":{"Line":5}},{"line":84,"address":[],"length":0,"stats":{"Line":0}},{"line":85,"address":[],"length":0,"stats":{"Line":0}},{"line":86,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[12057923,12055251],"length":1,"stats":{"Line":4}},{"line":90,"address":[12054990,12057662],"length":1,"stats":{"Line":4}},{"line":92,"address":[12057938,12055266],"length":1,"stats":{"Line":4}},{"line":93,"address":[12057988,12055316],"length":1,"stats":{"Line":4}},{"line":94,"address":[12058062,12055390],"length":1,"stats":{"Line":1}},{"line":95,"address":[],"length":0,"stats":{"Line":0}},{"line":96,"address":[],"length":0,"stats":{"Line":0}},{"line":97,"address":[],"length":0,"stats":{"Line":0}},{"line":100,"address":[12055597,12058269,12055413,12058085],"length":1,"stats":{"Line":6}},{"line":101,"address":[12058348,12055676],"length":1,"stats":{"Line":3}},{"line":102,"address":[12055734,12058406],"length":1,"stats":{"Line":2}},{"line":103,"address":[12058429,12055757],"length":1,"stats":{"Line":2}},{"line":104,"address":[12055872,12058544],"length":1,"stats":{"Line":1}},{"line":105,"address":[],"length":0,"stats":{"Line":0}},{"line":106,"address":[],"length":0,"stats":{"Line":0}},{"line":107,"address":[],"length":0,"stats":{"Line":0}},{"line":109,"address":[12055854,12058526],"length":1,"stats":{"Line":2}},{"line":110,"address":[12058726,12056054],"length":1,"stats":{"Line":2}},{"line":111,"address":[12058733,12059137,12056465,12056061],"length":1,"stats":{"Line":4}},{"line":112,"address":[12056446,12059118],"length":1,"stats":{"Line":2}}],"covered":19,"coverable":51},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","draw.rs"],"content":"// Draw helper utilities: generate quad vertices (NDC) and upload/bind them.\n// Keep pure functions testable; GL-dependent helpers are cfg-gated.\n\n/// Generate vertex array for a quad covering the pixel rectangle (px,py,pw,ph)\n/// into NDC coordinates. Each vertex is (ndc_x, ndc_y, local_u, local_v).\n/// Returned array layout matches the existing code: TL, TR, BL, BR.\npub fn verts_from_pixels(\n    px: f32,\n    py: f32,\n    pw: f32,\n    ph: f32,\n    surf_w: f32,\n    surf_h: f32,\n) -\u003e [f32; 16] {\n    let x0 = px / surf_w * 2.0 - 1.0;\n    let x1 = (px + pw) / surf_w * 2.0 - 1.0;\n    let y0 = 1.0 - py / surf_h * 2.0;\n    let y1 = 1.0 - (py + ph) / surf_h * 2.0;\n    [\n        x0, y0, 0.0, 0.0, x1, y0, 1.0, 0.0, x0, y1, 0.0, 1.0, x1, y1, 1.0, 1.0,\n    ]\n}\n\n#[allow(dead_code)]\n/// Convert verts (16 f32) into an owned Vec\u003cu8\u003e containing the raw bytes.\npub fn verts_to_bytes(verts: \u0026[f32; 16]) -\u003e Vec\u003cu8\u003e {\n    // Safe copy of raw bytes\n    unsafe { std::slice::from_raw_parts(verts.as_ptr() as *const u8, 16 * 4) }.to_vec()\n}\n\n#[cfg(not(test))]\nuse glow::HasContext;\n\n#[cfg(not(test))]\n/// Upload verts to the given VBO (ARRAY_BUFFER) and set DYNAMIC_DRAW.\npub unsafe fn upload_verts(gl: \u0026glow::Context, vbo: glow::NativeBuffer, verts: \u0026[f32; 16]) {\n    let bytes = std::slice::from_raw_parts(verts.as_ptr() as *const u8, 16 * 4);\n    gl.bind_buffer(glow::ARRAY_BUFFER, Some(vbo));\n    gl.buffer_data_u8_slice(glow::ARRAY_BUFFER, bytes, glow::DYNAMIC_DRAW);\n}\n\n#[cfg(not(test))]\n/// Enable and set the vertex attribute pointers for the quad vertex layout.\npub unsafe fn enable_quad_attribs(gl: \u0026glow::Context, loc_pos: u32, loc_local: u32) {\n    gl.enable_vertex_attrib_array(loc_pos);\n    gl.enable_vertex_attrib_array(loc_local);\n    // stride = 16 bytes (4 floats), offsets 0 and 8 bytes\n    gl.vertex_attrib_pointer_f32(loc_pos, 2, glow::FLOAT, false, 16, 0);\n    gl.vertex_attrib_pointer_f32(loc_local, 2, glow::FLOAT, false, 16, 8);\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn ndc_quad_basic() {\n        let verts = verts_from_pixels(0.0, 0.0, 100.0, 200.0, 800.0, 600.0);\n        let x0 = 0.0 / 800.0 * 2.0 - 1.0;\n        let x1 = 100.0 / 800.0 * 2.0 - 1.0;\n        let y0 = 1.0 - 0.0 / 600.0 * 2.0;\n        let y1 = 1.0 - 200.0 / 600.0 * 2.0;\n        assert!((verts[0] - x0).abs() \u003c 1e-6);\n        assert!((verts[4] - x1).abs() \u003c 1e-6);\n        assert!((verts[1] - y0).abs() \u003c 1e-6);\n        assert!((verts[9] - y1).abs() \u003c 1e-6);\n    }\n\n    #[test]\n    fn verts_bytes_len() {\n        let verts = verts_from_pixels(0.0, 0.0, 8.0, 8.0, 16.0, 16.0);\n        let b = verts_to_bytes(\u0026verts);\n        assert_eq!(b.len(), 64);\n    }\n}\n","traces":[{"line":7,"address":[11998576],"length":1,"stats":{"Line":2}},{"line":15,"address":[11998651],"length":1,"stats":{"Line":2}},{"line":16,"address":[11998688],"length":1,"stats":{"Line":2}},{"line":17,"address":[11998726],"length":1,"stats":{"Line":2}},{"line":18,"address":[11998763],"length":1,"stats":{"Line":2}},{"line":26,"address":[11998432],"length":1,"stats":{"Line":1}},{"line":28,"address":[11998550,11998464],"length":1,"stats":{"Line":1}}],"covered":7,"coverable":7},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","egl_context.rs"],"content":"#[cfg(not(test))]\nuse std::ffi::c_void;\n\n#[cfg(not(test))]\nuse glow::HasContext;\n#[cfg(not(test))]\nuse khronos_egl as egl;\n#[cfg(not(test))]\nuse sctk::reexports::client::protocol::wl_surface::WlSurface;\n#[cfg(not(test))]\nuse sctk::reexports::client::Connection;\n#[cfg(not(test))]\nuse sctk::reexports::client::Proxy;\n#[cfg(not(test))]\nuse smithay_client_toolkit as sctk;\n#[cfg(not(test))]\nuse tracing::{debug, info};\n#[cfg(not(test))]\nuse wayland_egl::WlEglSurface;\n\n#[cfg(not(test))]\nuse super::{\n    icon_headphone, icon_mic, icon_strikeout, upload_texture, AVATAR_FRAG_SRC,\n    EGL_PLATFORM_WAYLAND_KHR, FRAG_SRC, ICON_FRAG_SRC, VERT_SRC,\n};\n\n#[cfg(not(test))]\nuse super::EglBackend;\n\n#[cfg(not(test))]\npub struct EglContext {\n    egl: egl::DynamicInstance\u003cegl::EGL1_5\u003e,\n    egl_display: egl::Display,\n    egl_surface: egl::Surface,\n    _egl_context: egl::Context,\n    wl_egl: WlEglSurface,\n    pub gl: glow::Context,\n    // Rounded-rect shader (background fills)\n    pub main_prog: super::program::MainProgram\u003cglow::Context\u003e,\n    vbo: glow::NativeBuffer,\n    // Icon overlay shader + textures\n    icon_prog: super::program::OpacityProgram\u003cglow::Context\u003e,\n    pub tex_mic: glow::NativeTexture,\n    pub tex_headphone: glow::NativeTexture,\n    pub tex_strikeout: glow::NativeTexture,\n    // Circular avatar shader\n    avatar_prog: super::program::OpacityProgram\u003cglow::Context\u003e,\n}\n#[cfg(not(test))]\nimpl EglContext {\n    pub fn new(conn: \u0026Connection, wl_surface: \u0026WlSurface, width: i32, height: i32) -\u003e Self {\n        // Load libEGL.so.1 dynamically and require at least EGL 1.5\n        let egl_inst = unsafe {\n            egl::DynamicInstance::\u003cegl::EGL1_5\u003e::load_required()\n                .expect(\"EGL 1.5 required — is libEGL.so.1 installed?\")\n        };\n\n        // Pass the wl_display* to EGL.\n        // We use eglGetDisplay(wl_display*) which Mesa has always supported for Wayland,\n        // with eglGetPlatformDisplay as an optional stronger path.\n        let display_ptr = conn.backend().display_ptr() as *mut c_void;\n        assert!(\n            !display_ptr.is_null(),\n            \"wl_display pointer is null — client_system not active?\"\n        );\n\n        let egl_display = unsafe {\n            egl_inst\n                .get_platform_display(EGL_PLATFORM_WAYLAND_KHR, display_ptr, \u0026[])\n                .or_else(|_| {\n                    egl_inst\n                        .get_display(display_ptr)\n                        .ok_or(khronos_egl::Error::BadDisplay)\n                })\n                .expect(\"failed to get EGL display for Wayland\")\n        };\n        egl_inst.initialize(egl_display).expect(\"EGL init failed\");\n\n        // Choose an RGBA8 config with a full alpha channel for true transparency\n        let cfg_attribs = [\n            egl::SURFACE_TYPE,\n            egl::WINDOW_BIT,\n            egl::RENDERABLE_TYPE,\n            egl::OPENGL_ES2_BIT,\n            egl::RED_SIZE,\n            8,\n            egl::GREEN_SIZE,\n            8,\n            egl::BLUE_SIZE,\n            8,\n            egl::ALPHA_SIZE,\n            8,\n            egl::NONE,\n        ];\n        let config = egl_inst\n            .choose_first_config(egl_display, \u0026cfg_attribs)\n            .expect(\"EGL choose_config failed\")\n            .expect(\"no suitable EGL config found\");\n\n        // Create GLES2 context\n        egl_inst\n            .bind_api(egl::OPENGL_ES_API)\n            .expect(\"bind GLES2 API\");\n        let ctx_attribs = [egl::CONTEXT_CLIENT_VERSION, 2, egl::NONE];\n        let egl_context = egl_inst\n            .create_context(egl_display, config, None, \u0026ctx_attribs)\n            .expect(\"EGL create_context failed\");\n\n        // Create wl_egl_window from the layer surface's wl_surface ObjectId\n        let wl_egl = WlEglSurface::new(wl_surface.id(), width, height)\n            .expect(\"WlEglSurface creation failed\");\n\n        let egl_surface = unsafe {\n            egl_inst\n                .create_window_surface(egl_display, config, wl_egl.ptr() as *mut c_void, None)\n                .expect(\"EGL create_window_surface failed\")\n        };\n\n        egl_inst\n            .make_current(\n                egl_display,\n                Some(egl_surface),\n                Some(egl_surface),\n                Some(egl_context),\n            )\n            .expect(\"EGL make_current failed\");\n\n        // Disable blocking vsync; Wayland frame pacing is handled by commit timing\n        let _ = egl_inst.swap_interval(egl_display, 0);\n\n        // Load GL function pointers via glow\n        let gl = unsafe {\n            glow::Context::from_loader_function(|sym| match egl_inst.get_proc_address(sym) {\n                Some(f) =\u003e f as *const c_void,\n                None =\u003e std::ptr::null(),\n            })\n        };\n\n        // Enable alpha blending for transparent background\n        unsafe {\n            gl.enable(glow::BLEND);\n            gl.blend_func(glow::SRC_ALPHA, glow::ONE_MINUS_SRC_ALPHA);\n        }\n\n        // Compile and link the shader program\n        let main_prog = unsafe { super::program::MainProgram::new(\u0026gl, VERT_SRC, FRAG_SRC) };\n        let vbo = unsafe { gl.create_buffer().unwrap() };\n\n        // ── Icon overlay shader ──────────────────────────────────────────────\n        let icon_prog =\n            unsafe { super::program::OpacityProgram::new(\u0026gl, VERT_SRC, ICON_FRAG_SRC) };\n\n        // ── Avatar circular-clip shader ──────────────────────────────────────\n        let avatar_prog =\n            unsafe { super::program::OpacityProgram::new(\u0026gl, VERT_SRC, AVATAR_FRAG_SRC) };\n\n        // ── Upload icon textures ─────────────────────────────────────────────\n        let tex_mic = unsafe { upload_texture(\u0026gl, \u0026icon_mic(64), 64) };\n        let tex_headphone = unsafe { upload_texture(\u0026gl, \u0026icon_headphone(64), 64) };\n        let tex_strikeout = unsafe { upload_texture(\u0026gl, \u0026icon_strikeout(64), 64) };\n\n        let ctx = EglContext {\n            egl: egl_inst,\n            egl_display,\n            egl_surface,\n            _egl_context: egl_context,\n            wl_egl,\n            gl,\n            main_prog,\n            vbo,\n            icon_prog,\n            tex_mic,\n            tex_headphone,\n            tex_strikeout,\n            avatar_prog,\n        };\n        info!(width, height, \"EGL/GLES2 context initialized\");\n        ctx\n    }\n\n    pub fn resize(\u0026self, width: i32, height: i32) {\n        debug!(width, height, \"EGL surface resized\");\n        self.wl_egl.resize(width, height, 0, 0);\n    }\n\n    /// Render one rounded rectangle. Coordinates are in logical pixels, origin = top-left.\n    #[allow(clippy::too_many_arguments)]\n    pub fn draw_rect(\n        \u0026self,\n        px: f32,\n        py: f32,\n        pw: f32,\n        ph: f32,\n        surf_w: f32,\n        surf_h: f32,\n        color: [f32; 4],\n        radius: f32,\n    ) {\n        let verts = super::draw::verts_from_pixels(px, py, pw, ph, surf_w, surf_h);\n\n        unsafe {\n            // Upload verts and set attribute pointers using shared helpers\n            super::draw::upload_verts(\u0026self.gl, self.vbo, \u0026verts);\n            let locs = self.main_prog.locs();\n            super::draw::enable_quad_attribs(\u0026self.gl, locs.loc_pos, locs.loc_local);\n\n            self.main_prog.set_color(\u0026self.gl, color);\n            self.main_prog.set_size(\u0026self.gl, pw, ph);\n            self.main_prog.set_radius(\u0026self.gl, radius);\n\n            self.gl.draw_arrays(glow::TRIANGLE_STRIP, 0, 4);\n        }\n    }\n\n    pub fn swap(\u0026self) {\n        self.egl\n            .swap_buffers(self.egl_display, self.egl_surface)\n            .expect(\"EGL swap_buffers failed\");\n    }\n\n    /// Render an icon texture over a quad (same coord system as draw_rect).\n    #[allow(clippy::too_many_arguments)]\n    pub fn draw_icon(\n        \u0026self,\n        px: f32,\n        py: f32,\n        pw: f32,\n        ph: f32,\n        surf_w: f32,\n        surf_h: f32,\n        tex: glow::NativeTexture,\n        opacity: f32,\n    ) {\n        let verts = super::draw::verts_from_pixels(px, py, pw, ph, surf_w, surf_h);\n        unsafe {\n            self.icon_prog.use_program(\u0026self.gl);\n            self.gl.active_texture(glow::TEXTURE0);\n            self.gl.bind_texture(glow::TEXTURE_2D, Some(tex));\n\n            super::draw::upload_verts(\u0026self.gl, self.vbo, \u0026verts);\n            let locs = self.main_prog.locs();\n            super::draw::enable_quad_attribs(\u0026self.gl, locs.loc_pos, locs.loc_local);\n\n            self.icon_prog.set_opacity(\u0026self.gl, opacity);\n            self.gl.draw_arrays(glow::TRIANGLE_STRIP, 0, 4);\n            self.main_prog.use_program(\u0026self.gl);\n        }\n    }\n\n    /// Render a circular-clipped avatar texture.\n    /// `desaturate`: 0.0 = full colour, 1.0 = greyscale (used for deafened participants).\n    #[allow(clippy::too_many_arguments)]\n    pub fn draw_avatar(\n        \u0026self,\n        px: f32,\n        py: f32,\n        size: f32,\n        surf_w: f32,\n        surf_h: f32,\n        tex: glow::NativeTexture,\n        opacity: f32,\n        desaturate: f32,\n    ) {\n        let verts = super::draw::verts_from_pixels(px, py, size, size, surf_w, surf_h);\n        unsafe {\n            self.avatar_prog.use_program(\u0026self.gl);\n            self.gl.active_texture(glow::TEXTURE0);\n            self.gl.bind_texture(glow::TEXTURE_2D, Some(tex));\n\n            super::draw::upload_verts(\u0026self.gl, self.vbo, \u0026verts);\n            let locs = self.main_prog.locs();\n            super::draw::enable_quad_attribs(\u0026self.gl, locs.loc_pos, locs.loc_local);\n\n            self.avatar_prog.set_opacity(\u0026self.gl, opacity);\n            let u_des = self\n                .gl\n                .get_uniform_location(self.avatar_prog.id(), \"u_desaturate\");\n            self.gl.uniform_1_f32(u_des.as_ref(), desaturate);\n            self.gl.draw_arrays(glow::TRIANGLE_STRIP, 0, 4);\n            self.main_prog.use_program(\u0026self.gl);\n        }\n    }\n}\n\n/// Upload an RGBA pixel buffer as a GL TEXTURE_2D with linear filtering (non-square).\n#[cfg(not(test))]\nimpl EglBackend for EglContext {\n    fn resize(\u0026self, width: i32, height: i32) {\n        EglContext::resize(self, width, height)\n    }\n    fn draw_rect(\n        \u0026self,\n        px: f32,\n        py: f32,\n        pw: f32,\n        ph: f32,\n        surf_w: f32,\n        surf_h: f32,\n        color: [f32; 4],\n        radius: f32,\n    ) {\n        EglContext::draw_rect(self, px, py, pw, ph, surf_w, surf_h, color, radius)\n    }\n    fn draw_icon(\n        \u0026self,\n        px: f32,\n        py: f32,\n        pw: f32,\n        ph: f32,\n        surf_w: f32,\n        surf_h: f32,\n        tex: glow::NativeTexture,\n        opacity: f32,\n    ) {\n        EglContext::draw_icon(self, px, py, pw, ph, surf_w, surf_h, tex, opacity)\n    }\n    fn draw_avatar(\n        \u0026self,\n        px: f32,\n        py: f32,\n        size: f32,\n        surf_w: f32,\n        surf_h: f32,\n        tex: glow::NativeTexture,\n        opacity: f32,\n        desaturate: f32,\n    ) {\n        EglContext::draw_avatar(self, px, py, size, surf_w, surf_h, tex, opacity, desaturate)\n    }\n    fn swap(\u0026self) {\n        EglContext::swap(self)\n    }\n    fn delete_texture(\u0026self, tex: glow::NativeTexture) {\n        EglContext::delete_texture(self, tex)\n    }\n    fn upload_texture_wh(\u0026self, pixels: \u0026[u8], w: u32, h: u32) -\u003e glow::NativeTexture {\n        EglContext::upload_texture_wh(self, pixels, w, h)\n    }\n    fn tex_mic(\u0026self) -\u003e glow::NativeTexture {\n        EglContext::tex_mic(self)\n    }\n    fn tex_headphone(\u0026self) -\u003e glow::NativeTexture {\n        EglContext::tex_headphone(self)\n    }\n    fn tex_strikeout(\u0026self) -\u003e glow::NativeTexture {\n        EglContext::tex_strikeout(self)\n    }\n    fn viewport(\u0026self, x: i32, y: i32, w: i32, h: i32) {\n        EglContext::viewport(self, x, y, w, h)\n    }\n    fn clear_color(\u0026self, r: f32, g: f32, b: f32, a: f32) {\n        EglContext::clear_color(self, r, g, b, a)\n    }\n    fn clear(\u0026self, mask: u32) {\n        EglContext::clear(self, mask)\n    }\n    fn use_main_program(\u0026self) {\n        EglContext::use_main_program(self)\n    }\n}\n\n#[cfg(not(test))]\nimpl EglContext {\n    /// Explicitly destroy GL resources owned by EglContext. Prefer calling this before\n    /// tearing down the EGL context to ensure deterministic cleanup.\n    #[allow(dead_code)]\n    pub unsafe fn destroy(\u0026mut self) {\n        // Delete GL programs, VBO and textures owned by EglContext\n        self.gl.delete_program(self.main_prog.id());\n        self.gl.delete_program(self.icon_prog.id());\n        self.gl.delete_program(self.avatar_prog.id());\n        self.gl.delete_buffer(self.vbo);\n        self.gl.delete_texture(self.tex_mic);\n        self.gl.delete_texture(self.tex_headphone);\n        self.gl.delete_texture(self.tex_strikeout);\n    }\n}\n\n#[cfg(not(test))]\nimpl Drop for EglContext {\n    fn drop(\u0026mut self) {\n        unsafe {\n            // Prefer explicit destroy(); still delete resources if destroy not called.\n            self.destroy();\n        }\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ggomes","Documents","discord-overlay","src","render","math.rs"],"content":"// Pure math and SDF helpers for the render module.\n\n/// Smoothstep easing used for SDF antialiasing.\npub fn smoothstep(edge0: f32, edge1: f32, x: f32) -\u003e f32 {\n    let t = ((x - edge0) / (edge1 - edge0)).clamp(0.0, 1.0);\n    t * t * (3.0 - 2.0 * t)\n}\n\n/// Rounded-rect signed distance function.\npub fn sdf_rrect(px: f32, py: f32, cx: f32, cy: f32, hw: f32, hh: f32, r: f32) -\u003e f32 {\n    let dx = (px - cx).abs() - hw + r;\n    let dy = (py - cy).abs() - hh + r;\n    dx.max(0.0).hypot(dy.max(0.0)) + dx.min(0.0).max(dy.min(0.0)) - r\n}\n\n/// Arc ring SDF helper used for headphone / band shapes.\npub fn sdf_arc(px: f32, py: f32, cx: f32, cy: f32, r: f32, w: f32, bottom: bool) -\u003e f32 {\n    let d = ((px - cx).powi(2) + (py - cy).powi(2)).sqrt();\n    let ring = (d - r).abs() - w;\n    if bottom {\n        if py \u003c= cy {\n            ring\n        } else {\n            99.0\n        }\n    } else if py \u003e= cy {\n        ring\n    } else {\n        99.0\n    }\n}\n\n/// Rasterize an SDF into an RGBA byte buffer (white RGB, alpha SDF).\npub fn rasterize\u003cF: Fn(f32, f32) -\u003e f32\u003e(size: u32, sdf_fn: F) -\u003e Vec\u003cu8\u003e {\n    let s = size as f32;\n    let aa = 1.5 / s;\n    let mut buf = vec![0u8; (size * size * 4) as usize];\n    for y in 0..size {\n        for x in 0..size {\n            let px = x as f32 / s - 0.5;\n            let py = y as f32 / s - 0.5;\n            let d = sdf_fn(px, py);\n            let a = (1.0 - smoothstep(-aa, aa, d)) * 255.0;\n            let i = ((y * size + x) * 4) as usize;\n            buf[i..i + 3].fill(255);\n            buf[i + 3] = a as u8;\n        }\n    }\n    buf\n}\n","traces":[{"line":4,"address":[12737984],"length":1,"stats":{"Line":1}},{"line":5,"address":[12738021],"length":1,"stats":{"Line":1}},{"line":6,"address":[12738058],"length":1,"stats":{"Line":2}},{"line":10,"address":[12738416],"length":1,"stats":{"Line":1}},{"line":11,"address":[12738492],"length":1,"stats":{"Line":2}},{"line":12,"address":[12738548],"length":1,"stats":{"Line":1}},{"line":13,"address":[12738598],"length":1,"stats":{"Line":2}},{"line":17,"address":[12738112],"length":1,"stats":{"Line":1}},{"line":18,"address":[12738189],"length":1,"stats":{"Line":1}},{"line":19,"address":[12738268],"length":1,"stats":{"Line":1}},{"line":20,"address":[12738303],"length":1,"stats":{"Line":2}},{"line":21,"address":[12738398,12738338,12738412],"length":1,"stats":{"Line":6}},{"line":22,"address":[12738406],"length":1,"stats":{"Line":1}},{"
