name: Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libwayland-dev libwayland-egl1-mesa libegl1-mesa-dev libgles2-mesa-dev libxkbcommon-dev

      - name: Install cargo-tarpaulin
        run: |
          cargo install cargo-tarpaulin --version 0.24.4 || cargo install cargo-tarpaulin

      - name: Run tarpaulin (generate lcov + json)
        run: |
          cargo tarpaulin --out Lcov --out Json --verbose

      - name: Check coverage baseline
        run: bash scripts/check-coverage.sh

      - name: Generate coverage badge SVG
        run: |
          python3 scripts/generate-coverage-badge.py --input tarpaulin-report.json --output coverage-badge.svg

      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Configure GitHub Pages
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        run: |
          mkdir -p _site
          cp coverage-badge.svg _site/coverage-badge.svg

      - name: Upload Pages artifact
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: actions/deploy-pages@v4

      - name: Upload to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ env.CODECOV_TOKEN }}
